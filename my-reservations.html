<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡域 - 我的预约</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); padding: 15px; display: flex; align-items: center; gap: 12px; }
        .back { color: white; font-size: 22px; text-decoration: none; }
        .header-title { color: white; font-size: 18px; font-weight: bold; }

        /* Tab 筛选 */
        .tab-bar { display: flex; gap: 8px; padding: 12px 15px; overflow-x: auto; scrollbar-width: none; background: white; border-bottom: 0.5px solid #eee; }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-chip { padding: 6px 16px; border-radius: 18px; font-size: 13px; white-space: nowrap; cursor: pointer; border: 1.5px solid #e0e0e0; background: white; color: #666; }
        .tab-chip.active { background: #5B4AE0; color: white; border-color: transparent; font-weight: bold; }
        .tab-chip .count { margin-left: 4px; opacity: 0.7; }

        /* 统计条 */
        .stats-bar { display: flex; padding: 12px 15px; gap: 12px; background: white; margin-bottom: 8px; }
        .stat-item { flex: 1; text-align: center; padding: 8px; background: #f8f8ff; border-radius: 10px; }
        .stat-num { font-size: 20px; font-weight: bold; color: #5B4AE0; }
        .stat-label { font-size: 11px; color: #999; margin-top: 2px; }

        /* 预约列表 */
        .list { padding: 0 15px; }
        .res-card { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); display: flex; gap: 12px; align-items: flex-start; }
        .res-img { width: 72px; height: 72px; border-radius: 8px; background: #f0f0f0; background-size: cover; background-position: center; flex-shrink: 0; }
        .res-info { flex: 1; min-width: 0; }
        .res-name { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .res-meta { font-size: 12px; color: #999; margin-bottom: 4px; }
        .res-price { font-size: 15px; font-weight: bold; color: #ff3b30; }
        .res-actions { display: flex; gap: 8px; margin-top: 8px; align-items: center; }

        /* 状态标签 */
        .status-badge { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
        .status-badge.pending { background: #fff3e0; color: #f7931e; }
        .status-badge.notified { background: #e8f5e9; color: #34c759; }
        .status-badge.converted { background: #e3f2fd; color: #2196f3; }
        .status-badge.cancelled { background: #f5f5f5; color: #999; }

        /* 来源标签 */
        .source-tag { font-size: 10px; padding: 2px 6px; border-radius: 6px; }
        .source-tag.tiktok { background: #ff2d55; color: white; }
        .source-tag.live { background: #ff2d55; color: white; }
        .source-tag.shop { background: #f0f0f0; color: #666; }

        /* 按钮 */
        .cancel-btn { padding: 5px 14px; border-radius: 14px; border: 1px solid #ff3b30; color: #ff3b30; background: white; font-size: 12px; cursor: pointer; }
        .cancel-btn:active { background: #fff5f5; }
        .view-btn { padding: 5px 14px; border-radius: 14px; border: 1px solid #5B4AE0; color: #5B4AE0; background: white; font-size: 12px; cursor: pointer; text-decoration: none; }
        .view-btn:active { background: #f8f8ff; }
        .view-btn.disabled { pointer-events: none; opacity: 0.5; }

        .loading { text-align: center; padding: 80px 20px; color: #999; }
        .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #5B4AE0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }

        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: #333; color: white; padding: 10px 24px; border-radius: 20px; font-size: 13px; z-index: 200; opacity: 0; transition: all 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* 底部导航 */
        .nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); border-top: 0.5px solid #eee; z-index: 100; }
        .nav-item { text-decoration: none; color: #999; font-size: 10px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 0; }
        .nav-item.active { color: #5B4AE0; font-weight: bold; }
        .nav-icon { font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="shop.html" class="back">←</a>
        <div class="header-title">我的预约</div>
    </div>

    <!-- 统计条 -->
    <div class="stats-bar">
        <div class="stat-item"><div class="stat-num" id="pendingCount">--</div><div class="stat-label">等待中</div></div>
        <div class="stat-item"><div class="stat-num" id="notifiedCount">--</div><div class="stat-label">已通知</div></div>
        <div class="stat-item"><div class="stat-num" id="convertedCount">--</div><div class="stat-label">已转化</div></div>
    </div>

    <!-- Tab 筛选 (事件委托，无内联onclick) -->
    <div class="tab-bar" id="tabBar">
        <div class="tab-chip active" data-status="">全部</div>
        <div class="tab-chip" data-status="pending">等待中<span class="count" id="tabPending">0</span></div>
        <div class="tab-chip" data-status="notified">已通知<span class="count" id="tabNotified">0</span></div>
        <div class="tab-chip" data-status="converted">已转化<span class="count" id="tabConverted">0</span></div>
        <div class="tab-chip" data-status="cancelled">已取消<span class="count" id="tabCancelled">0</span></div>
    </div>

    <!-- 预约列表 -->
    <div class="list" id="reservationList">
        <div class="loading"><div class="spinner"></div><div>加载中...</div></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 底部导航 -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span><span>探索</span></a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span>看板</span></a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🏪</span><span>市场</span></a>
        <a href="shop.html" class="nav-item active"><span class="nav-icon">🛍</span><span>商城</span></a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span><span>我的</span></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/risk-control.js"></script>
    <script>
    /* ===== Fail-closed: DOM API (replaceChildren/createElement/textContent) ===== */
    if (!window.RiskControl) {
        var _wrap = document.createElement('div');
        _wrap.style.cssText = 'text-align:center;padding:80px 20px;color:#999;';
        var _ic = document.createElement('div');
        _ic.style.fontSize = '48px';
        _ic.textContent = '\u26A0\uFE0F';
        var _tx = document.createElement('div');
        _tx.style.marginTop = '12px';
        _tx.textContent = '\u5b89\u5168\u6a21\u5757\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u5237\u65b0\u9875\u9762\u91cd\u8bd5';
        _wrap.appendChild(_ic);
        _wrap.appendChild(_tx);
        document.body.replaceChildren(_wrap);
        throw new Error('RiskControl module not loaded');
    }

    var escapeHtml = RiskControl.escapeHtml;
    var safeUrl = RiskControl.safeUrl;
    var isValidUUID = RiskControl.isValidUUID;
    var validateAction = RiskControl.validateAction;

    var db = window.supabase.createClient(
        'https://xybpcsmjjcnkjwfsuder.supabase.co',
        'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7'
    );

    var currentFilter = '';
    var allReservations = [];
    var currentUser = null;

    /* 状态/来源枚举白名单 */
    var VALID_STATUSES = ['pending', 'notified', 'converted', 'cancelled'];
    var VALID_SOURCES = ['tiktok', 'live', 'shop'];
    var STATUS_MAP = { pending: '等待中', notified: '已通知', converted: '已转化', cancelled: '已取消' };
    var SOURCE_MAP = { tiktok: '直播', live: '直播', shop: '商城' };

    function showToast(m) { var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2500); }

    /* 数值校验辅助函数 */
    function safePrice(v) {
        var n = Number(v);
        return (Number.isFinite(n) && n >= 0) ? n.toFixed(2) : '--';
    }
    function safeInt(v) {
        var n = Number(v);
        return (Number.isInteger(n) && n >= 0) ? String(n) : '--';
    }

    async function init() {
        var { data: { user } } = await db.auth.getUser();
        if (!user) { location.href = 'login.html'; return; }
        currentUser = user;
        await loadReservations();
    }

    async function loadReservations() {
        var list = document.getElementById('reservationList');
        list.innerHTML = '<div class="loading"><div class="spinner"></div><div>加载中...</div></div>';

        var pStatus = currentFilter || null;
        var { data, error } = await db.rpc('get_user_reservations', {
            p_user_id: currentUser.id,
            p_status: pStatus
        });

        if (error) {
            list.innerHTML = '<div class="empty"><div class="empty-icon">❌</div>加载失败，请刷新重试</div>';
            return;
        }

        var reservations = (data && data.reservations) || [];
        allReservations = reservations;
        renderList(reservations);

        /* 如果加载全部，更新统计 */
        if (!currentFilter) {
            updateStats(reservations);
        }
    }

    function renderList(reservations) {
        var list = document.getElementById('reservationList');
        if (!reservations || reservations.length === 0) {
            list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>暂无预约记录<br><small>去 <a href="shop.html" style="color:#5B4AE0;">商城</a> 看看吧</small></div>';
            return;
        }

        list.innerHTML = reservations.map(function(r) {
            /* 枚举白名单校验 */
            var status = VALID_STATUSES.indexOf(r.status) !== -1 ? r.status : 'pending';
            var source = VALID_SOURCES.indexOf(r.source) !== -1 ? r.source : 'shop';
            var isPending = status === 'pending';
            var isLive = source === 'tiktok' || source === 'live';

            /* 数值校验 */
            var priceStr = safePrice(r.product_price);
            var qtyStr = safeInt(r.quantity);
            var stockStr = safeInt(r.product_stock);

            /* UUID校验 */
            var resIdValid = isValidUUID(r.id);
            var productIdValid = isValidUUID(r.product_id);

            /* 日期安全格式化 */
            var dateStr = r.created_at ? new Date(r.created_at).toLocaleDateString('zh-CN') : '--';

            /* 构建HTML — 所有动态文本均通过escapeHtml */
            var html = '<div class="res-card">';
            html += '<div class="res-img" data-img-url="' + escapeHtml(r.product_image || '') + '"></div>';
            html += '<div class="res-info">';
            html += '<div class="res-name">' + escapeHtml(r.product_title) + '</div>';
            html += '<div class="res-meta">';
            html += '<span class="status-badge ' + escapeHtml(status) + '">' + escapeHtml(STATUS_MAP[status]) + '</span>';
            html += '<span class="source-tag ' + escapeHtml(source) + '">' + escapeHtml(SOURCE_MAP[source]) + '</span>';
            html += isLive ? ' 🔴 直播同款' : '';
            html += '</div>';
            html += '<div class="res-price">¥' + priceStr + '</div>';
            html += '<div class="res-meta">x' + qtyStr + ' · 库存 ' + stockStr + ' · ' + escapeHtml(dateStr) + '</div>';
            html += '<div class="res-actions">';
            /* 产品链接仅在UUID有效时生成 */
            html += productIdValid
                ? '<a href="product-detail.html?id=' + escapeHtml(r.product_id) + '" class="view-btn">查看详情</a>'
                : '<span class="view-btn disabled">查看详情</span>';
            /* 取消按钮仅在预约ID为合法UUID时渲染 */
            if (isPending && resIdValid) {
                html += '<button class="cancel-btn" data-reservation-id="' + escapeHtml(r.id) + '">取消预约</button>';
            }
            html += '</div>';
            html += '</div>';
            html += '</div>';
            return html;
        }).join('');

        /* ===== 图片URL: safeUrl验证 + DOM API设置 ===== */
        list.querySelectorAll('.res-img[data-img-url]').forEach(function(el) {
            var rawUrl = el.dataset.imgUrl;
            var safe = safeUrl(rawUrl);
            if (safe) {
                el.style.backgroundImage = "url('" + safe + "')";
            } else {
                el.style.display = 'none';
            }
        });
    }

    function updateStats(reservations) {
        var counts = { pending: 0, notified: 0, converted: 0, cancelled: 0 };
        reservations.forEach(function(r) {
            if (VALID_STATUSES.indexOf(r.status) !== -1) counts[r.status]++;
        });

        document.getElementById('pendingCount').textContent = counts.pending;
        document.getElementById('notifiedCount').textContent = counts.notified;
        document.getElementById('convertedCount').textContent = counts.converted;
        document.getElementById('tabPending').textContent = counts.pending;
        document.getElementById('tabNotified').textContent = counts.notified;
        document.getElementById('tabConverted').textContent = counts.converted;
        document.getElementById('tabCancelled').textContent = counts.cancelled;
    }

    function filterByStatus(status) {
        currentFilter = status;
        document.querySelectorAll('.tab-chip').forEach(function(c) { c.classList.remove('active'); });
        var target = document.querySelector('.tab-chip[data-status="' + status + '"]');
        if (target) target.classList.add('active');
        loadReservations();
    }

    async function cancelReservation(resId) {
        /* UUID校验: 防止伪造ID */
        if (!isValidUUID(resId)) { showToast('无效的预约ID'); return; }

        /* 从内存集合按真实ID查找 */
        var reservation = allReservations.find(function(r) { return r.id === resId; });
        if (!reservation) { showToast('未找到该预约记录'); return; }
        if (reservation.status !== 'pending') { showToast('该预约无法取消'); return; }

        if (!confirm('确定取消这个预约吗？')) return;

        var { data, error } = await db.rpc('cancel_reservation', {
            p_reservation_id: resId,
            p_user_id: currentUser.id
        });

        if (error) { showToast('取消失败: ' + error.message); return; }
        if (!data.success) { showToast(data.error); return; }

        showToast('已取消预约');
        loadReservations();
    }

    /* ===== 事件委托: Tab筛选 ===== */
    document.getElementById('tabBar').addEventListener('click', function(e) {
        var chip = e.target.closest('.tab-chip');
        if (!chip) return;
        var status = chip.dataset.status || '';
        /* validateAction白名单校验 */
        if (!validateAction(status, ['', 'pending', 'notified', 'converted', 'cancelled'])) return;
        filterByStatus(status);
    });

    /* ===== 事件委托: 取消预约按钮 ===== */
    document.getElementById('reservationList').addEventListener('click', function(e) {
        var btn = e.target.closest('.cancel-btn');
        if (!btn) return;
        var resId = btn.dataset.reservationId;
        if (!isValidUUID(resId)) { showToast('无效的预约ID'); return; }
        cancelReservation(resId);
    });

    init();
    </script>
</body>
</html>
