<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>社区 - 卡域 Card Realm</title>
    <meta name="description" content="分享你的卡牌收藏，参与讨论，发现热门卡牌">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--white);
            padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-actions { display: flex; gap: 8px; }
        .header-btn {
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%);
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--white);
            padding: 0 16px;
            gap: 20px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding: 12px 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* Content */
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        /* Trending Banner */
        .trending-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: var(--radius);
            padding: 16px;
            color: white;
            margin-bottom: 12px;
            overflow: hidden;
        }
        .trending-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .trending-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; }
        .trending-item {
            flex-shrink: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px 12px;
            min-width: 100px;
            text-align: center;
        }
        .trending-rank { font-size: 18px; font-weight: 800; margin-bottom: 2px; }
        .trending-name { font-size: 12px; font-weight: 600; white-space: nowrap; }
        .trending-count { font-size: 10px; opacity: 0.7; margin-top: 2px; }

        /* Post Card */
        .post-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .post-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; font-weight: 700;
        }
        .post-meta { flex: 1; }
        .post-author { font-size: 14px; font-weight: 700; }
        .post-time { font-size: 11px; color: var(--text-secondary); }
        .post-note { font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
        .post-card-image {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 12px;
            background: #f8f8f8;
            aspect-ratio: 3/4;
            object-fit: cover;
        }
        .post-info {
            background: var(--primary-light);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }
        .post-info-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
        .post-info-row + .post-info-row { margin-top: 4px; }
        .post-info-label { color: var(--text-secondary); }
        .post-info-value { font-weight: 700; color: var(--primary); }

        /* Post Actions */
        .post-actions {
            display: flex;
            gap: 16px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }
        .post-action {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            background: none; border: none;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .post-action:hover { background: var(--bg); }
        .post-action.liked { color: #e74c3c; }
        .post-action .icon { font-size: 16px; }

        /* Bottom Nav */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }

        /* Share Modal */
        .share-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1000;
            justify-content: center; align-items: flex-end;
        }
        .share-modal.show { display: flex; }
        .share-sheet {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            width: 100%; max-width: 560px;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .share-title { font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 16px; }
        .share-options { display: flex; gap: 20px; justify-content: center; }
        .share-option {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            cursor: pointer; background: none; border: none;
        }
        .share-icon {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .share-label { font-size: 12px; color: var(--text-secondary); }

        /* Empty State */
        .empty-state {
            text-align: center; padding: 60px 20px;
        }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
        .empty-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%);
            color: white;
            border-radius: 24px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        /* Comment Modal */
        .comment-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5); z-index: 1001;
            justify-content: center; align-items: flex-end;
        }
        .comment-modal.show { display: flex; }
        .comment-sheet {
            background: white;
            border-radius: 20px 20px 0 0;
            width: 100%; max-width: 560px;
            max-height: 80vh;
            display: flex; flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        .comment-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .comment-header-title { font-size: 16px; font-weight: 700; }
        .comment-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); }
        .comment-list {
            flex: 1; overflow-y: auto; padding: 12px 20px;
            max-height: 50vh;
        }
        .comment-item {
            display: flex; gap: 10px; padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }
        .comment-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 12px; font-weight: 700; flex-shrink: 0;
        }
        .comment-body { flex: 1; }
        .comment-author { font-size: 13px; font-weight: 700; }
        .comment-text { font-size: 13px; line-height: 1.5; margin-top: 2px; color: #333; }
        .comment-time { font-size: 11px; color: #999; margin-top: 4px; }
        .comment-input-area {
            padding: 12px 20px 20px;
            border-top: 1px solid var(--border);
            display: flex; gap: 10px; align-items: center;
        }
        .comment-input {
            flex: 1; padding: 10px 14px; border: 1px solid var(--border);
            border-radius: 20px; font-size: 14px; outline: none;
        }
        .comment-input:focus { border-color: var(--primary); }
        .comment-submit {
            background: var(--primary); color: white; border: none;
            padding: 10px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .comment-submit:disabled { opacity: 0.5; }
        .comment-empty {
            text-align: center; padding: 30px; color: var(--text-secondary); font-size: 14px;
        }

        /* Toast animations */
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">🌍 卡牌社区</div>
        <div class="header-actions">
            <a href="index.html" class="header-btn">📷 识卡分享</a>
        </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="feed">动态</div>

        <div class="tab" data-tab="mine">我的</div>
    </div>

    <div class="content">
        <!-- Trending Banner -->
        <div class="trending-banner" id="trendingBanner">
            <div class="trending-title">🔥 大家都在扫</div>
            <div class="trending-list" id="trendingList">
                <div class="trending-item">
                    <div class="trending-rank">1</div>
                    <div class="trending-name">皮卡丘 ex</div>
                    <div class="trending-count">128次</div>
                </div>
                <div class="trending-item">
                    <div class="trending-rank">2</div>
                    <div class="trending-name">喷火龙 ex</div>
                    <div class="trending-count">96次</div>
                </div>
                <div class="trending-item">
                    <div class="trending-rank">3</div>
                    <div class="trending-name">伊布 SAR</div>
                    <div class="trending-count">84次</div>
                </div>
                <div class="trending-item">
                    <div class="trending-rank">4</div>

        <!-- Posts Feed -->
        <div id="postsFeed"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📸</div>

            <div class="empty-desc">
                用 AI 扫描你的第一张卡牌<br>
                分享估价结果，和大家一起讨论
            </div>
            <a href="index.html" class="empty-btn">去识卡分享</a>
        </div>

    <!-- Comment Modal -->
    <div class="comment-modal" id="commentModal" onclick="closeCommentModal(event)">
        <div class="comment-sheet">
            <div class="comment-header">
                <div class="comment-header-title">💬 评论</div>
                <button class="comment-close" onclick="closeCommentModal()">✕</button>
            </div>
            <div class="comment-list" id="commentList"></div>
            <div class="comment-input-area">
                <input type="text" class="comment-input" id="commentInput" placeholder="写点什么..." onkeypress="if(event.key==='Enter')submitComment()">
                <button class="comment-submit" id="commentSubmitBtn" onclick="submitComment()">发送</button>
            </div>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="share-modal" id="shareModal" onclick="closeShare(event)">
        <div class="share-sheet">
            <div class="share-title">分享到</div>
            <div class="share-options">
                <button class="share-option" onclick="shareTo('wechat')">
                    <div class="share-icon" style="background:#07C160;color:white;">💬</div>
                    <div class="share-label">微信</div>
                </button>
                <button class="share-option" onclick="shareTo('qq')">
                    <div class="share-icon" style="background:#12B7F5;color:white;">Q</div>
                    <div class="share-label">QQ</div>
                </button>
                <button class="share-option" onclick="shareTo('copy')">
                    <div class="share-icon" style="background:var(--primary);color:white;">🔗</div>
                    <div class="share-label">复制链接</div>
                </button>
                <button class="share-option" onclick="shareTo('save')">
                    <div class="share-icon" style="background:#FF8C00;color:white;">💾</div>
                    <div class="share-label">保存图片</div>
                </button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="market.html" class="nav-item"><span class="nav-icon">🛒</span>交易</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="collection.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        let currentUser = null;
        let currentTab = 'feed';
        let likedPosts = new Set();
        let currentPostId = null;
        let currentSharePost = null;

        // Demo posts data
        const demoPosts = [
            {
                id: 'demo-1',
                author: '卡牌收藏家小王',
                avatar: '王',
                time: '10分钟前',
                note: '今天收到的皮卡丘 ex SAR，入手价580，AI估价比入手价高了快200！大家觉得现在适合出吗？🤔',
                card_image: null,
                card_name: '皮卡丘 ex SAR',
                series: '超电突围',
                rarity: 'SAR',
                estimated_price: 780,
                purchase_price: 580,
                likes: 23,
                comments: 8,
            },
            {
                id: 'demo-2',
                author: 'PTCG老司机',
                avatar: '老',
                time: '2小时前',
                note: '这张喷火龙的品相 NM 级别，入手420，今天涨了18%！📈',
                card_image: null,
                card_name: '喷火龙 ex SAR',
                series: '超电突围',
                rarity: 'SAR',
                estimated_price: 498,
                purchase_price: 420,
                likes: 45,
                comments: 12,
            },
            {
                id: 'demo-3',
                author: '宝可梦萌新',
                avatar: '萌',
                time: '5小时前',
                note: '第一次用AI识卡，好神奇！这是我在卡店淘到的伊布大师球镜面卡 ✨',
                card_image: null,
                card_name: '伊布 大师球镜面',
                series: '151',
                rarity: 'AR',
                estimated_price: 210,
                purchase_price: 180,
                likes: 67,
                comments: 15,
            }
        ];

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                currentUser = session.user;
                // Load user's liked posts from DB
                try {
                    const { data: likes } = await db
                        .from('post_likes')
                        .select('post_id')
                        .eq('user_id', currentUser.id);
                    if (likes) likedPosts = new Set(likes.map(l => l.post_id));
                } catch (e) { console.log('Load likes error:', e); }
            }

            // Load real posts or demo
            await loadPosts();
        }

        async function loadPosts() {
            try {
                const { data: posts, error } = await db
                    .from('community_posts')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(20);

                if (error) throw error;

                if (!posts || posts.length === 0) {
                    renderPosts(demoPosts);
                } else {
                    renderPosts(posts);
                }
            } catch (e) {
                console.log('Using demo posts');
                renderPosts(demoPosts);
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsFeed');
            if (!posts || posts.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            }
            document.getElementById('emptyState').style.display = 'none';

            container.innerHTML = posts.map(post => {
                const profit = post.estimated_price - (post.purchase_price || post.estimated_price);
                const profitPct = post.purchase_price ? ((profit / post.purchase_price) * 100).toFixed(1) : 0;
                const isRise = profit >= 0;
                const avatar = post.avatar || (post.author ? post.author[0] : '卡');
                const name = post.author || '匿名玩家';

                return `
                    <div class="post-card" data-post-id="${post.id}">
                        <div class="post-header">
                            <div class="post-avatar">${avatar}</div>
                            <div class="post-meta">
                                <div class="post-author">${name}</div>
                                <div class="post-time">${post.time || formatTime(post.created_at)}</div>
                            </div>
                        </div>
                        <div class="post-note">${post.note || ''}</div>
                        ${post.card_image ? `<img class="post-card-image" src="${post.card_image}" alt="card">` : ''}
                        <div class="post-info">
                            <div class="post-info-row">
                                <span class="post-info-label">🎴 ${post.card_name || '未知卡牌'}</span>
                                <span class="post-info-value">${post.series || ''} · ${post.rarity || ''}</span>
                            </div>
                            <div class="post-info-row">
                                <span class="post-info-label">💰 AI估价</span>
                                <span class="post-info-value">¥${(post.estimated_price || 0).toLocaleString()}</span>
                            </div>
                            ${post.purchase_price ? `
                            <div class="post-info-row">
                                <span class="post-info-label">📈 盈亏</span>
                                <span class="post-info-value" style="color:${isRise ? '#e74c3c' : '#27ae60'}">
                                    ${isRise ? '+' : ''}${profit.toLocaleString()} (${isRise ? '+' : ''}${profitPct}%)
                                </span>
                            </div>` : ''}
                        </div>
                        <div class="post-actions">
                            <button class="post-action ${likedPosts.has(post.id) ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                                <span class="icon">${likedPosts.has(post.id) ? '❤️' : '🤍'}</span>
                                <span>${post.likes || 0}</span>
                            </button>
                            <button class="post-action" onclick="showComments('${post.id}')">
                                <span class="icon">💬</span>
                                <span>${post.comments || 0}</span>
                            </button>
                            <button class="post-action" onclick="openShare('${post.id}')">
                                <span class="icon">↗️</span>
                                <span>分享</span>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            window._communityPosts = posts;
        }

        function formatTime(ts) {
            if (!ts) return '刚刚';
            const d = new Date(ts);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            return (d.getMonth() + 1) + '月' + d.getDate() + '日';
        }

        async function toggleLike(postId) {
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            const isLiked = likedPosts.has(postId);
            try {
                if (isLiked) {
                    // Unlike: delete from DB
                    await db.from('post_likes').delete().eq('post_id', postId).eq('user_id', currentUser.id);
                    likedPosts.delete(postId);
                    // Decrement likes count
                    await db.rpc('decrement_likes', { post_id: postId });
                } else {
                    // Like: insert to DB
                    await db.from('post_likes').insert({ post_id: postId, user_id: currentUser.id });
                    likedPosts.add(postId);
                    // Increment likes count
                    await db.rpc('increment_likes', { post_id: postId });
                }
                loadPosts();
            } catch (e) {
                console.error('Like error:', e);
                alert('操作失败，请重试');
            }
        }

        async function showComments(postId) {
            currentPostId = postId;
            document.getElementById('commentModal').classList.add('show');
            await loadComments(postId);
        }

        async function loadComments(postId) {
            const list = document.getElementById('commentList');
            list.innerHTML = '<div class="comment-empty">加载中...</div>';
            try {
                const { data: comments, error } = await db
                    .from('community_comments')
                    .select('*')
                    .eq('post_id', postId)
                    .order('created_at', { ascending: true });

                if (error) throw error;

                if (!comments || comments.length === 0) {
                    list.innerHTML = '<div class="comment-empty">暂无评论，来写第一条吧</div>';
                    return;
                }

                list.innerHTML = comments.map(c => {
                    const avatar = c.user_name ? c.user_name[0] : '👤';
                    return `
                        <div class="comment-item">
                            <div class="comment-avatar">${avatar}</div>
                            <div class="comment-body">
                                <div class="comment-author">${c.user_name || '匿名玩家'}</div>
                                <div class="comment-text">${escHTML(c.content)}</div>
                                <div class="comment-time">${formatTime(c.created_at)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                list.innerHTML = '<div class="comment-empty">加载失败</div>';
            }
        }

        async function submitComment() {
            const input = document.getElementById('commentInput');
            const content = input.value.trim();
            if (!content) return;
            if (!currentUser) { alert('请先登录'); return; }
            if (!currentPostId) return;

            const btn = document.getElementById('commentSubmitBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';

            try {
                const { error } = await db.from('community_comments').insert({
                    post_id: currentPostId,
                    user_id: currentUser.id,
                    content: content
                });
                if (error) throw error;

                input.value = '';
                // Reload comments
                await loadComments(currentPostId);
                // Also update comment count on post
                await db.rpc('increment_comments', { post_id: currentPostId });
                loadPosts();
            } catch (e) {
                alert('评论失败：' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
            }
        }

        function closeCommentModal(e) {
            if (!e || e.target.id === 'commentModal' || e.target.classList.contains('comment-close')) {
                document.getElementById('commentModal').classList.remove('show');
                currentPostId = null;
            }
        }

        function escHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
        }

        function openShare(postId) {
            currentSharePost = (window._communityPosts || demoPosts).find(p => p.id === postId) || null;
            document.getElementById('shareModal').classList.add('show');
        }

        function closeShare(e) {
            if (e.target.id === 'shareModal') {
                document.getElementById('shareModal').classList.remove('show');
            }
        }

        function showToast(msg, duration = 2500) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:3000;animation:toastIn 0.3s,toastOut 0.3s ' + (duration - 300) + 'ms forwards;';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), duration);
        }

        function shareTo(type) {
            const post = currentSharePost;
            const shareUrl = post ? (window.location.origin + window.location.pathname + '?post=' + post.id) : window.location.href;
            const shareTitle = post ? (post.card_name + ' - 卡域社区') : '卡域 Card Realm - 卡牌社区';
            const shareText = post ? (post.note || post.card_name) : '来看看卡牌社区的精彩内容';

            if (type === 'copy') {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    showToast('🔗 链接已复制到剪贴板');
                }).catch(() => {
                    showToast('复制失败，请手动复制');
                });
            } else if (type === 'save') {
                generateShareCard(post).then(() => {
                    showToast('📷 分享卡片已保存');
                }).catch(() => {
                    showToast('图片生成失败');
                });
            } else if (type === 'wechat' || type === 'qq') {
                if (navigator.share) {
                    navigator.share({ title: shareTitle, text: shareText, url: shareUrl }).catch(() => {});
                } else {
                    navigator.clipboard.writeText(shareUrl + '\n\n' + shareText).then(() => {
                        showToast(type === 'wechat' ? '💬 已复制，请粘贴到微信' : 'Q 已复制，请粘贴到QQ');
                    });
                }
            }
            document.getElementById('shareModal').classList.remove('show');
        }

        function drawRoundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.arcTo(x + w, y, x + w, y + r, r);
            ctx.lineTo(x + w, y + h - r);
            ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
            ctx.lineTo(x + r, y + h);
            ctx.arcTo(x, y + h, x, y + h - r, r);
            ctx.lineTo(x, y + r);
            ctx.arcTo(x, y, x + r, y, r);
            ctx.closePath();
        }

        async function generateShareCard(post) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const W = 600, H = 800;
            canvas.width = W * 2; canvas.height = H * 2;
            ctx.scale(2, 2);

            const grad = ctx.createLinearGradient(0, 0, W, H);
            grad.addColorStop(0, '#5B4AE0');
            grad.addColorStop(1, '#4438B0');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.beginPath(); ctx.arc(80, 80, 120, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(W - 60, H - 60, 160, 0, Math.PI * 2); ctx.fill();

            const pad = 30;
            const cw = W - pad * 2, ch = H - 180;
            ctx.fillStyle = 'white';
            drawRoundRect(ctx, pad, 80, cw, ch, 16);
            ctx.fill();

            ctx.fillStyle = '#1a1a1a';
            ctx.font = 'bold 22px -apple-system, sans-serif';
            ctx.textAlign = 'left';
            let y = 120;
            const title = post ? (post.card_name || '卡域社区') : '卡域 Card Realm';
            ctx.fillText(title, pad + 20, y);

            y += 40;
            ctx.fillStyle = '#666';
            ctx.font = '16px -apple-system, sans-serif';
            const note = post ? (post.note || '') : '发现卡牌价值，分享收藏乐趣';
            const maxChars = 28;
            const lines = note.length > maxChars ? [note.slice(0, maxChars) + '…'] : [note];
            lines.forEach(line => { ctx.fillText(line, pad + 20, y); y += 26; });

            if (post && post.estimated_price) {
                y += 20;
                ctx.fillStyle = '#e74c3c';
                ctx.font = 'bold 28px -apple-system, sans-serif';
                ctx.fillText('¥' + (post.estimated_price || 0).toLocaleString(), pad + 20, y);
                ctx.fillStyle = '#999';
                ctx.font = '14px -apple-system, sans-serif';
                ctx.fillText('AI 估价', pad + 20, y + 22);
            }

            y = H - 100;
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = '14px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('扫码打开「卡域」查看更多', W / 2, y);
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = '12px -apple-system, sans-serif';
            ctx.fillText('cardrealm.shop', W / 2, y + 22);

            const link = document.createElement('a');
            link.download = '卡域分享_' + (post ? post.id : '社区') + '.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                // For demo, all tabs show same content
                loadPosts();
            });
        });

        init();
    </script>
</body>
</html>
