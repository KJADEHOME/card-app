<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>订单详情 - 卡域 Card Realm</title>
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent; color: var(--text);
        }
        .header {
            background: var(--white); padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
        }
        .back { font-size: 20px; text-decoration: none; color: var(--text); }
        .header-title { font-size: 17px; font-weight: 700; }

        .content { max-width: 560px; margin: 0 auto; padding: 16px; }

        /* ===== Status Timeline ===== */
        .status-timeline {
            background: var(--white); border-radius: var(--radius);
            padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .status-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .timeline { position: relative; padding-left: 30px; }
        .timeline::before {
            content: ''; position: absolute; left: 10px; top: 8px; bottom: 8px;
            width: 2px; background: var(--border);
        }
        .timeline-item { position: relative; padding-bottom: 20px; }
        .timeline-item:last-child { padding-bottom: 0; }
        .timeline-dot {
            position: absolute; left: -25px; top: 8px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--border); border: 2px solid white;
        }
        .timeline-item.active .timeline-dot { background: var(--primary); }
        .timeline-item.done .timeline-dot { background: #4caf50; }
        .timeline-time { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
        .timeline-text { font-size: 14px; font-weight: 500; }

        /* ===== Order Info ===== */
        .info-card {
            background: var(--white); border-radius: var(--radius);
            padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .info-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .info-label { color: var(--text-secondary); }
        .info-value { font-weight: 500; }

        /* ===== Tracking ===== */
        .tracking-card {
            background: var(--white); border-radius: var(--radius);
            padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow);
        }
        .tracking-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .tracking-no { font-size: 13px; color: var(--text-secondary); }
        .tracking-list { max-height: 300px; overflow-y: auto; }
        .tracking-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
        .tracking-time { font-size: 12px; color: var(--text-secondary); white-space: nowrap; min-width: 80px; }
        .tracking-desc { font-size: 13px; flex: 1; }

        /* ===== Actions ===== */
        .actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
        .btn { padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; color: var(--primary); border: 1px solid var(--primary); }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .empty { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="header">
        <a href="my-orders.html" class="back">‹</a>
        <div class="header-title">订单详情</div>
    </div>

    <div class="content" id="content">
        <div class="loading">加载中...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        const STATUS_MAP = {
            'pending': { text: '待支付', icon: '⏳' },
            'paid': { text: '已支付', icon: '✅' },
            'shipped': { text: '已发货', icon: '🚚' },
            'delivered': { text: '已送达', icon: '📦' },
            'completed': { text: '已完成', icon: '🎉' },
            'cancelled': { text: '已取消', icon: '❌' },
            'refund_requested': { text: '退款申请中', icon: '💰' },
            'refunded': { text: '已退款', icon: '💰' },
            'disputed': { text: '争议中', icon: '⚠️' }
        };

        let orderId = null;
        let order = null;

        async function init() {
            const params = new URLSearchParams(window.location.search);
            orderId = params.get('id');
            if (!orderId) { showError('订单ID缺失'); return; }

            const { data: { user } } = await db.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }

            loadOrder();
        }

        async function loadOrder() {
            const { data, error } = await db
                .from('orders')
                .select(`
                    *,
                    consignments(*),
                    products(*)
                `)
                .eq('id', orderId)
                .single();

            if (error || !data) { showError('订单不存在'); return; }

            order = data;
            renderOrder();
            if (order.tracking_no) loadTracking();
        }

        function renderOrder() {
            const status = STATUS_MAP[order.status] || { text: order.status, icon: '📋' };
            const item = order.consignments || order.products;
            const itemName = order.consignments?.card_name || order.products?.name || '商品';
            const itemImage = order.consignments?.image_url || order.products?.image_url || '';

            let html = '';

            // Status Timeline
            html += `
                <div class="status-timeline">
                    <div class="status-title">${status.icon} ${status.text}</div>
                    <div class="timeline">
                        <div class="timeline-item ${order.status !== 'cancelled' && order.status !== 'refunded' ? 'active' : ''}">
                            <div class="timeline-dot"></div>
                            <div class="timeline-time">${formatTime(order.created_at)}</div>
                            <div class="timeline-text">订单创建</div>
                        </div>
                        ${order.status === 'paid' || order.status === 'shipped' || order.status === 'delivered' || order.status === 'completed' ? `
                        <div class="timeline-item done">
                            <div class="timeline-dot"></div>
                            <div class="timeline-time">${formatTime(order.paid_at)}</div>
                            <div class="timeline-text">支付完成</div>
                        </div>
                        ` : ''}
                        ${order.status === 'shipped' || order.status === 'delivered' || order.status === 'completed' ? `
                        <div class="timeline-item done">
                            <div class="timeline-dot"></div>
                            <div class="timeline-time">${formatTime(order.shipped_at)}</div>
                            <div class="timeline-text">卖家已发货</div>
                        </div>
                        ` : ''}
                        ${order.status === 'delivered' || order.status === 'completed' ? `
                        <div class="timeline-item done">
                            <div class="timeline-dot"></div>
                            <div class="timeline-time">${formatTime(order.delivered_at)}</div>
                            <div class="timeline-text">已送达</div>
                        </div>
                        ` : ''}
                        ${order.status === 'completed' ? `
                        <div class="timeline-item done">
                            <div class="timeline-dot"></div>
                            <div class="timeline-time">${formatTime(order.completed_at)}</div>
                            <div class="timeline-text">交易完成</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;

            // Order Info
            html += `
                <div class="info-card">
                    <div class="info-title">📦 商品信息</div>
                    <div style="display:flex;gap:12px;margin-bottom:12px;">
                        <div style="width:60px;height:60px;background:#f5f5f5;border-radius:8px;background-image:url(${itemImage});background-size:cover;background-position:center;flex-shrink:0;"></div>
                        <div style="flex:1;">
                            <div style="font-weight:600;font-size:14px;margin-bottom:4px;">${itemName}</div>
                            <div style="color:#888;font-size:13px;">单价: ¥${order.unit_price?.toFixed(2) || order.total_amount.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="info-row"><span class="info-label">订单编号</span><span class="info-value">${order.order_no}</span></div>
                    <div class="info-row"><span class="info-label">创建时间</span><span class="info-value">${new Date(order.created_at).toLocaleString('zh-CN')}</span></div>
                </div>
            `;

            // Shipping Info
            if (order.tracking_no) {
                html += `
                    <div class="tracking-card" id="trackingCard">
                        <div class="tracking-title">
                            <span>🚚 物流信息</span>
                        </div>
                        <div class="info-row"><span class="info-label">快递公司</span><span class="info-value">${order.shipping_carrier || '未知'}</span></div>
                        <div class="info-row"><span class="info-label">快递单号</span><span class="info-value">${order.tracking_no}</span></div>
                        <div id="trackingList" style="margin-top:12px;">
                            <div class="loading" style="padding:20px;">加载物流轨迹中...</div>
                        </div>
                    </div>
                `;
            }

            // Amount Info
            html += `
                <div class="info-card">
                    <div class="info-title">💰 金额明细</div>
                    <div class="info-row"><span class="info-label">商品总价</span><span class="info-value">¥${order.total_amount.toFixed(2)}</span></div>
                    <div class="info-row"><span class="info-label">运费</span><span class="info-value">¥0.00</span></div>
                    <div class="info-row" style="border-top:1px solid #eee;padding-top:12px;margin-top:8px;">
                        <span class="info-label" style="font-weight:700;">实付金额</span>
                        <span class="info-value" style="color:#5B4AE0;font-size:18px;font-weight:700;">¥${order.total_amount.toFixed(2)}</span>
                    </div>
                </div>
            `;

            document.getElementById('content').innerHTML = html;
        }

        // 加载物流轨迹（调用 Edge Function）
        async function loadTracking() {
            if (!order.tracking_no || !order.shipping_carrier) return;

            const trackingList = document.getElementById('trackingList');
            trackingList.innerHTML = '<div class="loading" style="padding:20px;">加载物流轨迹中...</div>';

            try {
                // 调用 logistics-tracker Edge Function
                const { data: { session } } = await db.auth.getSession();
                const response = await fetch('https://xybpcsmjjcnkjwfsuder.supabase.co/functions/v1/logistics-tracker', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${session?.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        company: order.shipping_carrier,
                        tracking_no: order.tracking_no
                    })
                });

                if (!response.ok) throw new Error('查询失败');

                const result = await response.json();
                
                if (result.success && result.timeline && result.timeline.length > 0) {
                    // 显示物流时间线
                    trackingList.innerHTML = result.timeline.map((item, idx) => `
                        <div class="tracking-item" style="${idx === 0 ? 'background:#f0edff;padding:10px;border-radius:8px;' : ''}">
                            <div class="tracking-time">${formatFullTime(item.time)}</div>
                            <div class="tracking-desc" style="${idx === 0 ? 'font-weight:600;color:#5B4AE0;' : ''}">${item.status}</div>
                        </div>
                    `).join('');
                } else {
                    // 如果没有轨迹数据，显示备用方案
                    showTrackingFallback();
                }
            } catch (e) {
                console.error('物流查询失败：', e);
                // 查询失败，显示备用方案
                showTrackingFallback();
            }
        }

        // 显示备用方案（链接到快递公司官网）
        function showTrackingFallback() {
            const links = {
                '顺丰': `https://www.sf-express.com/we/weisite/order/detail?nu=${order.tracking_no}`,
                '中通': `https://www.zto.com/kuaidi?num=${order.tracking_no}`,
                '圆通': `https://www.yto.net.cn/waybill/trace/${order.tracking_no}`,
                '韵达': `https://www.yundaexc.com/zhixin/waybill?waybillNo=${order.tracking_no}`,
                '申通': `https://www.sto.cn/query?num=${order.tracking_no}`,
                '百世': `https://www.800best.com/express/track?no=${order.tracking_no}`,
                '京东': `https://waybill.jd.com/waybillDetail?waybillCode=${order.tracking_no}`
            };

            const carrier = order.shipping_carrier || '';
            const link = links[carrier] || `https://www.kuaidi100.com/chaxun?nu=${order.tracking_no}`;

            document.getElementById('trackingList').innerHTML = `
                <div style="text-align:center;padding:20px;">
                    <div style="color:#888;font-size:13px;margin-bottom:12px;">点击查看完整物流轨迹</div>
                    <a href="${link}" target="_blank" style="display:inline-block;padding:10px 20px;background:var(--primary);color:white;border-radius:20px;text-decoration:none;font-size:14px;">
                        查看物流详情 ›
                    </a>
                </div>
            `;
        }

        // 获取快递公司代码（快递100）
        function getCarrierCode(carrier) {
            const map = {
                '顺丰': 'sf',
                '中通': 'zhongtong',
                '圆通': 'yuantong',
                '韵达': 'yunda',
                '申通': 'shentong',
                '百世': 'huitongkuaidi',
                '京东': 'jd'
            };
            return map[carrier] || 'auto';
        }

        function formatTime(ts) {
            if (!ts) return '--';
            return new Date(ts).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function formatFullTime(ts) {
            if (!ts) return '--';
            const d = new Date(ts);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = `<div class="empty">${msg}</div>`;
        }

        init();
    </script>
</body>
</html>
