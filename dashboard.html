<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>数据看板 - 卡域 Card Realm</title>
    <meta name="description" content="卡牌市场数据看板 - 涨跌排行、热门搜索、价格趋势">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --rise: #e74c3c;
            --fall: #27ae60;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--white);
            padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-back {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: var(--text);
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-category {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 4px;
            background: var(--primary-light);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Content */
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        /* Market Overview Cards */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 12px;
        }
        .overview-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px 10px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .overview-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .overview-num {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .overview-num.rise { color: var(--rise); }
        .overview-num.fall { color: var(--fall); }
        .overview-num.vol { color: var(--primary); }
        .overview-change {
            font-size: 11px;
            font-weight: 600;
        }
        .overview-change.rise { color: var(--rise); }
        .overview-change.fall { color: var(--fall); }
        .overview-change.vol { color: var(--primary); }

        /* Section Title */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 20px 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title span { display: flex; align-items: center; gap: 6px; }
        .section-more {
            font-size: 12px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        /* Rankings */
        .ranking-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .ranking-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
        }
        .ranking-header {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .ranking-header.rise { color: var(--rise); border-bottom-color: rgba(231,76,60,0.15); }
        .ranking-header.fall { color: var(--fall); border-bottom-color: rgba(39,174,96,0.15); }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f8f8f8;
        }
        .rank-item:last-child { border-bottom: none; }
        .rank-num {
            width: 20px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-align: center;
        }
        .rank-num.top { color: #F5A623; }
        .rank-info {
            flex: 1;
            margin-left: 8px;
            min-width: 0;
        }
        .rank-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rank-tag {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .rank-pct {
            font-size: 13px;
            font-weight: 700;
            text-align: right;
            min-width: 56px;
        }
        .rank-pct.rise { color: var(--rise); }
        .rank-pct.fall { color: var(--fall); }

        /* Trade Top10 */
        .trade-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .trade-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f8f8f8;
        }
        .trade-item:last-child { border-bottom: none; }
        .trade-rank {
            width: 24px; height: 24px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            color: var(--text-secondary);
            background: var(--bg);
            flex-shrink: 0;
        }
        .trade-rank.top { background: linear-gradient(135deg, #F5A623 0%, #FF8C00 100%); color: white; }
        .trade-info { flex: 1; margin-left: 10px; min-width: 0; }
        .trade-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .trade-tag { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
        .trade-price { font-size: 14px; font-weight: 700; color: var(--rise); min-width: 60px; text-align: right; }

        /* Volume Chart */
        .volume-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            margin-top: 12px;
        }
        .volume-area {
            height: 160px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px 6px;
            position: relative;
        }
        .volume-bar {
            width: 12px;
            background: linear-gradient(180deg, #5B4AE0 0%, #7B6CF0 100%);
            border-radius: 4px 4px 0 0;
            opacity: 0.8;
            transition: all 0.3s;
        }
        .volume-bar:hover { opacity: 1; }

        /* Hot Keywords */
        .keywords-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
        }
        .keyword-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f8f8f8;
        }
        .keyword-item:last-child { border-bottom: none; }
        .keyword-rank {
            width: 24px; height: 24px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 700;
            color: var(--text-secondary);
            background: var(--bg);
            flex-shrink: 0;
        }
        .keyword-rank.top { background: linear-gradient(135deg, #F5A623 0%, #FF8C00 100%); color: white; }
        .keyword-text {
            flex: 1;
            margin-left: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .keyword-trend {
            font-size: 12px;
            font-weight: 600;
            color: var(--rise);
            display: flex;
            align-items: center;
            gap: 2px;
        }

        /* Price Chart Section (placeholder for card detail page) */
        .chart-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            margin-top: 12px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chart-title { font-size: 14px; font-weight: 700; }
        .chart-tabs {
            display: flex;
            gap: 4px;
        }
        .chart-tab {
            padding: 4px 10px;
            border: none;
            background: var(--bg);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .chart-tab.active { background: var(--primary); color: white; }
        .chart-area {
            height: 160px;
            background: linear-gradient(180deg, var(--primary-light) 0%, transparent 100%);
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 10px 6px;
            position: relative;
        }
        .chart-bar {
            width: 8px;
            background: var(--primary);
            border-radius: 4px 4px 0 0;
            opacity: 0.7;
            transition: all 0.3s;
        }
        .chart-bar:hover { opacity: 1; }

        /* Bottom Nav */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 6px;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Notice */
        .notice {
            background: #FFF8E1;
            border: 1px solid #FFE082;
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 12px;
            color: #F57F17;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="header-back">←</a>
        <div class="header-title">📊 数据看板</div>
        <div class="header-category">
            <span>⚡</span> 宝可梦 PTCG
        </div>
    </div>

    <div class="content">
        <!-- Notice -->
        <div class="notice">
            <span>📢</span> 价格数据每日 12:00 更新，目前为演示数据，仅供参考
        </div>

        <!-- Market Overview -->
        <div class="overview-grid" id="overviewGrid">
            <div class="overview-card">
                <div class="overview-label">📈 涨幅卡牌</div>
                <div class="overview-num rise" id="risingCount">--</div>
                <div class="overview-change rise" id="risingChange">--</div>
            </div>
            <div class="overview-card">
                <div class="overview-label">📉 跌幅卡牌</div>
                <div class="overview-num fall" id="fallingCount">--</div>
                <div class="overview-change fall" id="fallingChange">--</div>
            </div>
            <div class="overview-card">
                <div class="overview-label">💰 成交量</div>
                <div class="overview-num vol" id="volumeCount">--</div>
                <div class="overview-change vol" id="volumeChange">--</div>
            </div>
        </div>

        <!-- Trade Stats Row -->
        <div class="overview-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
            <div class="overview-card">
                <div class="overview-label" style="font-size:10px;">📦 今日成交</div>
                <div class="overview-num vol" id="tradeOrders">--</div>
            </div>
            <div class="overview-card">
                <div class="overview-label" style="font-size:10px;">💵 今日GMV</div>
                <div class="overview-num rise" id="tradeGMV">--</div>
            </div>
            <div class="overview-card">
                <div class="overview-label" style="font-size:10px;">🏦 佣金收入</div>
                <div class="overview-num vol" id="tradeFees">--</div>
            </div>
            <div class="overview-card">
                <div class="overview-label" style="font-size:10px;">🛒 在售单数</div>
                <div class="overview-num vol" id="activeListings">--</div>
            </div>
        </div>

        <!-- Daily Rankings -->
        <div class="section-title">
            <span>🔥 今日涨跌 TOP5</span>
            <a href="#" class="section-more">查看完整排行 →</a>
        </div>
        <div class="ranking-row">
            <div class="ranking-card">
                <div class="ranking-header rise">📈 涨幅榜</div>
                <div id="riseList"></div>
            </div>
            <div class="ranking-card">
                <div class="ranking-header fall">📉 跌幅榜</div>
                <div id="fallList"></div>
            </div>
        </div>

        <!-- Trade Top10 -->
        <div class="section-title">
            <span>🏆 今日成交最高 TOP10</span>
            <span style="font-size:11px;color:var(--text-secondary);font-weight:400;">实时更新</span>
        </div>
        <div class="trade-card" id="tradeTopCard">
            <div id="tradeTopList"></div>
        </div>

        <!-- Hot Keywords -->
        <div class="section-title">
            <span>🔍 热门搜索关键词</span>
            <span style="font-size:11px;color:var(--text-secondary);font-weight:400;">更新于今日 12:00</span>
        </div>
        <div class="keywords-card" id="keywordsCard"></div>

        <!-- Price Trend Chart (Demo) -->
        <div class="section-title">
            <span>📊 市场趋势</span>
        </div>
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">PTCG 市场平均价格走势</div>
                <div class="chart-tabs">
                    <button class="chart-tab" data-days="7">7天</button>
                    <button class="chart-tab active" data-days="30">30天</button>
                    <button class="chart-tab" data-days="90">90天</button>
                </div>
            </div>
            <div class="chart-area" id="chartArea"></div>
        </div>

        <!-- Volume Chart -->
        <div class="section-title">
            <span>📈 交易量统计</span>
        </div>
        <div class="volume-card">
            <div class="chart-header">
                <div class="chart-title">近7日成交笔数</div>
            </div>
            <div class="volume-area" id="volumeArea"></div>
        </div>

        <div style="height:40px;"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🛒</span>市场</a>
        <a href="dashboard.html" class="nav-item active"><span class="nav-icon">📊</span>看板</a>
        <a href="collection.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        // Demo data - will be replaced with real data from Supabase
        const demoData = {
            overview: { rising: 0, falling: 0, volume: 0, risingChange: '--', fallingChange: '--', volumeChange: '--' },
            riseList: [],
            fallList: [],
            keywords: [
                { name: '皮卡丘', trend: '+35.2%' },
                { name: '喷火龙', trend: '+28.7%' },
                { name: '伊布', trend: '+18.9%' },
                { name: '超梦', trend: '+12.4%' },
                { name: '烈空坐', trend: '+11.3%' },
            ],
            chart30: [],
            tradeTop: [],
            volume7: []
        };

        function renderOverview(data) {
            document.getElementById('risingCount').textContent = data.rising || '--';
            document.getElementById('fallingCount').textContent = data.falling || '--';
            document.getElementById('volumeCount').textContent = (data.total || data.volume || 0).toLocaleString();
            document.getElementById('risingChange').textContent = '较昨日 ' + (data.risingChange || '--');
            document.getElementById('fallingChange').textContent = '较昨日 ' + (data.fallingChange || '--');
            document.getElementById('volumeChange').textContent = '较昨日 ' + (data.volumeChange || '--');
        }
        
        function renderTradeStats(data) {
            document.getElementById('tradeOrders').textContent = (data.today_orders || 0).toLocaleString();
            document.getElementById('tradeGMV').textContent = '¥' + ((data.today_gmv || 0) / 10000).toFixed(1) + '万';
            document.getElementById('tradeFees').textContent = '¥' + (data.today_fees || 0).toFixed(0);
            document.getElementById('activeListings').textContent = (data.active_listings || 0).toLocaleString();
        }

        function renderRankList(list, containerId, type) {
            const container = document.getElementById(containerId);
            if (!list || list.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:#999;font-size:12px;">暂无数据（等待价格更新）</div>';
                return;
            }
            container.innerHTML = list.map((item, i) => `
                <div class="rank-item">
                    <div class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</div>
                    <div class="rank-info">
                        <div class="rank-name">${item.name || item.card_name || ''}</div>
                        <div class="rank-tag">${item.tag || item.series || ''}${item.rarity ? ' · ' + item.rarity : ''}</div>
                    </div>
                    <div class="rank-pct ${type}">${item.pct || ''}</div>
                </div>
            `).join('');
        }

        function renderKeywords() {
            const container = document.getElementById('keywordsCard');
            container.innerHTML = demoData.keywords.map((kw, i) => `
                <div class="keyword-item">
                    <div class="keyword-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
                    <div class="keyword-text">${kw.name}</div>
                    <div class="keyword-trend">↑ ${kw.trend}</div>
                </div>
            `).join('');
        }

        function renderTradeTop() {
            const container = document.getElementById('tradeTopList');
            const list = demoData.tradeTop || [];
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:#999;font-size:13px;">暂无成交数据</div>';
                return;
            }
            container.innerHTML = list.map((item, i) => `
                <div class="trade-item">
                    <div class="trade-rank ${i < 3 ? 'top' : ''}">${i + 1}</div>
                    <div class="trade-info">
                        <div class="trade-name">${item.name}</div>
                        <div class="trade-tag">${item.tag || ''} · ${item.condition || 'NM'}</div>
                    </div>
                    <div class="trade-price">¥${(item.price || 0).toLocaleString()}</div>
                </div>
            `).join('');
        }

        function renderVolume(data) {
            const container = document.getElementById('volumeArea');
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#999;font-size:13px;">暂无数据</div>';
                return;
            }
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            container.innerHTML = data.map((v, i) => {
                const height = ((v - min) / range * 120 + 20) + 'px';
                return `<div class="volume-bar" style="height:${height}" title="${v}笔"></div>`;
            }).join('');
        }

        function renderChart(data) {
            const max = Math.max(...data);
            const min = Math.min(...data);
            const range = max - min || 1;
            const container = document.getElementById('chartArea');
            container.innerHTML = data.map((v, i) => {
                const height = ((v - min) / range * 120 + 20) + 'px';
                return `<div class="chart-bar" style="height:${height}" title="${v}"></div>`;
            }).join('');
        }

        // Chart tab switching
        document.querySelectorAll('.chart-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const days = parseInt(this.dataset.days);
                // Demo: generate different data for different periods
                if (days === 7) {
                    renderChart([120, 125, 118, 132, 128, 135, 142]);
                } else if (days === 90) {
                    renderChart([30, 35, 42, 38, 45, 52, 48, 55, 62, 58, 65, 72, 68, 75, 82, 78, 85, 92, 88, 95, 102, 98, 105, 112, 108, 115, 122, 118, 125, 132, 128, 135, 142, 138, 145, 150, 148, 155, 160, 158, 165, 170, 168, 175, 180]);
                } else {
                    renderChart(demoData.chart30);
                }
            });
        });

        // Load real data from Supabase card_prices
        async function loadRealData() {
            try {
                // 1. Get market overview
                const { data: overviewData } = await db.rpc('get_market_overview', { p_market: 'CN' });
                if (overviewData) {
                    const ov = {
                        rising: overviewData.rising || 0,
                        falling: overviewData.falling || 0,
                        total: overviewData.total || 0,
                        volume: overviewData.total || 0,
                        risingChange: overviewData.avg_change ? '均幅' + overviewData.avg_change + '%' : '--',
                        fallingChange: overviewData.avg_change ? '均幅' + overviewData.avg_change + '%' : '--',
                        volumeChange: overviewData.last_updated ? '更新于' + new Date(overviewData.last_updated).toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) : '--'
                    };
                    renderOverview(ov);
                }

                // Trade stats
                const { data: tradeStats } = await db.rpc('get_dashboard_trade_stats');
                if (tradeStats) {
                    renderTradeStats(tradeStats);
                }

                // 2. Rise TOP10 — card_prices sorted by change_percent DESC
                const { data: riseData } = await db
                    .from('card_prices')
                    .select('card_name, series, rarity, current_price, change_percent')
                    .eq('market', 'CN')
                    .gt('change_percent', 0)
                    .gt('current_price', 0)
                    .order('change_percent', { ascending: false })
                    .limit(5);

                if (riseData && riseData.length > 0) {
                    demoData.riseList = riseData.map(r => ({
                        name: r.card_name,
                        tag: (r.series || '') + (r.rarity && r.rarity !== 'N' ? ' · ' + r.rarity : ''),
                        pct: '+' + r.change_percent.toFixed(1) + '%',
                        price: r.current_price
                    }));
                }
                renderRankList(demoData.riseList, 'riseList', 'rise');

                // 3. Fall TOP10 — card_prices sorted by change_percent ASC (most negative first)
                const { data: fallData } = await db
                    .from('card_prices')
                    .select('card_name, series, rarity, current_price, change_percent')
                    .eq('market', 'CN')
                    .lt('change_percent', 0)
                    .gt('current_price', 0)
                    .order('change_percent', { ascending: true })
                    .limit(5);

                if (fallData && fallData.length > 0) {
                    demoData.fallList = fallData.map(f => ({
                        name: f.card_name,
                        tag: (f.series || '') + (f.rarity && f.rarity !== 'N' ? ' · ' + f.rarity : ''),
                        pct: f.change_percent.toFixed(1) + '%',
                        price: f.current_price
                    }));
                }
                renderRankList(demoData.fallList, 'fallList', 'fall');

                // 4. Trade TOP10 — highest priced cards
                const { data: topData } = await db
                    .from('card_prices')
                    .select('card_name, series, rarity, current_price, change_percent')
                    .eq('market', 'CN')
                    .gt('current_price', 0)
                    .order('current_price', { ascending: false })
                    .limit(10);

                if (topData && topData.length > 0) {
                    demoData.tradeTop = topData.map((t, i) => ({
                        name: t.card_name,
                        tag: (t.series || ''),
                        condition: (t.rarity !== 'N' ? t.rarity : 'NM'),
                        price: t.current_price,
                        change: t.change_percent ? (t.change_percent > 0 ? '+' : '') + t.change_percent.toFixed(1) + '%' : '--'
                    }));
                }
                renderTradeTop();

                // 5. Chart data — use last 30 price_history entries for market trend
                const { data: historyData } = await db
                    .from('price_history')
                    .select('price_mid, date')
                    .eq('market', 'CN')
                    .order('date', { ascending: true })
                    .limit(90);

                if (historyData && historyData.length > 5) {
                    demoData.chart30 = historyData.map(h => parseFloat(h.price_mid) || 0).filter(v => v > 0);
                    if (demoData.chart30.length > 30) demoData.chart30 = demoData.chart30.slice(-30);
                    renderChart(demoData.chart30);
                }

                // 6. Volume data from daily_market_stats
                const { data: statsData } = await db
                    .from('daily_market_stats')
                    .select('total_cards, date')
                    .eq('market', 'CN')
                    .order('date', { ascending: true })
                    .limit(7);

                if (statsData && statsData.length > 0) {
                    demoData.volume7 = statsData.map(s => s.total_cards || 0);
                }
                renderVolume(demoData.volume7);

                // Update notice
                const notice = document.querySelector('.notice');
                if (notice && overviewData?.last_updated) {
                    const t = new Date(overviewData.last_updated);
                    notice.innerHTML = `<span>📢</span> 价格数据更新于 ${t.toLocaleString('zh-CN')}`;
                }

            } catch (e) {
                console.log('Real data not available yet, using demo data:', e.message);
            }
        }

        // Init — load real data first, fallback to demo
        async function init() {
            // Show skeleton first
            renderOverview({ rising: '--', falling: '--', total: '--' });
            renderRankList([], 'riseList', 'rise');
            renderRankList([], 'fallList', 'fall');
            
            await loadRealData();
            
            // If no real data loaded, show empty states
            if (demoData.riseList.length === 0 && demoData.fallList.length === 0) {
                renderOverview({ rising: 0, falling: 0, total: 0, risingChange: '--', fallingChange: '--', volumeChange: '--' });
                renderKeywords();
                renderChart([]);
                renderVolume([]);
            }
        }

        init();
    </script>
</body>
</html>
