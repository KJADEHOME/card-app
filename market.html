<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5B4AE0">
    <title>交易市场 - 卡域</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F7F8FC; min-height: 100vh; padding-bottom: 80px; }
        
        .header { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); color: white; padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 18px; font-weight: 700; }
        .header-sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        
        .search-bar { 
            background: white; padding: 12px 16px; display: flex; gap: 10px; 
            align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 60px; z-index: 99;
        }
        .search-input { 
            flex: 1; padding: 10px 14px; border: 1.5px solid #E8E8F0; border-radius: 12px; 
            font-size: 14px; outline: none; background: #FAFAFF;
        }
        .search-input:focus { border-color: #5B4AE0; }
        .search-btn { 
            padding: 10px 16px; background: #5B4AE0; color: white; border: none; 
            border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer;
        }
        
        .filters { 
            background: white; padding: 10px 16px; display: flex; gap: 8px; 
            overflow-x: auto; border-bottom: 1px solid #eee; scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-chip { 
            padding: 6px 14px; border-radius: 20px; border: 1.5px solid #E8E8F0; 
            font-size: 12px; white-space: nowrap; cursor: pointer; background: white; flex-shrink: 0;
        }
        .filter-chip.active { border-color: #5B4AE0; background: #F5F3FF; color: #5B4AE0; font-weight: 600; }
        
        .sort-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 16px; font-size: 13px; color: #666;
        }
        .sort-options { display: flex; gap: 12px; }
        .sort-option { cursor: pointer; }
        .sort-option.active { color: #5B4AE0; font-weight: 600; }
        
        .container { max-width: 480px; margin: 0 auto; padding: 8px 16px 16px; }
        
        .consignment-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        
        .consignment-card { 
            background: white; border-radius: 16px; overflow: hidden; 
            box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s;
        }
        .consignment-card:active { transform: scale(0.97); }
        .consignment-img { 
            width: 100%; aspect-ratio: 3/4; object-fit: cover; background: linear-gradient(135deg, #f0f0f5, #e8e8f0);
        }
        .consignment-info { padding: 12px; }
        .consignment-name { font-size: 14px; font-weight: 700; color: #1a1a2e; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .consignment-series { font-size: 11px; color: #999; margin-top: 4px; }
        .consignment-meta { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
        .consignment-tag { font-size: 10px; padding: 2px 8px; border-radius: 6px; background: #F0F0F8; color: #666; }
        .consignment-tag.rarity { background: linear-gradient(135deg, #FFF8E1, #FFECB3); color: #D4880F; }
        .consignment-tag.condition-nm { background: #E8F5E9; color: #2E7D32; }
        .consignment-tag.condition-lp { background: #FFF3E0; color: #E65100; }
        
        .consignment-price-row { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0f0f5;
        }
        .consignment-price { font-size: 18px; font-weight: 800; color: #E74C3C; }
        .consignment-price .currency { font-size: 12px; font-weight: 600; }
        .buy-btn { 
            padding: 6px 14px; background: linear-gradient(135deg, #5B4AE0, #7B6CF0); 
            color: white; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer;
        }
        
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state .text { font-size: 14px; color: #999; }
        
        /* Detail Modal */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; 
            display: none; align-items: flex-end; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-content { 
            background: white; width: 100%; max-width: 480px; max-height: 90vh; 
            border-radius: 24px 24px 0 0; overflow-y: auto; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; }
        .modal-body { padding: 20px; }
        .modal-name { font-size: 20px; font-weight: 800; color: #1a1a2e; }
        .modal-series { font-size: 14px; color: #888; margin-top: 4px; }
        .modal-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .modal-tag { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
        .modal-tag.rarity { background: linear-gradient(135deg, #FFF8E1, #FFECB3); color: #D4880F; }
        .modal-tag.condition { background: #E8F5E9; color: #2E7D32; }
        
        .modal-desc { 
            background: #F7F8FC; border-radius: 12px; padding: 14px; margin-top: 16px; 
            font-size: 13px; color: #555; line-height: 1.6;
        }
        .modal-desc-label { font-weight: 700; color: #333; margin-bottom: 6px; }
        
        .seller-info { 
            display: flex; align-items: center; gap: 10px; margin-top: 16px; 
            padding: 12px; background: #F7F8FC; border-radius: 12px;
        }
        .seller-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #5B4AE0, #7B6CF0); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; }
        .seller-name { font-size: 14px; font-weight: 700; color: #333; }
        .seller-rating { font-size: 11px; color: #F5A623; }
        
        .modal-price-section { 
            position: sticky; bottom: 0; background: white; padding: 16px 20px 24px; 
            border-top: 1px solid #eee; display: flex; align-items: center; gap: 16px;
        }
        .modal-price-info { flex: 1; }
        .modal-price-label { font-size: 12px; color: #999; }
        .modal-price-value { font-size: 28px; font-weight: 800; color: #E74C3C; }
        .modal-price-shipping { font-size: 12px; color: #666; }
        .modal-buy-btn { 
            padding: 14px 32px; background: linear-gradient(135deg, #E74C3C, #C0392B); 
            color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 16px rgba(231,76,60,0.35);
        }
        .modal-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Nav */
        .nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            display: flex; justify-content: space-around; padding: 8px 0 16px; 
            box-shadow: 0 -2px 20px rgba(0,0,0,0.08); z-index: 100;
        }
        .nav-item { text-decoration: none; color: #999; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 4px 12px; }
        .nav-item .nav-icon { font-size: 22px; }
        .nav-item.active { color: #5B4AE0; }
        
        .sell-fab { 
            position: fixed; bottom: 80px; right: 16px; width: 56px; height: 56px; 
            border-radius: 50%; background: linear-gradient(135deg, #5B4AE0, #7B6CF0); 
            color: white; border: none; font-size: 24px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(91,74,224,0.4); display: flex; align-items: center; justify-content: center;
            z-index: 90;
        }
        
        .toast { 
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); 
            background: #333; color: white; padding: 12px 24px; border-radius: 12px; 
            font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🛒 交易市场</div>
        <div class="header-sub">发现心仪的卡牌，安全交易</div>
    </div>
    
    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索卡牌名称、系列...">
        <button class="search-btn" onclick="searchCards()">搜索</button>
    </div>
    
    <div class="filters" id="filters">
        <div class="filter-chip active" data-cat="" onclick="filterCategory(this)">全部</div>
        <div class="filter-chip" data-cat="pokemon" onclick="filterCategory(this)">宝可梦</div>
        <div class="filter-chip" data-cat="yugioh" onclick="filterCategory(this)">游戏王</div>
        <div class="filter-chip" data-cat="magic" onclick="filterCategory(this)">万智牌</div>
        <div class="filter-chip" data-cat="onepiece" onclick="filterCategory(this)">海贼王</div>
        <div class="filter-chip" data-cat="lorcana" onclick="filterCategory(this)">Lorcana</div>
    </div>
    
    <div class="sort-bar">
        <span id="resultCount">加载中...</span>
        <div class="sort-options">
            <span class="sort-option active" onclick="sortBy('newest')">最新</span>
            <span class="sort-option" onclick="sortBy('price_asc')">价格↑</span>
            <span class="sort-option" onclick="sortBy('price_desc')">价格↓</span>
        </div>
    </div>
    
    <div class="container">
        <div class="consignment-grid" id="consignmentGrid"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="icon">📭</div>
            <div class="text">暂无寄售卡牌，去发布一张吧</div>
        </div>
    </div>
    
    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" id="modalContent">
            <!-- Dynamic content -->
        </div>
    </div>
    
    <!-- Nav -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="community.html" class="nav-item"><span class="nav-icon">🌍</span>社区</a>
        <a href="collection.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>
    
    <button class="sell-fab" onclick="location.href='sell.html'" title="发布寄售">+</button>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentSort = 'newest';
        let currentCategory = '';
        let consignments = [];
        let currentUserId = null;
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        
        async function init() {
            const { data: { session } } = await db.auth.getSession();
            currentUserId = session?.user?.id || null;
            loadConsignments();
        }
        
        async function loadConsignments() {
            let query = db.from('consignments')
                .select('*')
                .eq('status', 'active');
            
            if (currentCategory) {
                query = query.eq('card_category', currentCategory);
            }
            
            const search = document.getElementById('searchInput').value.trim();
            if (search) {
                query = query.or(`card_name.ilike.%${search}%,series.ilike.%${search}%`);
            }
            
            if (currentSort === 'newest') query = query.order('created_at', { ascending: false });
            else if (currentSort === 'price_asc') query = query.order('asking_price', { ascending: true });
            else if (currentSort === 'price_desc') query = query.order('asking_price', { ascending: false });
            
            const { data, error } = await query.limit(50);
            
            if (error) {
                console.error(error);
                showToast('加载失败');
                return;
            }
            
            consignments = data || [];
            renderConsignments();
        }
        
        function renderConsignments() {
            const grid = document.getElementById('consignmentGrid');
            const empty = document.getElementById('emptyState');
            
            document.getElementById('resultCount').textContent = `共 ${consignments.length} 件`;
            
            if (consignments.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            
            empty.style.display = 'none';
            grid.innerHTML = consignments.map(c => `
                <div class="consignment-card" onclick="openDetail('${c.id}')">
                    <img class="consignment-img" src="${c.card_image || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${c.card_name}">
                    <div class="consignment-info">
                        <div class="consignment-name">${c.card_name}</div>
                        <div class="consignment-series">${c.series || '未知系列'}</div>
                        <div class="consignment-meta">
                            <span class="consignment-tag rarity">${c.rarity || 'N'}</span>
                            <span class="consignment-tag condition-${(c.condition || 'nm').toLowerCase()}">${c.condition || 'NM'}</span>
                        </div>
                        <div class="consignment-price-row">
                            <div class="consignment-price"><span class="currency">¥</span>${c.asking_price?.toFixed(2) || '0.00'}</div>
                            <button class="buy-btn" onclick="event.stopPropagation();openDetail('${c.id}')">购买</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function filterCategory(el) {
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCategory = el.dataset.cat;
            loadConsignments();
        }
        
        function sortBy(sort) {
            currentSort = sort;
            document.querySelectorAll('.sort-option').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            loadConsignments();
        }
        
        function searchCards() {
            loadConsignments();
        }
        
        function openDetail(id) {
            const c = consignments.find(x => x.id === id);
            if (!c) return;
            
            const isMine = currentUserId === c.seller_id;
            
            document.getElementById('modalContent').innerHTML = `
                <img class="modal-img" src="${c.card_image || 'https://via.placeholder.com/400x530?text=No+Image'}" alt="${c.card_name}">
                <div class="modal-body">
                    <div class="modal-name">${c.card_name}</div>
                    <div class="modal-series">${c.series || '未知系列'} · ${c.card_category || 'pokemon'}</div>
                    <div class="modal-tags">
                        <span class="modal-tag rarity">${c.rarity || 'N'}</span>
                        <span class="modal-tag condition">品相 ${c.condition || 'NM'}</span>
                        ${(c.tags || []).map(t => `<span class="modal-tag" style="background:#F0F0F8;color:#666;">${t}</span>`).join('')}
                    </div>
                    
                    <div class="modal-desc">
                        <div class="modal-desc-label">📝 卖家描述</div>
                        ${c.description || '卖家未填写详细描述'}
                    </div>
                    
                    <div class="seller-info">
                        <div class="seller-avatar">卖</div>
                        <div>
                            <div class="seller-name">卖家 #${c.seller_id?.slice(0, 6) || '未知'}</div>
                            <div class="seller-rating">⭐⭐⭐⭐⭐ 信誉良好</div>
                        </div>
                    </div>
                </div>
                <div class="modal-price-section">
                    <div class="modal-price-info">
                        <div class="modal-price-label">售价</div>
                        <div class="modal-price-value">¥${c.asking_price?.toFixed(2)}</div>
                        <div class="modal-price-shipping">${c.shipping_fee > 0 ? `运费 ¥${c.shipping_fee}` : '包邮'}</div>
                    </div>
                    <button class="modal-buy-btn" onclick="buyNow('${c.id}')" ${isMine ? 'disabled' : ''}>
                        ${isMine ? '自己的商品' : '立即购买'}
                    </button>
                </div>
            `;
            document.getElementById('detailModal').classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal(e) {
            if (e.target.id === 'detailModal') {
                document.getElementById('detailModal').classList.remove('show');
                document.body.style.overflow = '';
            }
        }
        
        async function buyNow(consignmentId) {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                showToast('请先登录');
                setTimeout(() => location.href = 'login.html', 1500);
                return;
            }
            
            // Redirect to order page
            location.href = `order.html?consignment_id=${consignmentId}`;
        }
        
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') searchCards();
        });
        
        init();
    </script>
</body>
</html>
