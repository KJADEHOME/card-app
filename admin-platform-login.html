<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡域 - 平台管理员登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: white; border-radius: 20px; padding: 40px 30px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; }
        .logo-title { font-size: 26px; font-weight: bold; color: #333; }
        .logo-subtitle { font-size: 13px; color: #888; margin-top: 6px; }
        .badge { display: inline-block; background: linear-gradient(135deg, #ff6b6b, #ee5a6f); color: white; font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-top: 8px; }
        .input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; margin-bottom: 15px; }
        .input:focus { border-color: #667eea; outline: none; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg { color: #f44336; font-size: 13px; text-align: center; margin-top: 12px; min-height: 20px; }
        .msg.success { color: #4caf50; }
        .loading { display: inline-block; width: 16px; height: 16px; border: 2px solid white; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hint { font-size: 12px; color: #999; text-align: center; margin-top: 20px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <div class="logo-icon">🛡️</div>
            <div class="logo-title">平台发行后台</div>
            <div class="logo-subtitle">CardRealm Platform Issuer</div>
            <div class="badge">统一管理员认证</div>
        </div>

        <input type="email" class="input" id="email" autocomplete="username" placeholder="管理员邮箱">
        <input type="password" class="input" id="password" autocomplete="current-password" placeholder="密码">

        <button class="btn" id="loginBtn" type="button">登录</button>
        <div class="msg" id="msg" role="status" aria-live="polite"></div>

        <div class="hint">使用 Supabase Auth 管理员账号登录</div>
    </div>

    <script src="js/risk-control.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>
        const db = AdminAuth.getSupabaseClient();

        function setMessage(text, success = false) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.classList.toggle('success', success);
        }

        async function adminLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                setMessage('请输入邮箱和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';
            setMessage('');

            try {
                const { error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;

                const ctx = await AdminAuth.requireAdmin({ redirect: false });
                if (!ctx) {
                    await db.auth.signOut();
                    throw new Error('该账号没有管理员权限');
                }

                setMessage('登录成功，正在进入后台…', true);
                window.setTimeout(() => {
                    window.location.href = 'admin-platform-publish.html';
                }, 300);
            } catch (error) {
                setMessage('登录失败：' + (error?.message || String(error)));
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        document.getElementById('loginBtn').addEventListener('click', adminLogin);
        document.getElementById('password').addEventListener('keydown', (event) => {
            if (event.key === 'Enter') adminLogin();
        });

        document.addEventListener('DOMContentLoaded', async () => {
            const ctx = await AdminAuth.requireAdmin({ redirect: false });
            if (ctx) window.location.replace('admin-platform-publish.html');
        });
    </script>
</body>
</html>
