<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡域 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; margin-bottom: 10px; }
        .logo-title { font-size: 28px; font-weight: bold; }
        .logo-subtitle { font-size: 14px; color: #999; margin-top: 5px; }
        .tab-nav { display: flex; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; }
        .tab-item { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-item.active { color: #667eea; border-bottom-color: #667eea; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #666; font-size: 13px; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg { color: #f44336; font-size: 12px; margin-top: 5px; display: none; }
        .guest-link { text-align: center; margin-top: 15px; color: #667eea; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🃏</div>
            <div class="logo-title">卡域</div>
            <div class="logo-subtitle">CardRealm</div>
        </div>
        
        <div class="tab-nav">
            <div class="tab-item active" onclick="switchTab('login')" id="tab-login">登录</div>
            <div class="tab-item" onclick="switchTab('register')" id="tab-register">注册</div>
        </div>
        
        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <div class="error-msg" id="loginError"></div>
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="至少6位" required minlength="6">
            </div>
            <div class="error-msg" id="regError"></div>
            <button type="submit" class="login-btn" id="regBtn">注册</button>
        </form>
        
        <div class="guest-link" onclick="guestLogin()">👤 游客模式（暂不登录）</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = 'block';
        }

        // 登录
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loginError').style.display = 'none';
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').textContent = '登录中...';

            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });

            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').textContent = '登录';

            if (error) {
                showError('loginError', error.message);
            } else {
                localStorage.setItem('currentUser', data.user.email);
                window.location.href = 'collection.html';
            }
        });

        // 注册
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('regError').style.display = 'none';
            document.getElementById('regBtn').disabled = true;
            document.getElementById('regBtn').textContent = '注册中...';

            const { data, error } = await supabase.auth.signUp({
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                options: { data: { username: document.getElementById('regUsername').value } }
            });

            document.getElementById('regBtn').disabled = false;
            document.getElementById('regBtn').textContent = '注册';

            if (error) {
                showError('regError', error.message);
            } else {
                // 创建用户资料
                await supabase.from('profiles').insert([{
                    id: data.user.id,
                    username: document.getElementById('regUsername').value
                }]);
                alert('注册成功！请登录');
                switchTab('login');
            }
        });

        // 游客模式
        function guestLogin() {
            localStorage.setItem('isGuest', 'true');
            localStorage.setItem('currentUser', '游客');
            window.location.href = 'collection.html';
        }

        // 检查是否已登录
        (async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) window.location.href = 'collection.html';
        })();
    </script>
</body>
</html>
