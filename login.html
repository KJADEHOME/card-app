<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 卡域 CardRealm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        input:focus { outline: none; border-color: #667eea; }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        
        .switch-mode {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .switch-mode a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        
        .error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #fee;
            border-radius: 8px;
            display: none;
        }
        
        .success {
            color: #27ae60;
            text-align: center;
            margin-bottom: 15px;
            padding: 10px;
            background: #efe;
            border-radius: 8px;
            display: none;
        }
        
        .hint {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🃏 卡域</h1>
        <p class="subtitle" id="modeText">登录你的账号</p>
        
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        
        <input type="text" id="username" placeholder="用户名（至少3个字符）" autocomplete="off">
        <input type="password" id="password" placeholder="密码（至少6个字符）">
        
        <button onclick="handleSubmit()" id="submitBtn">登录</button>
        
        <div class="switch-mode">
            <span id="switchText">还没有账号？</span>
            <a onclick="toggleMode()" id="switchLink">立即注册</a>
        </div>
        
        <div class="hint">
            💡 提示：每个设备可以注册多个账号<br>
            数据保存在当前设备，换设备需重新注册
        </div>
    </div>

    <script>
        let isLoginMode = true;
        
        // 检查是否已登录
        if (localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }
        
        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('modeText').textContent = isLoginMode ? '登录你的账号' : '创建新账号';
            document.getElementById('submitBtn').textContent = isLoginMode ? '登录' : '注册';
            document.getElementById('switchText').textContent = isLoginMode ? '还没有账号？' : '已有账号？';
            document.getElementById('switchLink').textContent = isLoginMode ? '立即注册' : '立即登录';
            hideMessages();
        }
        
        function showError(msg) {
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function showSuccess(msg) {
            document.getElementById('successMsg').textContent = msg;
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        
        function hideMessages() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }
        
        function handleSubmit() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // 验证输入
            if (!username || !password) {
                showError('请填写用户名和密码');
                return;
            }
            
            if (username.length < 3) {
                showError('用户名至少3个字符');
                return;
            }
            
            if (password.length < 6) {
                showError('密码至少6个字符');
                return;
            }
            
            // 获取已注册用户
            let users = {};
            try {
                users = JSON.parse(localStorage.getItem('cardUsers') || '{}');
            } catch(e) {
                users = {};
            }
            
            if (isLoginMode) {
                // 登录
                if (users[username] && users[username].password === password) {
                    localStorage.setItem('currentUser', username);
                    showSuccess('登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                } else {
                    showError('用户名或密码错误');
                }
            } else {
                // 注册
                if (users[username]) {
                    showError('用户名已被注册，请换一个');
                } else {
                    users[username] = { 
                        password: password, 
                        createdAt: new Date().toISOString() 
                    };
                    localStorage.setItem('cardUsers', JSON.stringify(users));
                    localStorage.setItem('currentUser', username);
                    showSuccess('注册成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 500);
                }
            }
        }
        
        // 回车键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>
</html>
