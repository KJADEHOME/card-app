<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡域 - 登录</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="卡域">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        
        .logo-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
        }
        
        .logo-subtitle {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }
        
        .tab-nav {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .tab-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        
        .tab-item.active {
            color: #667eea;
            border-bottom-color: #667eea;
            font-weight: bold;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #666;
            font-size: 13px;
        }
        
        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .guest-link {
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            font-size: 14px;
            cursor: pointer;
        }
        
        .error-msg {
            color: #f44336;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .success-msg {
            color: #4caf50;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🃏</div>
            <div class="logo-title">卡域</div>
            <div class="logo-subtitle">CardRealm</div>
        </div>
        
        <div class="tab-nav">
            <div class="tab-item active" onclick="switchTab('login')" id="tab-login">登录</div>
            <div class="tab-item" onclick="switchTab('register')" id="tab-register">注册</div>
        </div>
        
        <!-- 登录表单 -->
        <form id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="请输入邮箱" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            
            <div class="error-msg" id="loginError"></div>
            
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>
        
        <!-- 注册表单 -->
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="请输入用户名" required>
            </div>
            
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="请输入邮箱" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required minlength="6">
            </div>
            
            <div class="error-msg" id="regError"></div>
            <div class="success-msg" id="regSuccess"></div>
            
            <button type="submit" class="login-btn" id="regBtn">注册</button>
        </form>
        
        <div class="guest-link" onclick="guestLogin()">👤 游客模式（暂不登录）</div>
    </div>
    
    <script src="js/supabase.js"></script>
    <script>
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }
        
        // 显示错误信息
        function showError(elementId, message) {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.style.display = 'block';
        }
        
        // 隐藏错误信息
        function hideError(elementId) {
            document.getElementById(elementId).style.display = 'none';
        }
        
        // 设置按钮加载状态
        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? '登录' : '注册';
            }
        }
        
        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError('loginError');
            setLoading('loginBtn', true);
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const result = await CardRealmDB.signIn(email, password);
            
            setLoading('loginBtn', false);
            
            if (result.success) {
                alert('✅ 登录成功！');
                window.location.href = 'index.html';
            } else {
                showError('loginError', result.error || '登录失败，请检查邮箱和密码');
            }
        });
        
        // 注册表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            hideError('regError');
            document.getElementById('regSuccess').style.display = 'none';
            setLoading('regBtn', true);
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const result = await CardRealmDB.signUp(email, password, username);
            
            setLoading('regBtn', false);
            
            if (result.success) {
                document.getElementById('regSuccess').textContent = '✅ 注册成功！请检查邮箱验证邮件，然后登录。';
                document.getElementById('regSuccess').style.display = 'block';
                setTimeout(() => switchTab('login'), 2000);
            } else {
                showError('regError', result.error || '注册失败，请重试');
            }
        });
        
        // 游客登录
        function guestLogin() {
            localStorage.setItem('currentUser', '游客');
            localStorage.setItem('isGuest', 'true');
            window.location.href = 'index.html';
        }
        
        // 检查是否已登录
        (async function() {
            await CardRealmDB.initSupabase();
            const user = await CardRealmDB.getCurrentUser();
            if (user) {
                window.location.href = 'index.html';
            }
        })();
        
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then((reg) => console.log('Service Worker 注册成功:', reg))
                .catch((err) => console.log('Service Worker 注册失败:', err));
        }
    </script>
</body>
</html>
