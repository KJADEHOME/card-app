<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡域 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .box { background: white; border-radius: 20px; padding: 40px 30px; width: 100%; max-width: 350px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; }
        .logo-title { font-size: 28px; font-weight: bold; }
        .input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn:disabled { opacity: 0.6; }
        .link { text-align: center; color: #667eea; cursor: pointer; margin-top: 15px; }
        .msg { color: #f44336; font-size: 12px; text-align: center; margin-bottom: 10px; min-height: 18px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <div class="logo-icon">🃏</div>
            <div class="logo-title">卡域</div>
        </div>
        
        <input type="email" class="input" id="email" placeholder="邮箱">
        <input type="password" class="input" id="pwd" placeholder="密码">
        <div class="msg" id="msg"></div>
        <button class="btn" onclick="login()" id="btn">登录</button>
        <button class="btn" onclick="register()" id="regBtn" style="background: #4caf50;">注册新账号</button>
        <div class="link" onclick="guest()">👤 游客模式</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const db = window.supabase.createClient('https://xybpcsmjjcnkjwfsuder.supabase.co', 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');
        
        async function login() {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('pwd').value;
            const btn = document.getElementById('btn');
            const msg = document.getElementById('msg');
            
            if (!email || !pwd) { msg.textContent = '请填写邮箱和密码'; return; }
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            msg.textContent = '';
            
            const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
            
            btn.disabled = false;
            btn.textContent = '登录';
            
            if (error) {
                msg.textContent = error.message;
            } else {
                localStorage.setItem('uid', data.user.id);
                window.location.href = 'collection.html';
            }
        }
        
        async function register() {
            const email = document.getElementById('email').value;
            const pwd = document.getElementById('pwd').value;
            const btn = document.getElementById('regBtn');
            const msg = document.getElementById('msg');
            
            if (!email || !pwd) { msg.textContent = '请填写邮箱和密码'; return; }
            if (pwd.length < 6) { msg.textContent = '密码至少6位'; return; }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            msg.textContent = '';
            
            const { data, error } = await db.auth.signUp({ email, password: pwd });
            
            btn.disabled = false;
            btn.textContent = '注册新账号';
            
            if (error) {
                msg.textContent = error.message;
            } else {
                msg.textContent = '✅ 注册成功！请登录';
                msg.style.color = '#4caf50';
            }
        }
        
        function guest() {
            localStorage.setItem('isGuest', 'true');
            window.location.href = 'collection.html';
        }
        
        // 回车登录
        document.getElementById('pwd').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
