<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡域 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; }
        .logo-title { font-size: 28px; font-weight: bold; }
        .tabs { display: flex; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #999; }
        .tab.active { color: #667eea; border-bottom: 2px solid #667eea; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #666; font-size: 13px; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; }
        .btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { opacity: 0.6; }
        .error { color: #f44336; font-size: 12px; margin-top: 5px; min-height: 18px; }
        .guest { text-align: center; margin-top: 15px; color: #667eea; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">
            <div class="logo-icon">🃏</div>
            <div class="logo-title">卡域</div>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showLogin()">登录</div>
            <div class="tab" onclick="showRegister()">注册</div>
        </div>
        
        <!-- 登录 -->
        <div id="loginBox">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="lemail" placeholder="邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="lpwd" placeholder="密码">
            </div>
            <div class="error" id="lerr"></div>
            <button class="btn" onclick="doLogin()" id="lbtn">登录</button>
        </div>
        
        <!-- 注册 -->
        <div id="regBox" style="display:none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="rname" placeholder="用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="remail" placeholder="邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="rpwd" placeholder="密码（6位以上）">
            </div>
            <div class="error" id="rerr"></div>
            <button class="btn" onclick="doRegister()" id="rbtn">注册</button>
        </div>
        
        <div class="guest" onclick="goGuest()">👤 游客模式</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // 初始化
        const db = window.supabase.createClient(
            'https://xybpcsmjjcnkjwfsuder.supabase.co',
            'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7'
        );
        
        // 切换登录
        function showLogin() {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.querySelectorAll('.tab')[1].classList.remove('active');
            document.getElementById('loginBox').style.display = 'block';
            document.getElementById('regBox').style.display = 'none';
        }
        
        // 切换注册
        function showRegister() {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.querySelectorAll('.tab')[0].classList.remove('active');
            document.getElementById('regBox').style.display = 'block';
            document.getElementById('loginBox').style.display = 'none';
        }
        
        // 登录
        async function doLogin() {
            const email = document.getElementById('lemail').value;
            const pwd = document.getElementById('lpwd').value;
            const btn = document.getElementById('lbtn');
            const err = document.getElementById('lerr');
            
            if (!email || !pwd) {
                err.textContent = '请填写邮箱和密码';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            err.textContent = '';
            
            const { data, error } = await db.auth.signInWithPassword({ email, password: pwd });
            
            btn.disabled = false;
            btn.textContent = '登录';
            
            if (error) {
                err.textContent = error.message;
            } else {
                localStorage.setItem('userEmail', data.user.email);
                window.location.href = 'collection.html';
            }
        }
        
        // 注册
        async function doRegister() {
            const name = document.getElementById('rname').value;
            const email = document.getElementById('remail').value;
            const pwd = document.getElementById('rpwd').value;
            const btn = document.getElementById('rbtn');
            const err = document.getElementById('rerr');
            
            if (!name || !email || !pwd) {
                err.textContent = '请填写所有信息';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            err.textContent = '';
            
            const { data, error } = await db.auth.signUp({
                email: email,
                password: pwd,
                options: { data: { username: name } }
            });
            
            btn.disabled = false;
            btn.textContent = '注册';
            
            if (error) {
                err.textContent = error.message;
            } else {
                if (data.user) {
                    await db.from('profiles').insert([{ id: data.user.id, username: name }]);
                }
                alert('注册成功！请登录');
                showLogin();
            }
        }
        
        // 游客
        function goGuest() {
            localStorage.setItem('isGuest', 'true');
            window.location.href = 'collection.html';
        }
        
        // 检查已登录
        (async function() {
            const { data: { user } } = await db.auth.getUser();
            if (user) window.location.href = 'collection.html';
        })();
    </script>
</body>
</html>
