<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ж¶ҲжҒҜдёӯеҝғ - еҚЎеҹҹ Card Realm</title>
    <meta name="description" content="жҹҘзңӢдҪ зҡ„йҖҡзҹҘе’Ңж¶ҲжҒ?>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent; color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--white); padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-action {
            font-size: 13px; color: var(--primary); font-weight: 600;
            background: none; border: none; cursor: pointer;
        }
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        .notif-item {
            background: var(--white); border-radius: var(--radius); padding: 14px 16px;
            box-shadow: var(--shadow); margin-bottom: 10px; display: flex; gap: 12px;
            align-items: flex-start; cursor: pointer; transition: all 0.2s;
        }
        .notif-item:active { transform: scale(0.98); }
        .notif-item.unread { border-left: 3px solid var(--primary); }
        .notif-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .notif-icon.order { background: #e3f2fd; }
        .notif-icon.comment { background: #e8f5e9; }
        .notif-icon.like { background: #ffebee; }
        .notif-icon.follow { background: #f3e5f5; }
        .notif-icon.system { background: #fff3e0; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .notif-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .notif-time { font-size: 11px; color: #bbb; margin-top: 6px; }
        .notif-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--primary); flex-shrink: 0; margin-top: 6px;
        }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">рҹ”” ж¶ҲжҒҜдёӯеҝғ</div>
        <button class="header-action" onclick="markAllRead()">е…ЁйғЁе·ІиҜ»</button>
    </div>

    <div class="content">
        <div id="notifList"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">рҹ””</div>
            <div class="empty-title">жІЎжңүж–°ж¶ҲжҒ?/div>
            <div class="empty-desc">и®ўеҚ•гҖҒиҜ„и®әгҖҒзӮ№иөһзӯүйҖҡзҹҘдјҡжҳҫзӨәеңЁиҝҷйҮҢ</div>
        </div>
    </div>

    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">рҹ”Қ</span>жҺўзҙў</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">рҹӣ’</span>еёӮеңә</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">рҹ“Ҡ</span>зңӢжқҝ</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">рҹ‘Ө</span>жҲ‘зҡ„</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        const TYPE_ICONS = {
            order: { icon: 'рҹ“Ұ', cls: 'order' },
            comment: { icon: 'рҹ’¬', cls: 'comment' },
            like: { icon: 'вқӨпёҸ', cls: 'like' },
            follow: { icon: 'рҹ‘Ө', cls: 'follow' },
            system: { icon: 'рҹ“ў', cls: 'system' },
            trade: { icon: 'рҹ’°', cls: 'order' },
            promo: { icon: 'рҹҺҒ', cls: 'system' }
        };

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="empty-title">иҜ·е…Ҳзҷ»еҪ•</div></div>';
                return;
            }
            loadNotifications(session.user.id);
        }

        async function loadNotifications(userId) {
            try {
                const { data, error } = await db
                    .from('notifications')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                const list = document.getElementById('notifList');
                list.innerHTML = data.map(n => {
                    const typeInfo = TYPE_ICONS[n.type] || TYPE_ICONS.system;
                    return `
                        <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="handleNotif('${n.id}', '${n.action_url || ''}')">
                            <div class="notif-icon ${typeInfo.cls}">${typeInfo.icon}</div>
                            <div class="notif-body">
                                <div class="notif-title">${n.title}</div>
                                <div class="notif-content">${n.content || ''}</div>
                                <div class="notif-time">${formatTime(n.created_at)}</div>
                            </div>
                            ${n.is_read ? '' : '<div class="notif-dot"></div>'}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load notifications error:', e);
                document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="empty-title">еҠ иҪҪеӨұиҙҘ</div></div>';
            }
        }

        async function handleNotif(id, url) {
            try {
                await db.from('notifications').update({ is_read: true }).eq('id', id);
                if (url) window.location.href = url;
                else loadNotifications((await db.auth.getSession()).data.session.user.id);
            } catch (e) { console.error(e); }
        }

        async function markAllRead() {
            try {
                const { data: { session } } = await db.auth.getSession();
                if (!session) return;
                await db.from('notifications').update({ is_read: true }).eq('user_id', session.user.id).eq('is_read', false);
                loadNotifications(session.user.id);
            } catch (e) { console.error(e); }
        }

        function formatTime(ts) {
            if (!ts) return 'еҲҡеҲҡ';
            const d = new Date(ts);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return 'еҲҡеҲҡ';
            if (diff < 3600) return Math.floor(diff / 60) + 'еҲҶй’ҹеү?;
            if (diff < 86400) return Math.floor(diff / 3600) + 'е°Ҹж—¶еү?;
            if (diff < 604800) return Math.floor(diff / 86400) + 'еӨ©еүҚ';
            return (d.getMonth() + 1) + 'жң? + d.getDate() + 'ж—?;
        }

        init();
    </script>
</body>
</html>
