<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>消息通知 - 卡域 Card Realm</title>
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent; color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--white); padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; justify-content: space-between;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-action {
            font-size: 13px; color: var(--primary); font-weight: 600;
            background: none; border: none; cursor: pointer;
        }
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        .notif-item {
            background: var(--white); border-radius: var(--radius); padding: 14px 16px;
            box-shadow: var(--shadow); margin-bottom: 10px; display: flex; gap: 12px;
            align-items: flex-start; cursor: pointer; transition: all 0.2s;
        }
        .notif-item:active { transform: scale(0.98); }
        .notif-item.unread { border-left: 3px solid var(--primary); background: #f8f6ff; }
        .notif-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .notif-icon.order { background: #e3f2fd; }
        .notif-icon.comment { background: #e8f5e9; }
        .notif-icon.like { background: #ffebee; }
        .notif-icon.follow { background: #f3e5f5; }
        .notif-icon.system { background: #fff3e0; }
        .notif-body { flex: 1; min-width: 0; }
        .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
        .notif-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .notif-time { font-size: 11px; color: #bbb; margin-top: 6px; }
        .notif-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--primary); flex-shrink: 0; margin-top: 6px;
        }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .loading .spinner {
            width: 30px; height: 30px; border: 3px solid #eee;
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">? 消息通知</div>
        <button class="header-action" onclick="markAllRead()">全部已读</button>
    </div>

    <div class="content">
        <div id="notifList"></div>
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">?</div>
            <div class="empty-title">暂无通知</div>
            <div class="empty-desc">系统通知和交易提醒会显示在这里</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        const TYPE_ICONS = {
            order: { icon: '?', cls: 'order' },
            comment: { icon: '?', cls: 'comment' },
            like: { icon: '??', cls: 'like' },
            follow: { icon: '?', cls: 'follow' },
            system: { icon: '?', cls: 'system' },
            trade: { icon: '?', cls: 'order' },
            promo: { icon: '?', cls: 'system' },
            refund: { icon: '?', cls: 'order' },
            dispute: { icon: '??', cls: 'system' }
        };

        let currentUserId = null;
        let pollInterval = null;

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="empty-title">请先登录</div></div>';
                return;
            }
            currentUserId = session.user.id;
            loadNotifications(true);
            startPolling();
        }

        // 加载通知
        async function loadNotifications(showLoading = false) {
            if (showLoading) {
                document.getElementById('notifList').innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';
            }

            try {
                const { data, error } = await db
                    .from('notifications')
                    .select('*')
                    .eq('user_id', currentUserId)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('notifList').innerHTML = '';
                    return;
                }

                document.getElementById('emptyState').style.display = 'none';
                const list = document.getElementById('notifList');
                list.innerHTML = data.map(n => {
                    const typeInfo = TYPE_ICONS[n.type] || TYPE_ICONS.system;
                    return `
                        <div class="notif-item ${n.is_read ? '' : 'unread'}" onclick="handleNotif('${n.id}', '${n.action_url || ''}')">
                            <div class="notif-icon ${typeInfo.cls}">${typeInfo.icon}</div>
                            <div class="notif-body">
                                <div class="notif-title">${n.title}</div>
                                <div class="notif-content">${n.content || ''}</div>
                                <div class="notif-time">${formatTime(n.created_at)}</div>
                            </div>
                            ${n.is_read ? '' : '<div class="notif-dot"></div>'}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load notifications error:', e);
                if (showLoading) {
                    document.getElementById('notifList').innerHTML = '<div class="empty-state"><div class="empty-title">加载失败</div></div>';
                }
            }
        }

        // 点击通知
        async function handleNotif(id, url) {
            try {
                await db.from('notifications').update({ is_read: true }).eq('id', id);
                if (url) window.location.href = url;
                else loadNotifications(false);
            } catch (e) { console.error(e); }
        }

        // 全部已读
        async function markAllRead() {
            if (!confirm('确定将所有通知标记为已读？')) return;
            try {
                await db.from('notifications').update({ is_read: true }).eq('user_id', currentUserId).eq('is_read', false);
                loadNotifications(false);
                showToast('已全部标记为已读');
            } catch (e) { console.error(e); }
        }

        // 实时轮询（每30秒）
        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                if (currentUserId) {
                    loadNotifications(false);
                }
            }, 30000);
        }

        // 格式化时间
        function formatTime(ts) {
            if (!ts) return '刚刚';
            const d = new Date(ts);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            return (d.getMonth() + 1) + '月' + d.getDate() + '日';
        }

        // Toast 提示
        function showToast(msg) {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;transition:all 0.3s;opacity:0;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        init();
    </script>
</body>
</html>
