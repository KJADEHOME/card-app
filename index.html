    <!-- 登录检查 - 兼容旧数据格式 -->
    <script>
        (function() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const parsed = JSON.parse(userData);
                if (typeof parsed === 'string') {
                    localStorage.setItem('currentUser', JSON.stringify({
                        username: parsed,
                        id: 'user_' + Date.now()
                    }));
                }
            } catch (e) {
                localStorage.setItem('currentUser', JSON.stringify({
                    username: userData,
                    id: 'user_' + Date.now()
                }));
            }
        })();
    </script>

    <script>
        // ===== PWA 安装提示 =====
        let deferredPrompt = null;
        let isInstalled = false;

        // 检测是否已安装
        function checkInstalled() {
            if (window.matchMedia('(display-mode: standalone)').matches || 
                window.navigator.standalone === true) {
                isInstalled = true;
                return true;
            }
            return false;
        }

        // 监听安装提示事件
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallPrompt();
        });

        // 监听已安装
        window.addEventListener('appinstalled', () => {
            deferredPrompt = null;
            isInstalled = true;
            hideInstallPrompt();
            console.log('PWA 已安装');
        });

        // ===== 显示/隐藏安装提示 =====
        function showInstallPrompt() {
            if (checkInstalled()) return;
            if (localStorage.getItem('installPromptDismissed')) return;
            
            const prompt = document.getElementById('installPrompt');
            if (prompt && deferredPrompt) {
                prompt.style.display = 'block';
            }
        }

        function hideInstallPrompt() {
            const prompt = document.getElementById('installPrompt');
            if (prompt) {
                prompt.style.display = 'none';
            }
            localStorage.setItem('installPromptDismissed', 'true');
        }

        // ===== 执行安装 =====
        async function installPWA() {
            if (!deferredPrompt) return;
            
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            
            if (outcome === 'accepted') {
                console.log('用户接受安装');
                isInstalled = true;
            } else {
                console.log('用户拒绝安装');
                localStorage.setItem('installPromptDismissed', 'true');
            }
            deferredPrompt = null;
            hideInstallPrompt();
        }

        // ===== Supabase 配置 =====
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5YnBjc21qamNua2p3ZnN1ZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDU2MzMsImV4cCI6MjA4OTQ4MTYzM30.ODg0ZNoIMonj-6WoBBkvdeJ2O3IXcH0nxrrSLiSPASQ';
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error('Supabase 初始化失败:', e);
        }
        
        let currentUser = null;
        let allCards = [];
        let isEditing = false;
        let currentImageBase64 = null;
        
        // ===== 页面初始化 =====
        document.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                try {
                    currentUser = JSON.parse(userData);
                    if (typeof currentUser === 'string') {
                        currentUser = { username: currentUser, id: 'user_' + Date.now() };
                    }
                    document.getElementById('usernameDisplay').textContent = currentUser.username || '用户';
                } catch (e) {
                    currentUser = { username: userData, id: 'user_' + Date.now() };
                    document.getElementById('usernameDisplay').textContent = userData || '用户';
                }
                await loadCards();
            }
            
            // PWA 安装检查
            if (checkInstalled()) {
                document.body.classList.add('installed');
            }
            setTimeout(() => {
                if (deferredPrompt && !checkInstalled()) {
                    showInstallPrompt();
                }
            }, 3000);
        });
        
        // ===== 返回按钮 =====
        function goBack() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                              || navigator.standalone;
            
            if (isStandalone) {
                if (window.history.length > 1) {
                    window.history.back();
                }
            } else {
                window.history.back();
            }
        }
        
        // ===== 退出登录 =====
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }

            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }
        
        // ===== 在这里添加新函数 =====
        function switchGame() {
            const games = ['游戏王', '宝可梦', '万智牌', '数码宝贝'];
            const current = document.getElementById('currentGame').textContent;
            const nextIndex = (games.indexOf(current) + 1) % games.length;
            document.getElementById('currentGame').textContent = games[nextIndex];
        }
        
        function showCalendar() {
            alert('发售日历功能开发中...');
        }
        
        // ===== 显示添加表单 =====
        function showAddForm() {
            isEditing = false;
            currentImageBase64 = null;
            document.getElementById('modalTitle').textContent = '添加新卡牌';
            document.getElementById('cardId').value = '';
            document.getElementById('cardForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            resetImageUpload();
            document.getElementById('cardModal').classList.add('active');
        }
        
        // ===== 显示编辑表单 =====
        function showEditForm(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            
            isEditing = true;
            currentImageBase64 = card.image_url || null;
            
            document.getElementById('modalTitle').textContent = '编辑卡牌';
            document.getElementById('cardId').value = card.id;
            document.getElementById('cardName').value = card.name || '';
            document.getElementById('cardSeries').value = card.series || '';
            document.getElementById('cardRarity').value = card.rarity || 'N';
            document.getElementById('cardPrice').value = card.price || '';
            document.getElementById('cardCondition').value = card.condition || 'mint';
            document.getElementById('cardNote').value = card.note || '';
            
            if (card.image_url) {
                showImagePreview(card.image_url);
            } else {
                resetImageUpload();
            }
            
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('cardModal').classList.add('active');
        }
        
        // ===== 隐藏表单 =====
        function hideCardForm() {
            document.getElementById('cardModal').classList.remove('active');
            document.getElementById('cardForm').reset();
            currentImageBase64 = null;
        }
        
        // ===== 图片上传到 Supabase Storage =====
        async function uploadImageToStorage(file) {
            if (!file) return null;
            
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${Math.random().toString(36).substring(2, 9)}.${fileExt}`;
            const filePath = `${currentUser.id}/${fileName}`;
            
            try {
                const { data, error } = await supabaseClient
                    .storage
                    .from('card-images')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (error) throw error;
                
                const { data: { publicUrl } } = supabaseClient
                    .storage
                    .from('card-images')
                    .getPublicUrl(filePath);
                
                return publicUrl;
                
            } catch (error) {
                console.error('上传失败:', error);
                alert('图片上传失败: ' + error.message);
                return null;
            }
        }

        // ===== 图片选择处理 =====
        async function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                alert('图片太大，请选择小于 5MB 的图片');
                input.value = '';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = async function(e) {
                showImagePreview(e.target.result);
                document.getElementById('uploadText').innerHTML = '⏳ 上传中...';
                
                const publicUrl = await uploadImageToStorage(file);
                if (publicUrl) {
                    currentImageBase64 = publicUrl;
                    document.getElementById('uploadText').innerHTML = '✅ 上传成功';
                } else {
                    resetImageUpload();
                }
            };
            reader.readAsDataURL(file);
        }
        
        function showImagePreview(src) {
            const uploadArea = document.getElementById('imageUpload');
            const preview = document.getElementById('uploadPreview');
            const text = document.getElementById('uploadText');
            
            uploadArea.classList.add('has-image');
            preview.src = src;
            preview.style.display = 'block';
            text.style.display = 'none';
        }
        
        function resetImageUpload() {
            const uploadArea = document.getElementById('imageUpload');
            const preview = document.getElementById('uploadPreview');
            const text = document.getElementById('uploadText');
            
            uploadArea.classList.remove('has-image');
            preview.style.display = 'none';
            text.style.display = 'block';
        }
        
        // ===== 提交表单（添加/编辑）=====
        document.getElementById('cardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            
            const cardData = {
                user_id: currentUser.id || 'user_unknown',
                name: document.getElementById('cardName').value,
                series: document.getElementById('cardSeries').value,
                rarity: document.getElementById('cardRarity').value,
                price: parseFloat(document.getElementById('cardPrice').value) || 0,
                condition: document.getElementById('cardCondition').value,
                note: document.getElementById('cardNote').value,
                image_url: currentImageBase64,
                updated_at: new Date().toISOString()
            };
            
            if (isEditing) {
                // 编辑模式
                const cardId = document.getElementById('cardId').value;
                try {
                    const { error } = await supabaseClient
                        .from('cards')
                        .update(cardData)
                        .eq('id', cardId);
                    
                    if (error) throw error;
                    
                    alert('卡牌更新成功！');
                    hideCardForm();
                    await loadCards();
                } catch (error) {
                    console.error('更新失败:', error);
                    alert('更新失败: ' + error.message);
                    updateLocalCard(cardId, cardData);
                }
            } else {
                // 添加模式
                cardData.created_at = new Date().toISOString();
                cardData.is_favorite = false;
                
                // 尝试在线保存，失败则转本地
                try {
                    const { data, error } = await supabaseClient
                        .from('cards')
                        .insert([cardData])
                        .select();
                    
                    if (error) throw error;
                    
                    alert('卡牌添加成功！');
                    hideCardForm();
                    await loadCards();
                } catch (error) {
                    console.error('在线保存失败，转本地:', error);
                    // 出错时存本地
                    cardData._pendingSync = true;
                    saveCardLocally(cardData);
                    alert('已保存到本地，联网后自动同步');
                    hideCardForm();
                    loadLocalCards();
                }
            }
        });
        
        // ===== 删除卡牌 =====
        async function deleteCard() {
            if (!confirm('确定要删除这张卡牌吗？')) return;
            
            const cardId = document.getElementById('cardId').value;
            
            try {
                const { error } = await supabaseClient
                    .from('cards')
                    .delete()
                    .eq('id', cardId);
                
                if (error) throw error;
                
                alert('卡牌已删除');
                hideCardForm();
                await loadCards();
            } catch (error) {
                console.error('删除失败:', error);
                deleteLocalCard(cardId);
            }
        }
        
        // ===== 本地存储操作 =====
        function saveCardLocally(cardData) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            cardData.id = Date.now();
            localCards.push(cardData);
            localStorage.setItem('localCards', JSON.stringify(localCards));
            alert('已保存到本地');
            hideCardForm();
            loadLocalCards();
        }
        
        function updateLocalCard(cardId, cardData) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            const index = localCards.findIndex(c => c.id == cardId);
            if (index !== -1) {
                localCards[index] = { ...localCards[index], ...cardData };
                localStorage.setItem('localCards', JSON.stringify(localCards));
                hideCardForm();
                loadLocalCards();
            }
        }
        
        function deleteLocalCard(cardId) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            localCards = localCards.filter(c => c.id != cardId);
            localStorage.setItem('localCards', JSON.stringify(localCards));
            alert('已删除（本地）');
            hideCardForm();
            loadLocalCards();
        }
        
        // ===== 加载卡牌 =====
        async function loadCards() {
            if (!supabaseClient) {
                loadLocalCards();
                return;
            }
            
            try {
                const { data: cards, error } = await supabaseClient
                    .from('cards')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allCards = cards || [];
                
                if (allCards.length > 0) {
                    renderCards(allCards);
                    updateStats(allCards);
                    initFilterOptions();
                } else {
                    loadLocalCards();
                }
            } catch (error) {
                console.error('加载失败:', error);
                loadLocalCards();
            }
        }
        
        function loadLocalCards() {
            const localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            allCards = localCards;
            
            if (localCards.length > 0) {
                renderCards(localCards);
                updateStats(localCards);
            } else {
                showEmptyState();
            }
        }
        
        // ===== 渲染卡牌 =====
        function renderCards(cards) {
            const cardList = document.getElementById('cardList');
            
            cardList.innerHTML = cards.map(card => `
                <div class="card-item" onclick="showEditForm(${card.id})">
                    <button class="favorite-btn ${card.is_favorite ? 'active' : ''}" 
                            onclick="toggleFavorite(event, ${card.id})">
                        ${card.is_favorite ? '❤️' : '🤍'}
                    </button>
                    <div class="card-img">
                        ${card.image_url ? 
                            `<img src="${escapeHtml(card.image_url)}" 
                                  alt="${escapeHtml(card.name)}" 
                                  loading="lazy"
                                  onerror="this.onerror=null; this.parentElement.innerHTML='🃏';">` 
                            : '🃏'}
                    </div>
                    <div class="card-name">${escapeHtml(card.name)}</div>
                    <div class="card-info">${escapeHtml(card.series)} · ${escapeHtml(card.rarity)}</div>
                    ${card.price ? `<div class="card-price">¥${card.price}</div>` : ''}
                </div>
            `).join('');
        }
        
        function showEmptyState() {
            document.getElementById('cardList').innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">还没有卡牌</div>
                    <div class="empty-hint">点击上方按钮添加你的第一张卡牌吧！</div>
                </div>
            `;
            updateStats([]);
        }
        
        function updateStats(cards) {
            const total = cards.length;
            const totalValue = cards.reduce((sum, card) => sum + (parseFloat(card.price) || 0), 0);
            const favorites = cards.filter(c => c.is_favorite).length;
            
            document.getElementById('totalCards').textContent = total;
            document.getElementById('totalValue').textContent = '¥' + totalValue.toFixed(0);
            document.getElementById('favCards').textContent = favorites;
        }
        
        // ===== 收藏功能 =====
        async function toggleFavorite(event, cardId) {
            event.stopPropagation();
            
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            
            const newStatus = !card.is_favorite;
            
            try {
                const { error } = await supabaseClient
                    .from('cards')
                    .update({ is_favorite: newStatus })
                    .eq('id', cardId);
                
                if (error) throw error;
                
                card.is_favorite = newStatus;
                renderCards(allCards);
                updateStats(allCards);
            } catch (error) {
                console.error('收藏失败:', error);
            }
        }
        
        // ===== 搜索筛选 =====
        function initFilterOptions() {
            const seriesSet = new Set(allCards.map(c => c.series).filter(Boolean));
            const seriesSelect = document.getElementById('seriesFilter');
            
            while (seriesSelect.options.length > 1) {
                seriesSelect.remove(1);
            }
            
            Array.from(seriesSet).sort().forEach(series => {
                const option = document.createElement('option');
                option.value = series;
                option.textContent = series;
                seriesSelect.appendChild(option);
            });
        }

        function filterCards() {
            const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
            const seriesValue = document.getElementById('seriesFilter').value;
            const rarityValue = document.getElementById('rarityFilter').value;
            
            let filtered = allCards.filter(card => {
                const matchName = !searchText || 
                    (card.name && card.name.toLowerCase().includes(searchText));
                const matchSeries = !seriesValue || card.series === seriesValue;
                const matchRarity = !rarityValue || card.rarity === rarityValue;
                
                return matchName && matchSeries && matchRarity;
            });
            
            renderCards(filtered);
            
            const resultInfo = document.getElementById('resultInfo');
            if (filtered.length === 0) {
                resultInfo.innerHTML = '<div class="empty-state" style="padding:40px 20px;"><div class="empty-icon">🔍</div><div class="empty-text">没有找到匹配的卡牌</div></div>';
            } else if (filtered.length !== allCards.length) {
                resultInfo.innerHTML = `<div style="text-align:center;color:#666;font-size:14px;margin-bottom:15px;">显示 ${filtered.length} / ${allCards.length} 张卡牌</div>`;
            } else {
                resultInfo.innerHTML = '';
            }
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('seriesFilter').value = '';
            document.getElementById('rarityFilter').value = '';
            filterCards();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 点击弹窗外部关闭
        document.getElementById('cardModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideCardForm();
            }
        });
        
        // ESC键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideCardForm();
            }
        });
    </script>
