<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <!-- 登录检查 - 兼容旧数据格式 -->
    <script>
        (function() {
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const parsed = JSON.parse(userData);
                if (typeof parsed === 'string') {
                    localStorage.setItem('currentUser', JSON.stringify({
                        username: parsed,
                        id: 'user_' + Date.now()
                    }));
                }
            } catch (e) {
                localStorage.setItem('currentUser', JSON.stringify({
                    username: userData,
                    id: 'user_' + Date.now()
                }));
            }
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡域 CardRealm - 我的卡牌收藏</title>
    
    <!-- PWA 配置 -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="卡域">
    
    <!-- 注册 Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker 注册成功:', registration.scope);
                    })
                    .catch((error) => {
                        console.log('ServiceWorker 注册失败:', error);
                    });
            });
        }
    </script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        
        .btn-back {
            background: #667eea;
            color: white;
        }
        
        .btn-back:hover {
            background: #5a67d8;
            transform: translateY(-1px);
        }
        
        .btn-logout {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-logout:hover {
            background: #ff5252;
            transform: translateY(-1px);
        }
        
        .username {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }
        
        .add-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .add-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .add-btn:active {
            transform: translateY(0);
        }
        
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .card-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
        }
        
        .card-item:hover {
            transform: translateY(-5px);
            border-color: #667eea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card-img {
            width: 100%;
            height: 120px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            overflow: hidden;
        }
        
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .card-info {
            color: #666;
            font-size: 12px;
        }
        
        .card-price {
            color: #667eea;
            font-weight: bold;
            font-size: 13px;
            margin-top: 5px;
        }
        
        .card-condition {
            display: inline-block;
            padding: 2px 8px;
            background: #e3f2fd;
            color: #1976d2;
            border-radius: 10px;
            font-size: 11px;
            margin-top: 5px;
        }
        
        .favorite-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
            z-index: 10;
        }
        
        .favorite-btn:hover {
            transform: scale(1.1);
        }
        
        .favorite-btn.active {
            color: #ff6b6b;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .empty-text {
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .empty-hint {
            font-size: 14px;
            color: #bbb;
        }
        
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        
        .error {
            text-align: center;
            color: #e74c3c;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* 图片上传区域 */
        .image-upload {
            width: 100%;
            height: 150px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        .image-upload:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .image-upload.has-image {
            border: none;
            background: transparent;
        }
        
        .image-upload img {
            max-width: 100%;
            max-height: 140px;
            border-radius: 8px;
        }
        
        .image-upload input[type="file"] {
            display: none;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #ff6b6b;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff5252;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-right {
                width: 100%;
                justify-content: space-between;
            }
            
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="btn btn-back" onclick="goBack()">← 返回</button>
                <h1 style="margin: 0; font-size: 24px;">🃏 卡域 CardRealm</h1>
            </div>
            <div class="header-right">
                <span id="usernameDisplay" class="username">加载中...</span>
                <button class="btn btn-logout" onclick="logout()">退出登录</button>
            </div>
        </div>
        
        <p class="subtitle">管理你的卡牌收藏，发现交易机会</p>
        
        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCards">0</div>
                <div class="stat-label">总卡牌</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalValue">¥0</div>
                <div class="stat-label">总价值</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="favCards">0</div>
                <div class="stat-label">收藏</div>
            </div>
        </div>
        
        <button class="add-btn" onclick="showAddForm()">+ 添加卡牌</button>
        
        <div id="cardList" class="card-grid">
            <div class="loading">
                <div class="spinner"></div>
                加载中...
            </div>
        </div>
    </div>
    
    <!-- 添加/编辑卡牌弹窗 -->
    <div id="cardModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">添加新卡牌</h2>
            <form id="cardForm">
                <input type="hidden" id="cardId">
                
                <!-- 图片上传 -->
                <div class="form-group">
                    <label>卡牌图片</label>
                    <div class="image-upload" id="imageUpload" onclick="document.getElementById('cardImageFile').click()">
                        <span id="uploadText">📷 点击上传图片</span>
                        <img id="uploadPreview" style="display: none;">
                    </div>
                    <input type="file" id="cardImageFile" accept="image/*" onchange="handleImageUpload(this)">
                    <input type="hidden" id="cardImageUrl">
                </div>
                
                <div class="form-group">
                    <label>卡牌名称 *</label>
                    <input type="text" id="cardName" required placeholder="例如：青眼白龙">
                </div>
                <div class="form-group">
                    <label>系列/游戏 *</label>
                    <input type="text" id="cardSeries" required placeholder="例如：游戏王、宝可梦、万智牌">
                </div>
                <div class="form-group">
                    <label>稀有度</label>
                    <select id="cardRarity">
                        <option value="N">普通 (N)</option>
                        <option value="R">稀有 (R)</option>
                        <option value="SR">超稀有 (SR)</option>
                        <option value="SSR">极度稀有 (SSR)</option>
                        <option value="UR">终极稀有 (UR)</option>
                        <option value="LR">传说 (LR)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>价格 (¥)</label>
                    <input type="number" id="cardPrice" placeholder="0.00" step="0.01" min="0">
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="cardCondition">
                        <option value="mint">全新 (Mint)</option>
                        <option value="near_mint">近全新 (NM)</option>
                        <option value="excellent">优秀 (EX)</option>
                        <option value="good">良好 (GD)</option>
                        <option value="played">有磨损 (PL)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>备注</label>
                    <textarea id="cardNote" placeholder="添加描述、交易意向等..."></textarea>
                </div>
                
                <div class="modal-buttons">
                    <button type="button" class="btn-secondary" onclick="hideCardForm()">取消</button>
                    <button type="button" class="btn-danger" id="deleteBtn" onclick="deleteCard()" style="display: none;">删除</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ===== Supabase 配置 =====
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5YnBjc21qamNua2p3ZnN1ZGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MDU2MzMsImV4cCI6MjA4OTQ4MTYzM30.ODg0ZNoIMonj-6WoBBkvdeJ2O3IXcH0nxrrSLiSPASQ';
        
        let supabaseClient;
        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } catch (e) {
            console.error('Supabase 初始化失败:', e);
        }
        
        let currentUser = null;
        let allCards = [];
        let isEditing = false;
        let currentImageBase64 = null;
        
        // ===== 页面初始化 =====
        document.addEventListener('DOMContentLoaded', async () => {
            const userData = localStorage.getItem('currentUser');
            if (userData) {
                try {
                    currentUser = JSON.parse(userData);
                    if (typeof currentUser === 'string') {
                        currentUser = { username: currentUser, id: 'user_' + Date.now() };
                    }
                    document.getElementById('usernameDisplay').textContent = currentUser.username || '用户';
                } catch (e) {
                    currentUser = { username: userData, id: 'user_' + Date.now() };
                    document.getElementById('usernameDisplay').textContent = userData || '用户';
                }
                await loadCards();
            }
        });
        
        // ===== 返回按钮（App模式智能返回）=====
        function goBack() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                              || navigator.standalone;
            
            if (isStandalone) {
                // App模式：返回App内部上一页
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    // 已经在首页，最小化或提示
                    console.log('已在首页');
                }
            } else {
                // 网页模式：返回浏览器上一页
                window.history.back();
            }
        }
        
        // ===== 退出登录 =====
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('token');
                window.location.href = 'login.html';
            }
        }
        
        // ===== 显示添加表单 =====
        function showAddForm() {
            isEditing = false;
            currentImageBase64 = null;
            document.getElementById('modalTitle').textContent = '添加新卡牌';
            document.getElementById('cardId').value = '';
            document.getElementById('cardForm').reset();
            document.getElementById('deleteBtn').style.display = 'none';
            resetImageUpload();
            document.getElementById('cardModal').classList.add('active');
        }
        
        // ===== 显示编辑表单 =====
        function showEditForm(cardId) {
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            
            isEditing = true;
            currentImageBase64 = card.image_url || null;
            
            document.getElementById('modalTitle').textContent = '编辑卡牌';
            document.getElementById('cardId').value = card.id;
            document.getElementById('cardName').value = card.name || '';
            document.getElementById('cardSeries').value = card.series || '';
            document.getElementById('cardRarity').value = card.rarity || 'N';
            document.getElementById('cardPrice').value = card.price || '';
            document.getElementById('cardCondition').value = card.condition || 'mint';
            document.getElementById('cardNote').value = card.note || '';
            
            // 显示图片
            if (card.image_url) {
                showImagePreview(card.image_url);
            } else {
                resetImageUpload();
            }
            
            document.getElementById('deleteBtn').style.display = 'block';
            document.getElementById('cardModal').classList.add('active');
        }
        
        // ===== 隐藏表单 =====
        function hideCardForm() {
            document.getElementById('cardModal').classList.remove('active');
            document.getElementById('cardForm').reset();
            currentImageBase64 = null;
        }
        
        // ===== 图片上传处理 =====
        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageBase64 = e.target.result;
                showImagePreview(currentImageBase64);
            };
            reader.readAsDataURL(file);
        }
        
        function showImagePreview(src) {
            const uploadArea = document.getElementById('imageUpload');
            const preview = document.getElementById('uploadPreview');
            const text = document.getElementById('uploadText');
            
            uploadArea.classList.add('has-image');
            preview.src = src;
            preview.style.display = 'block';
            text.style.display = 'none';
        }
        
        function resetImageUpload() {
            const uploadArea = document.getElementById('imageUpload');
            const preview = document.getElementById('uploadPreview');
            const text = document.getElementById('uploadText');
            
            uploadArea.classList.remove('has-image');
            preview.style.display = 'none';
            text.style.display = 'block';
        }
        
        // ===== 提交表单（添加/编辑）=====
        document.getElementById('cardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            
            const cardData = {
                user_id: currentUser.id || 'user_unknown',
                name: document.getElementById('cardName').value,
                series: document.getElementById('cardSeries').value,
                rarity: document.getElementById('cardRarity').value,
                price: parseFloat(document.getElementById('cardPrice').value) || 0,
                condition: document.getElementById('cardCondition').value,
                note: document.getElementById('cardNote').value,
                image_url: currentImageBase64,
                updated_at: new Date().toISOString()
            };
            
            if (isEditing) {
                // 编辑模式
                const cardId = document.getElementById('cardId').value;
                try {
                    const { error } = await supabaseClient
                        .from('cards')
                        .update(cardData)
                        .eq('id', cardId);
                    
                    if (error) throw error;
                    
                    alert('卡牌更新成功！');
                    hideCardForm();
                    await loadCards();
                } catch (error) {
                    console.error('更新失败:', error);
                    alert('更新失败: ' + error.message);
                    updateLocalCard(cardId, cardData);
                }
            } else {
                // 添加模式
                cardData.created_at = new Date().toISOString();
                cardData.is_favorite = false;
                
                try {
                    const { data, error } = await supabaseClient
                        .from('cards')
                        .insert([cardData])
                        .select();
                    
                    if (error) throw error;
                    
                    alert('卡牌添加成功！');
                    hideCardForm();
                    await loadCards();
                } catch (error) {
                    console.error('添加失败:', error);
                    alert('添加失败: ' + error.message);
                    saveCardLocally(cardData);
                }
            }
        });
        
        // ===== 删除卡牌 =====
        async function deleteCard() {
            if (!confirm('确定要删除这张卡牌吗？')) return;
            
            const cardId = document.getElementById('cardId').value;
            
            try {
                const { error } = await supabaseClient
                    .from('cards')
                    .delete()
                    .eq('id', cardId);
                
                if (error) throw error;
                
                alert('卡牌已删除');
                hideCardForm();
                await loadCards();
            } catch (error) {
                console.error('删除失败:', error);
                deleteLocalCard(cardId);
            }
        }
        
        // ===== 本地存储操作 =====
        function saveCardLocally(cardData) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            cardData.id = Date.now();
            localCards.push(cardData);
            localStorage.setItem('localCards', JSON.stringify(localCards));
            alert('已保存到本地');
            hideCardForm();
            loadLocalCards();
        }
        
        function updateLocalCard(cardId, cardData) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            const index = localCards.findIndex(c => c.id == cardId);
            if (index !== -1) {
                localCards[index] = { ...localCards[index], ...cardData };
                localStorage.setItem('localCards', JSON.stringify(localCards));
                hideCardForm();
                loadLocalCards();
            }
        }
        
        function deleteLocalCard(cardId) {
            let localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            localCards = localCards.filter(c => c.id != cardId);
            localStorage.setItem('localCards', JSON.stringify(localCards));
            alert('已删除（本地）');
            hideCardForm();
            loadLocalCards();
        }
        
        // ===== 加载卡牌 =====
        async function loadCards() {
            if (!supabaseClient) {
                loadLocalCards();
                return;
            }
            
            try {
                const { data: cards, error } = await supabaseClient
                    .from('cards')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allCards = cards || [];
                
                if (allCards.length > 0) {
                    renderCards(allCards);
                    updateStats(allCards);
                } else {
                    loadLocalCards();
                }
            } catch (error) {
                console.error('加载失败:', error);
                loadLocalCards();
            }
        }
        
        function loadLocalCards() {
            const localCards = JSON.parse(localStorage.getItem('localCards') || '[]');
            allCards = localCards;
            
            if (localCards.length > 0) {
                renderCards(localCards);
                updateStats(localCards);
            } else {
                showEmptyState();
            }
        }
        
        // ===== 渲染卡牌 =====
        function renderCards(cards) {
            const cardList = document.getElementById('cardList');
            
            cardList.innerHTML = cards.map(card => `
                <div class="card-item" onclick="showEditForm(${card.id})">
                    <button class="favorite-btn ${card.is_favorite ? 'active' : ''}" 
                            onclick="toggleFavorite(event, ${card.id})">
                        ${card.is_favorite ? '❤️' : '🤍'}
                    </button>
                    <div class="card-img">
                        ${card.image_url ? `<img src="${escapeHtml(card.image_url)}" alt="${escapeHtml(card.name)}" onerror="this.src=''">` : '🃏'}
                    </div>
                    <div class="card-name">${escapeHtml(card.name)}</div>
                    <div class="card-info">${escapeHtml(card.series)} · ${escapeHtml(card.rarity)}</div>
                    ${card.price ? `<div class="card-price">¥${card.price}</div>` : ''}
                </div>
            `).join('');
        }
        
        function showEmptyState() {
            document.getElementById('cardList').innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="empty-icon">📭</div>
                    <div class="empty-text">还没有卡牌</div>
                    <div class="empty-hint">点击上方按钮添加你的第一张卡牌吧！</div>
                </div>
            `;
            updateStats([]);
        }
        
        function updateStats(cards) {
            const total = cards.length;
            const totalValue = cards.reduce((sum, card) => sum + (parseFloat(card.price) || 0), 0);
            const favorites = cards.filter(c => c.is_favorite).length;
            
            document.getElementById('totalCards').textContent = total;
            document.getElementById('totalValue').textContent = '¥' + totalValue.toFixed(0);
            document.getElementById('favCards').textContent = favorites;
        }
        
        // ===== 收藏功能 =====
        async function toggleFavorite(event, cardId) {
            event.stopPropagation();
            
            const card = allCards.find(c => c.id === cardId);
            if (!card) return;
            
            const newStatus = !card.is_favorite;
            
            try {
                const { error } = await supabaseClient
                    .from('cards')
                    .update({ is_favorite: newStatus })
                    .eq('id', cardId);
                
                if (error) throw error;
                
                card.is_favorite = newStatus;
                renderCards(allCards);
                updateStats(allCards);
            } catch (error) {
                console.error('收藏失败:', error);
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 点击弹窗外部关闭
        document.getElementById('cardModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideCardForm();
            }
        });
        
        // ESC键关闭
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideCardForm();
            }
        });
    </script>
</body>
</html>
