<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПЈгђ - ЮвЕФЖЉЕЅ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f5f5f5; padding-bottom: 20px; }
        .header { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); padding: 15px; display: flex; align-items: center; }
        .back { color: white; font-size: 24px; text-decoration: none; margin-right: 15px; }
        .header-title { color: white; font-size: 18px; font-weight: bold; }
        .tabs { display: flex; background: white; margin: 12px 15px; border-radius: 12px; overflow: hidden; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-size: 13px; color: #666; transition: all 0.2s; }
        .tab.active { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); color: white; font-weight: bold; }
        .order-list { padding: 0 15px; }
        .order-card { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
        .order-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px 0; }
        .order-no { font-size: 12px; color: #999; }
        .order-status { font-size: 13px; font-weight: bold; }
        .status-pending { color: #f57c00; }
        .status-paid { color: #1976d2; }
        .status-shipped { color: #43a047; }
        .status-delivered { color: #7b1fa2; }
        .status-completed { color: #9e9e9e; }
        .status-cancelled { color: #9e9e9e; }
        .status-refund_requested { color: #ff9800; }
        .status-refunded { color: #f44336; }
        .status-disputed { color: #e53935; }
        .order-body { display: flex; gap: 12px; padding: 12px 16px; cursor: pointer; }
        .order-thumb { width: 65px; height: 87px; border-radius: 8px; flex-shrink: 0; background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: bold; }
        .order-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .order-name { font-size: 14px; font-weight: bold; color: #333; }
        .order-meta { font-size: 12px; color: #999; }
        .order-price { font-size: 15px; font-weight: bold; color: #5B4AE0; text-align: right; }
        .order-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 0 16px 14px; flex-wrap: wrap; }
        .order-btn { padding: 7px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; }
        .order-btn-primary { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); color: white; }
        .order-btn-outline { background: white; color: #666; border: 1px solid #ddd; }
        .order-btn-danger { background: white; color: #f44336; border: 1px solid #f44336; }
        .order-btn-success { background: #4caf50; color: white; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .loading { text-align: center; padding: 60px 20px; color: #999; }
        .loading .spinner { width: 32px; height: 32px; border: 3px solid #e0e0e0; border-top-color: #5B4AE0; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); background: #333; color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 300; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-box { background: white; border-radius: 20px; padding: 24px; width: 90%; max-width: 400px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .modal-input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
        .modal-textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 15px; min-height: 100px; resize: vertical; }
        .modal-btn-row { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
        .modal-btn-cancel { background: #f0f0f0; color: #666; }
        .modal-btn-confirm { background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%); color: white; }
    </style>
</head>
<body>
    <div class="header">
        <a href="profile.html" class="back">Ёћ</a>
        <div class="header-title">ЮвЕФЖЉЕЅ</div>
    </div>
    
    <div class="tabs" id="roleTabs">
        <div class="tab active" onclick="switchRole('buyer')">ЮвТђЕФ</div>
        <div class="tab" onclick="switchRole('seller')">ЮвТєЕФ</div>
    </div>
    
    <div class="tabs" id="statusTabs">
        <div class="tab active" onclick="switchStatus('all')">ШЋВП</div>
        <div class="tab" onclick="switchStatus('paid')">Д§ЗЂЛѕ</div>
        <div class="tab" onclick="switchStatus('shipped')">Д§ЪеЛѕ</div>
        <div class="tab" onclick="switchStatus('completed')">вбЭъГЩ</div>
        <div class="tab" onclick="switchStatus('refund_requested')">ЭЫПюжа</div>
    </div>
    
    <div class="order-list" id="orderList">
        <div class="loading"><div class="spinner"></div></div>
    </div>

    <!-- Ship Modal -->
    <div class="modal" id="shipModal">
        <div class="modal-box">
            <div class="modal-title">ЗЂЛѕ</div>
            <input type="text" class="modal-input" id="trackingNo" placeholder="ПьЕнЕЅКХ">
            <input type="text" class="modal-input" id="shippingCarrier" placeholder="ПьЕнЙЋЫОЃЈбЁЬюЃЉ">
            <div class="modal-btn-row">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal('shipModal')">ШЁЯћ</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmShip()">ШЗШЯЗЂЛѕ</button>
            </div>
        </div>
    </div>

    <!-- Refund Modal -->
    <div class="modal" id="refundModal">
        <div class="modal-box">
            <div class="modal-title">ЩъЧыЭЫПю</div>
            <textarea class="modal-textarea" id="refundReason" placeholder="ЭЫПюд­вђ"></textarea>
            <div class="modal-btn-row">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal('refundModal')">ШЁЯћ</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmRefund()">ЬсНЛЩъЧы</button>
            </div>
        </div>
    </div>

    <!-- Dispute Modal -->
    <div class="modal" id="disputeModal">
        <div class="modal-box">
            <div class="modal-title">ЗЂЦ№ељвщ</div>
            <textarea class="modal-textarea" id="disputeReason" placeholder="ељвщд­вђ"></textarea>
            <div class="modal-btn-row">
                <button class="modal-btn modal-btn-cancel" onclick="closeModal('disputeModal')">ШЁЯћ</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmDispute()">ЬсНЛ</button>
            </div>
        </div>
    </div>

    <!-- Process Refund Modal (Seller) -->
    <div class="modal" id="processRefundModal">
        <div class="modal-box">
            <div class="modal-title">ДІРэЭЫПюЩъЧы</div>
            <textarea class="modal-textarea" id="sellerNote" placeholder="ДІРэвтМћЃЈбЁЬюЃЉ"></textarea>
            <div class="modal-btn-row">
                <button class="modal-btn modal-btn-cancel" onclick="processRefund(false)">ОмОј</button>
                <button class="modal-btn modal-btn-confirm" onclick="processRefund(true)">ЭЌвтЭЫПю</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_ANON = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';

        let db, currentUser;
        let currentRole = 'buyer';
        let currentStatus = 'all';
        let currentOrderId = null;

        const STATUS_TEXT = {
            pending: 'Д§ИЖПю',
            paid: 'Д§ЗЂЛѕ',
            shipped: 'вбЗЂЛѕ',
            delivered: 'вбЫЭДя',
            completed: 'вбЭъГЩ',
            cancelled: 'вбШЁЯћ',
            refund_requested: 'ЭЫПюЩъЧыжа',
            refunded: 'вбЭЫПю',
            disputed: 'ељвщжа'
        };

        async function init() {
            const { createClient } = supabase;
            db = createClient(SUPABASE_URL, SUPABASE_ANON);
            const { data: { user } } = await db.auth.getUser();
            currentUser = user;
            if (!user) { window.location.href = 'login.html'; return; }
            loadOrders();
        }

        function switchRole(role) {
            currentRole = role;
            document.querySelectorAll('#roleTabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadOrders();
        }

        function switchStatus(status) {
            currentStatus = status;
            document.querySelectorAll('#statusTabs .tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            loadOrders();
        }

        async function loadOrders() {
            const list = document.getElementById('orderList');
            list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            let query = db.from('orders').select(`
                *,
                consignments(*),
                products(*)
            `);

            if (currentRole === 'buyer') {
                query = query.eq('buyer_id', currentUser.id);
            } else {
                query = query.eq('seller_id', currentUser.id);
            }

            if (currentStatus !== 'all') {
                query = query.eq('status', currentStatus);
            }

            query = query.order('created_at', { ascending: false });

            const { data: orders, error } = await query;
            if (error) { list.innerHTML = '<div class="empty">МгдиЪЇАм</div>'; return; }
            if (!orders || orders.length === 0) {
                list.innerHTML = '<div class="empty"><div class="empty-icon">?</div>днЮоЖЉЕЅ</div>';
                return;
            }

            list.innerHTML = orders.map(o => renderOrder(o)). join('');
        }

        function renderOrder(o) {
            const statusClass = 'status-' + o.status;
            const statusText = STATUS_TEXT[o.status] || o.status;
            const thumb = o.consignments?.image_url || o.products?.image_url || '';
            
            return `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-no">${o.order_no}</div>
                        <div class="order-status ${statusClass}">${statusText}</div>
                    </div>
                    <div class="order-body" onclick="viewOrder('${o.id}')">
                        <div class="order-thumb" style="${thumb ? `background-image:url(${thumb})` : ''}">
                            ${thumb ? '' : '?'}
                        </div>
                        <div class="order-info">
                            <div class="order-name">${o.consignments?.card_name || o.products?.name || 'ЩЬЦЗ'}</div>
                            <div class="order-meta">${o.shipping_carrier ? 'ПьЕн: ' + o.shipping_carrier : ''} ${o.tracking_no ? 'ЕЅКХ: ' + o.tracking_no : ''}</div>
                            <div class="order-price">?${o.total_amount.toFixed(2)}</div>
                        </div>
                    </div>
                    <div class="order-footer">
                        ${getOrderActions(o)}
                    </div>
                </div>
            `;
        }

        function getOrderActions(o) {
            const isBuyer = o.buyer_id === currentUser.id;
            const isSeller = o.seller_id === currentUser.id;
            let actions = '';

            if (isBuyer) {
                // ТђМвВйзї
                if (o.status === 'paid') {
                    // вбИЖПюЃЌЕШД§ТєМвЗЂЛѕЃЌТђМвПЩвдШЁЯћЛђЩъЧыЭЫПю
                    actions += `<button class="order-btn order-btn-danger" onclick="event.stopPropagation(); openRefundModal('${o.id}')">ЩъЧыЭЫПю</button>`;
                } else if (o.status === 'shipped' || o.status === 'delivered') {
                    // вбЗЂЛѕЃЌТђМвПЩвдШЗШЯЪеЛѕ
                    actions += `<button class="order-btn order-btn-primary" onclick="event.stopPropagation(); confirmReceipt('${o.id}')">ШЗШЯЪеЛѕ</button>`;
                } else if (o.status === 'refund_requested') {
                    actions += `<span style="color:#999;font-size:12px;">ЭЫПюЩъЧыДІРэжа</span>`;
                } else if (o.status === 'completed') {
                    actions += `<button class="order-btn order-btn-outline" onclick="event.stopPropagation(); openDisputeModal('${o.id}')">ЗЂЦ№ељвщ</button>`;
                }
            }

            if (isSeller) {
                // ТєМвВйзї
                if (o.status === 'paid') {
                    // вбИЖПюЃЌТєМвашвЊЗЂЛѕ
                    actions += `<button class="order-btn order-btn-primary" onclick="event.stopPropagation(); openShipModal('${o.id}')">ЗЂЛѕ</button>`;
                } else if (o.status === 'refund_requested') {
                    // ТђМвЩъЧыЭЫПюЃЌТєМвашвЊДІРэ
                    actions += `<button class="order-btn order-btn-primary" onclick="event.stopPropagation(); openProcessRefundModal('${o.id}')">ДІРэЭЫПю</button>`;
                } else if (o.status === 'shipped') {
                    actions += `<span style="color:#43a047;font-size:12px;">вбЗЂЛѕЃЌЕШД§ТђМвШЗШЯ</span>`;
                }
            }

            return actions;
        }

        function viewOrder(orderId) {
            window.location.href = `order-detail.html?id=${orderId}`;
        }

        // ===== Ship =====
        function openShipModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('shipModal').classList.add('show');
        }

        async function confirmShip() {
            const trackingNo = document.getElementById('trackingNo').value.trim();
            if (!trackingNo) { showToast('ЧыЪфШыПьЕнЕЅКХ'); return; }
            const carrier = document.getElementById('shippingCarrier').value.trim();

            const { error } = await db.rpc('seller_ship_order', {
                p_order_id: currentOrderId,
                p_tracking_no: trackingNo,
                p_shipping_carrier: carrier || null
            });

            if (error) { showToast('ЗЂЛѕЪЇАм: ' + error.message); return; }
            closeModal('shipModal');
            showToast('ЗЂЛѕГЩЙІЃЁ');
            loadOrders();
        }

        // ===== Confirm Receipt =====
        async function confirmReceipt(orderId) {
            if (!confirm('ШЗШЯвбЪеЕНЩЬЦЗЃП')) return;

            const { error } = await db.rpc('buyer_confirm_receipt', {
                p_order_id: orderId
            });

            if (error) { showToast('ВйзїЪЇАм: ' + error.message); return; }
            showToast('ШЗШЯЪеЛѕГЩЙІЃЁ');
            loadOrders();
        }

        // ===== Refund =====
        function openRefundModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('refundModal').classList.add('show');
        }

        async function confirmRefund() {
            const reason = document.getElementById('refundReason').value.trim();
            if (!reason) { showToast('ЧыЪфШыЭЫПюд­вђ'); return; }

            const { error } = await db.rpc('buyer_request_refund', {
                p_order_id: currentOrderId,
                p_reason: reason
            });

            if (error) { showToast('ЩъЧыЪЇАм: ' + error.message); return; }
            closeModal('refundModal');
            showToast('ЭЫПюЩъЧывбЬсНЛЃЁ');
            loadOrders();
        }

        // ===== Process Refund (Seller) =====
        function openProcessRefundModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('processRefundModal').classList.add('show');
        }

        async function processRefund(approved) {
            const note = document.getElementById('sellerNote').value.trim();

            const { error } = await db.rpc('seller_process_refund', {
                p_order_id: currentOrderId,
                p_approved: approved,
                p_seller_note: note || null
            });

            if (error) { showToast('ВйзїЪЇАм: ' + error.message); return; }
            closeModal('processRefundModal');
            showToast(approved ? 'вбЭЌвтЭЫПю' : 'вбОмОјЭЫПю');
            loadOrders();
        }

        // ===== Dispute =====
        function openDisputeModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('disputeModal').classList.add('show');
        }

        async function confirmDispute() {
            const reason = document.getElementById('disputeReason').value.trim();
            if (!reason) { showToast('ЧыЪфШыељвщд­вђ'); return; }

            const { error } = await db.rpc('create_order_dispute', {
                p_order_id: currentOrderId,
                p_reason: reason
            });

            if (error) { showToast('ЗЂЦ№ЪЇАм: ' + error.message); return; }
            closeModal('disputeModal');
            showToast('ељвщвбПЊЦє');
            loadOrders();
        }

        // ===== Modal =====
        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
            if (id === 'shipModal') {
                document.getElementById('trackingNo').value = '';
                document.getElementById('shippingCarrier').value = '';
            } else if (id === 'refundModal') {
                document.getElementById('refundReason').value = '';
            } else if (id === 'disputeModal') {
                document.getElementById('disputeReason').value = '';
            } else if (id === 'processRefundModal') {
                document.getElementById('sellerNote').value = '';
            }
        }

        // ===== Toast =====
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        // ===== Init =====
        (function() {
            const s = document.createElement('script');
            s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
            s.onload = init;
            document.head.appendChild(s);
        })();
    </script>
</body>
</html>
