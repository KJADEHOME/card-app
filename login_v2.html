<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>卡域 - 登录</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { font-size: 60px; margin-bottom: 10px; }
        .logo-title { font-size: 28px; font-weight: bold; }
        .tab-nav { display: flex; margin-bottom: 25px; border-bottom: 2px solid #f0f0f0; }
        .tab-item { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: #999; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-item.active { color: #667eea; border-bottom-color: #667eea; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #666; font-size: 13px; }
        .form-group input { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 15px; }
        .login-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .login-btn:disabled { opacity: 0.6; }
        .error-msg { color: #f44336; font-size: 12px; margin-top: 5px; min-height: 18px; }
        .guest-link { text-align: center; margin-top: 15px; color: #667eea; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🃏</div>
            <div class="logo-title">卡域</div>
        </div>
        
        <div class="tab-nav">
            <div class="tab-item active" id="tab-login">登录</div>
            <div class="tab-item" id="tab-register">注册</div>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="loginEmail" placeholder="test@example.com" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="123456" required>
            </div>
            <div class="error-msg" id="loginError"></div>
            <button type="submit" class="login-btn" id="loginBtn">登录</button>
        </form>
        
        <form id="registerForm" style="display: none;">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="用户名" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="密码（至少6位）" required minlength="6">
            </div>
            <div class="error-msg" id="regError"></div>
            <button type="submit" class="login-btn" id="regBtn">注册</button>
        </form>
        
        <div class="guest-link" onclick="guestLogin()">👤 游客模式</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // 配置
        const DB_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const DB_KEY = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';
        
        // 创建客户端
        const db = window.supabase.createClient(DB_URL, DB_KEY);
        
        // 切换标签
        document.getElementById('tab-login').onclick = function() {
            document.getElementById('tab-login').classList.add('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        };
        
        document.getElementById('tab-register').onclick = function() {
            document.getElementById('tab-register').classList.add('active');
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
        };
        
        // 登录
        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('loginError');
            
            btn.disabled = true;
            btn.textContent = '登录中...';
            errEl.textContent = '';
            
            const { data, error } = await db.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            });
            
            btn.disabled = false;
            btn.textContent = '登录';
            
            if (error) {
                errEl.textContent = '登录失败: ' + error.message;
            } else {
                localStorage.setItem('userEmail', data.user.email);
                window.location.href = 'collection.html';
            }
        };
        
        // 注册
        document.getElementById('registerForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('regBtn');
            const errEl = document.getElementById('regError');
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            errEl.textContent = '';
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            const { data, error } = await db.auth.signUp({
                email: email,
                password: password,
                options: { data: { username: username } }
            });
            
            btn.disabled = false;
            btn.textContent = '注册';
            
            if (error) {
                errEl.textContent = '注册失败: ' + error.message;
            } else {
                if (data.user) {
                    await db.from('profiles').insert([{ id: data.user.id, username: username }]);
                }
                alert('✅ 注册成功！请登录');
                document.getElementById('tab-login').click();
            }
        };
        
        // 游客
        function guestLogin() {
            localStorage.setItem('isGuest', 'true');
            localStorage.setItem('userEmail', '游客');
            window.location.href = 'collection.html';
        }
        
        // 检查登录状态
        (async function() {
            const { data: { user } } = await db.auth.getUser();
            if (user) {
                window.location.href = 'collection.html';
            }
        })();
    </script>
</body>
</html>
