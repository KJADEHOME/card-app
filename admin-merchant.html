<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2E7D32">
    <title>商家管理 - 卡域 CardRealm</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F7F8FC;min-height:100vh;padding-bottom:80px}
        
        .header{background:linear-gradient(135deg,#2E7D32 0%,#4CAF50 100%);color:white;padding:16px 20px;position:sticky;top:0;z-index:100}
        .header-title{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
        .header-subtitle{font-size:12px;opacity:.8;margin-top:4px}
        
        .container{max-width:480px;margin:0 auto;padding:16px}
        
        .admin-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border-radius:12px;font-size:14px;color:#2E7D32;font-weight:700;margin-bottom:16px}
        
        .section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin:20px 0 12px;display:flex;align-items:center;gap:6px}
        
        .card{background:white;border-radius:16px;padding:20px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
        .card-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f5}
        .card-row:last-child{border:none}
        .card-label{font-size:13px;color:#666}
        .card-value{font-size:13px;font-weight:600;color:#1a1a2e}
        .card-value.green{color:#2E7D32}
        .card-value.red{color:#E74C3C}
        
        .btn-group{display:flex;gap:8px;margin-top:12px}
        .btn{padding:10px 20px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
        .btn:active{transform:scale(.97)}
        .btn-primary{background:linear-gradient(135deg,#2E7D32,#4CAF50);color:white}
        .btn-secondary{background:#F0F0F8;color:#666}
        .btn-danger{background:linear-gradient(135deg,#E74C3C,#C0392B);color:white}
        
        .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
        .stat-card{background:white;border-radius:12px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .stat-number{font-size:24px;font-weight:800;color:#2E7D32}
        .stat-label{font-size:12px;color:#666;margin-top:4px}
        
        .user-list{display:flex;flex-direction:column;gap:8px}
        .user-item{background:white;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
        .user-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#5B4AE0,#7B6CF0);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px}
        .user-avatar.admin{background:linear-gradient(135deg,#2E7D32,#4CAF50)}
        .user-avatar.merchant{background:linear-gradient(135deg,#E65100,#FF9800)}
        .user-info{flex:1}
        .user-name{font-size:14px;font-weight:700;color:#1a1a2e}
        .user-role{font-size:12px;color:#888;margin-top:2px}
        .user-badge{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
        .user-badge.admin{background:#E8F5E9;color:#2E7D32}
        .user-badge.merchant{background:#FFF3E0;color:#E65100}
        .user-badge.user{background:#F0F0F8;color:#666}
        
        .live-session-card{background:white;border-radius:16px;padding:16px;margin-bottom:8px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:4px solid #4CAF50}
        .live-title{font-size:14px;font-weight:700;color:#1a1a2e}
        .live-meta{font-size:12px;color:#888;margin-top:4px;display:flex;gap:8px}
        .live-status{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600}
        .live-status.live{background:#E8F5E9;color:#2E7D32}
        .live-status.scheduled{background:#FFF3E0;color:#E65100}
        .live-status.ended{background:#F0F0F8;color:#666}
        
        .empty-state{text-align:center;padding:40px 20px}
        .empty-icon{font-size:48px;margin-bottom:12px}
        .empty-text{font-size:14px;color:#999}
        
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal-box{background:white;border-radius:20px;padding:24px;width:90%;max-width:400px}
        .modal-title{font-size:18px;font-weight:700;margin-bottom:12px}
        .modal-input{width:100%;padding:12px;border:1.5px solid #E8E8F0;border-radius:12px;font-size:14px;margin-bottom:12px;outline:none}
        .modal-input:focus{border-color:#2E7D32}
        
        .nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:8px 0 16px;box-shadow:0 -2px 20px rgba(0,0,0,.08);z-index:100}
        .nav-item{text-decoration:none;color:#999;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px}
        .nav-item .nav-icon{font-size:22px}
        .nav-item.active{color:#2E7D32}
        
        .loading{text-align:center;padding:40px;color:#999}
        .loading .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#2E7D32;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;z-index:300}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(10px)}
    </style>
</head>
<body>
    <div class="header">
        <div>
            <div class="header-title">🛡️ 商家管理后台</div>
            <div class="header-subtitle">平台自营 · 商家认证 · 直播同步</div>
        </div>
        <button class="header-action-btn" onclick="logout()" title="退出登录" style="background:rgba(255,255,255,0.2);border:none;border-radius:50%;width:40px;height:40px;color:white;font-size:18px;cursor:pointer">🚪</button>
    </div>
    
    <div class="container">
        <div class="loading" id="loadingState"><div class="spinner"></div>加载中...</div>
        
        <!-- Admin Info -->
        <div id="adminInfo" style="display:none">
            <div class="admin-badge" id="adminBadge">🛡️ 管理员 · <span id="adminName">-</span></div>
            
            <!-- Stats -->
            <div class="stat-grid">
                <div class="stat-card"><div class="stat-number" id="statPlatformSales">0</div><div class="stat-label">自营在售</div></div>
                <div class="stat-card"><div class="stat-number" id="statTotalListings">0</div><div class="stat-label">总在售</div></div>
                <div class="stat-card"><div class="stat-number" id="statMerchants">0</div><div class="stat-label">认证商家</div></div>
                <div class="stat-card"><div class="stat-number" id="statLiveSessions">0</div><div class="stat-label">直播场次</div></div>
            </div>
            
            <!-- Quick Actions -->
            <div class="section-title">⚡ 快捷操作</div>
            <div class="btn-group">
                <a href="index.html" class="btn btn-primary" style="text-decoration:none">📱 扫卡入库</a>
                <button class="btn btn-secondary" onclick="showBulkListModal()">📦 批量上架</button>
                <button class="btn btn-secondary" onclick="showCreateLiveModal()">📺 开直播</button>
            </div>
            
            <!-- Platform Listings -->
            <div class="section-title">🛡️ 自营在售卡牌</div>
            <div id="platformListings"></div>
            
            <!-- Merchant Users -->
            <div class="section-title">✅ 认证商家列表</div>
            <div id="merchantList"></div>
            
            <!-- Live Sessions -->
            <div class="section-title">📺 直播场次</div>
            <div id="liveSessions"></div>
        </div>
    </div>
    
    <!-- Bulk List Modal -->
    <div class="modal-overlay" id="bulkListModal">
        <div class="modal-box">
            <div class="modal-title">📦 批量上架自营卡牌</div>
            <p style="font-size:13px;color:#888;margin-bottom:12px">从你的库存中选择卡牌上架（0手续费，全额入账）</p>
            <div id="bulkListCards"></div>
            <div class="btn-group" style="justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeBulkListModal()">取消</button>
            </div>
        </div>
    </div>
    
    <!-- Create Live Modal -->
    <div class="modal-overlay" id="createLiveModal">
        <div class="modal-box">
            <div class="modal-title">📺 创建直播场次</div>
            <input class="modal-input" id="liveTitle" placeholder="直播标题">
            <input class="modal-input" id="liveRoomId" placeholder="抖音直播间ID">
            <input class="modal-input" id="liveUrl" placeholder="直播链接">
            <div class="btn-group" style="justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeCreateLiveModal()">取消</button>
                <button class="btn btn-primary" onclick="createLiveSession()">创建</button>
            </div>
        </div>
    </div>
    
    <!-- Verify Merchant Modal -->
    <div class="modal-overlay" id="verifyModal">
        <div class="modal-box">
            <div class="modal-title">✅ 认证商家</div>
            <input class="modal-input" id="verifyUserId" placeholder="用户ID (UUID)">
            <input class="modal-input" id="verifyMerchantName" placeholder="店铺名称">
            <input class="modal-input" id="verifyMerchantDesc" placeholder="店铺简介">
            <input class="modal-input" id="verifyMerchantBadge" placeholder="徽章标识" value="✅认证">
            <div class="btn-group" style="justify-content:flex-end">
                <button class="btn btn-secondary" onclick="closeVerifyModal()">取消</button>
                <button class="btn btn-primary" onclick="verifyMerchant()">认证</button>
            </div>
        </div>
    </div>
    
    <!-- Nav -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🛒</span>市场</a>
        <a href="admin-merchant.html" class="nav-item active"><span class="nav-icon">🛡️</span>商家</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        
        // 退出登录并清理缓存
        async function logout() {
            if (!confirm('确定要退出当前账号吗？')) return;
            await db.auth.signOut();
            localStorage.clear();
            window.location.href = 'login.html';
        }
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        
        async function init() {
            const { data: { session } } = await db.auth.getSession();
            currentUser = session?.user || null;
            
            if (!currentUser) {
                showToast('请先登录');
                setTimeout(() => location.href = 'login.html', 1500);
                return;
            }
            
            // 检查是否是管理员/商家
            const { data: profile } = await db.from('profiles').select('*').eq('id', currentUser.id).single();
            
            if (!profile || profile.role !== 'admin') {
                // 备用检查: 邮箱包含 admin
                if (!currentUser.email?.includes('admin')) {
                    showToast('需要管理员权限');
                    setTimeout(() => location.href = 'index.html', 1500);
                    return;
                }
            }
            
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('adminInfo').style.display = 'block';
            document.getElementById('adminName').textContent = profile?.merchant_name || profile?.username || currentUser.email;
            
            await loadStats();
            await loadPlatformListings();
            await loadMerchants();
            await loadLiveSessions();
        }
        
        async function loadStats() {
            // 自营在售
            const { count: platformCount } = await db.from('consignments').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('is_platform_sale', true);
            document.getElementById('statPlatformSales').textContent = platformCount || 0;
            
            // 总在售
            const { count: totalCount } = await db.from('consignments').select('*', { count: 'exact', head: true }).eq('status', 'active');
            document.getElementById('statTotalListings').textContent = totalCount || 0;
            
            // 认证商家
            const { count: merchantCount } = await db.from('profiles').select('*', { count: 'exact', head: true }).eq('merchant_verified', true);
            document.getElementById('statMerchants').textContent = merchantCount || 0;
            
            // 直播场次
            const { count: liveCount } = await db.from('live_sessions').select('*', { count: 'exact', head: true });
            document.getElementById('statLiveSessions').textContent = liveCount || 0;
        }
        
        async function loadPlatformListings() {
            const { data } = await db.from('consignments').select('*').eq('status', 'active').eq('is_platform_sale', true).order('created_at', { ascending: false }).limit(20);
            
            const container = document.getElementById('platformListings');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">暂无自营在售卡牌<br>点击"扫卡入库"开始添加</div></div>';
                return;
            }
            
            container.innerHTML = data.map(c => `
                <div class="card">
                    <div style="display:flex;gap:12px;align-items:center">
                        <img src="${c.card_image || 'https://via.placeholder.com/60x80?text=No+Img'}" style="width:60px;height:80px;object-fit:cover;border-radius:8px" loading="lazy">
                        <div style="flex:1">
                            <div style="font-size:14px;font-weight:700">🛡️ ${c.card_name}</div>
                            <div style="font-size:12px;color:#888;margin-top:2px">${c.series || '-'} · ${c.rarity || 'N'}</div>
                            <div style="font-size:16px;font-weight:800;color:#2E7D32;margin-top:4px">¥${(c.asking_price || 0).toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadMerchants() {
            const { data } = await db.from('profiles').select('*').eq('merchant_verified', true).order('merchant_sort_weight', { ascending: false });
            
            const container = document.getElementById('merchantList');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">暂无认证商家</div></div>';
                return;
            }
            
            container.innerHTML = '<div class="user-list">' + data.map(u => `
                <div class="user-item">
                    <div class="user-avatar ${u.role}">${u.role === 'admin' ? '🛡' : '店'}</div>
                    <div class="user-info">
                        <div class="user-name">${u.merchant_name || u.username} <span class="user-badge ${u.role}">${u.merchant_badge || u.role}</span></div>
                        <div class="user-role">认证时间: ${(u.merchant_verified_at || '-').slice(0,10)}</div>
                    </div>
                </div>
            `).join('') + '</div>';
        }
        
        async function loadLiveSessions() {
            const { data } = await db.from('live_sessions_overview').select('*').order('created_at', { ascending: false }).limit(10);
            
            const container = document.getElementById('liveSessions');
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📺</div><div class="empty-text">暂无直播场次<br>点击"开直播"创建</div></div>';
                return;
            }
            
            container.innerHTML = data.map(s => `
                <div class="live-session-card" style="border-left-color:${s.status === 'live' ? '#4CAF50' : s.status === 'scheduled' ? '#FF9800' : '#9E9E9E'}">
                    <div class="live-title">${s.title}</div>
                    <div class="live-meta">
                        <span>${s.platform}</span>
                        <span>商家: ${s.host_merchant_name || s.host_name}</span>
                        <span class="live-status ${s.status}">${s.status}</span>
                    </div>
                </div>
            `).join('');
        }
        
        // --- Modal Functions ---
        
        function showBulkListModal() {
            document.getElementById('bulkListModal').classList.add('show');
            loadBulkListCards();
        }
        function closeBulkListModal() { document.getElementById('bulkListModal').classList.remove('show'); }
        
        async function loadBulkListCards() {
            const { data } = await db.rpc('get_listable_collections', { p_user_id: currentUser.id });
            const container = document.getElementById('bulkListCards');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<p style="color:#999;font-size:13px">暂无可上架的库存</p>';
                return;
            }
            
            container.innerHTML = data.map(c => `
                <div style="display:flex;gap:8px;align-items:center;padding:8px;border:1px solid #eee;border-radius:8px;margin-bottom:8px">
                    <img src="${c.card_image || ''}" style="width:40px;height:50px;object-fit:cover;border-radius:6px">
                    <div style="flex:1;font-size:13px"><strong>${c.card_name}</strong><br>${c.series || '-'} · 可用${c.available_qty}张</div>
                    <input type="number" placeholder="售价" style="width:80px;padding:6px;border:1px solid #ddd;border-radius:6px;font-size:12px" id="price_${c.collection_id}">
                    <button class="btn btn-primary" style="padding:6px 12px;font-size:12px" onclick="listCard('${c.collection_id}')">上架</button>
                </div>
            `).join('');
        }
        
        async function listCard(collectionId) {
            const price = parseFloat(document.getElementById(`price_${collectionId}`).value);
            if (!price || price <= 0) { showToast('请输入有效售价'); return; }
            
            const { data, error } = await db.rpc('create_consignment_from_collection', {
                p_user_id: currentUser.id,
                p_collection_id: collectionId,
                p_asking_price: price,
                p_shipping_fee: 0,
                p_description: '🛡️平台自营正品'
            });
            
            if (error || !data?.success) {
                showToast('上架失败: ' + (error?.message || data?.error));
                return;
            }
            
            showToast('✅ 自营上架成功！0手续费');
            closeBulkListModal();
            await loadPlatformListings();
            await loadStats();
        }
        
        function showCreateLiveModal() { document.getElementById('createLiveModal').classList.add('show'); }
        function closeCreateLiveModal() { document.getElementById('createLiveModal').classList.remove('show'); }
        
        async function createLiveSession() {
            const title = document.getElementById('liveTitle').value.trim();
            const roomId = document.getElementById('liveRoomId').value.trim();
            const liveUrl = document.getElementById('liveUrl').value.trim();
            
            if (!title) { showToast('请输入直播标题'); return; }
            
            const { data, error } = await db.rpc('create_live_session', {
                p_host_id: currentUser.id,
                p_title: title,
                p_platform: 'douyin',
                p_live_room_id: roomId,
                p_live_url: liveUrl
            });
            
            if (error || !data?.success) {
                showToast('创建失败: ' + (error?.message || data?.error));
                return;
            }
            
            showToast('✅ 直播场次创建成功！');
            closeCreateLiveModal();
            await loadLiveSessions();
            await loadStats();
        }
        
        function showVerifyModal() { document.getElementById('verifyModal').classList.add('show'); }
        function closeVerifyModal() { document.getElementById('verifyModal').classList.remove('show'); }
        
        async function verifyMerchant() {
            const userId = document.getElementById('verifyUserId').value.trim();
            const name = document.getElementById('verifyMerchantName').value.trim();
            const desc = document.getElementById('verifyMerchantDesc').value.trim();
            const badge = document.getElementById('verifyMerchantBadge').value.trim();
            
            if (!userId || !name) { showToast('请填写用户ID和店铺名称'); return; }
            
            const { data, error } = await db.rpc('admin_verify_merchant', {
                p_admin_id: currentUser.id,
                p_user_id: userId,
                p_merchant_name: name,
                p_merchant_desc: desc,
                p_merchant_badge: badge
            });
            
            if (error || !data?.success) {
                showToast('认证失败: ' + (error?.message || data?.error));
                return;
            }
            
            showToast('✅ 商家认证成功！');
            closeVerifyModal();
            await loadMerchants();
            await loadStats();
        }
        
        init();
    </script>
</body>
</html>
