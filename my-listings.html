<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#5B4AE0">
    <title>我的挂单 - 卡域 CardRealm</title>
    <link rel="manifest" href="manifest.json">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#F7F8FC;min-height:100vh;padding-bottom:80px}
        
        .header{background:linear-gradient(135deg,#5B4AE0 0%,#7B6CF0 100%);color:white;padding:16px 20px;position:sticky;top:0;z-index:100}
        .header-title{font-size:18px;font-weight:700}
        .header-sub{font-size:12px;opacity:.8;margin-top:2px}
        
        .stats-row{display:flex;gap:12px;padding:12px 16px;background:white;border-bottom:1px solid #eee;overflow-x:auto;scrollbar-width:none}
        .stats-row::-webkit-scrollbar{display:none}
        .stat-card{flex:1;min-width:90px;text-align:center;padding:10px 8px;background:#F7F8FC;border-radius:12px}
        .stat-card .num{font-size:20px;font-weight:800;color:#5B4AE0}
        .stat-card .lbl{font-size:11px;color:#999;margin-top:2px}
        
        .tabs{display:flex;background:white;padding:0 16px;border-bottom:1px solid #eee}
        .tab{flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
        .tab.active{color:#5B4AE0;border-bottom-color:#5B4AE0}
        .tab .badge{display:inline-block;background:#E8E8F0;color:#666;font-size:11px;padding:1px 8px;border-radius:10px;margin-left:4px;font-weight:500}
        .tab.active .badge{background:#F5F3FF;color:#5B4AE0}
        
        .container{max-width:480px;margin:0 auto;padding:12px 16px}
        
        .list-item{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);display:flex;gap:12px;align-items:flex-start}
        .list-img{width:80px;height:107px;border-radius:10px;object-fit:cover;flex-shrink:0;background:linear-gradient(135deg,#f0f0f5,#e8e8f0)}
        .list-info{flex:1;min-width:0}
        .list-name{font-size:15px;font-weight:700;color:#1a1a2e;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .list-meta{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
        .tag{font-size:10px;padding:2px 8px;border-radius:6px;background:#F0F0F8;color:#666}
        .tag.rarity{background:linear-gradient(135deg,#FFF8E1,#FFECB3);color:#D4880F}
        
        .list-price-row{display:flex;justify-content:space-between;align-items:flex-end;margin-top:8px}
        .list-price{font-size:18px;font-weight:800;color:#E74C3C}
        .list-price .unit{font-size:11px}
        .list-earnings{font-size:12px;color:#27AE60;font-weight:600}
        
        .status-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;margin-top:6px}
        .status-active{background:#E8F5E9;color:#2E7D32}
        .status-sold{background:#E3F2FD;color:#1565C0}
        .status-cancelled{background:#FFF3E0;color:#E65100}
        
        .list-actions{display:flex;gap:8px;margin-top:10px}
        .action-btn{padding:6px 14px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:opacity .2s}
        .action-btn:active{opacity:.8}
        .btn-cancel{background:#FEE2E2;color:#DC2626}
        .btn-view{background:#F0F0F8;color:#666}
        
        .empty-state{text-align:center;padding:60px 20px}
        .empty-state .icon{font-size:48px;margin-bottom:12px}
        .empty-state .text{font-size:14px;color:#999;margin-bottom:16px}
        .empty-state .action-btn{padding:10px 24px;background:#5B4AE0;color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer}
        
        .loading{text-align:center;padding:40px;color:#999}
        .loading .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#5B4AE0;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
        @keyframes spin{to{transform:rotate(360deg)}}
        
        .nav{position:fixed;bottom:0;left:0;right:0;background:white;display:flex;justify-content:space-around;padding:8px 0 16px;box-shadow:0 -2px 20px rgba(0,0,0,.08);z-index:100}
        .nav-item{text-decoration:none;color:#999;font-size:11px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 12px}
        .nav-item .nav-icon{font-size:22px}
        .nav-item.active{color:#5B4AE0}
        
        .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:12px 24px;border-radius:12px;font-size:14px;opacity:0;transition:all .3s;z-index:300;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(10px)}
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">📋 我的挂单</div>
        <div class="header-sub">管理你的寄售卡牌</div>
    </div>
    
    <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="num" id="statActive">-</div><div class="lbl">在售</div></div>
        <div class="stat-card"><div class="num" id="statSold">-</div><div class="lbl">已售</div></div>
        <div class="stat-card"><div class="num" id="statEarnings">-</div><div class="lbl">累计收入</div></div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-status="active" onclick="switchTab(this)">在售<span class="badge" id="badgeActive">0</span></div>
        <div class="tab" data-status="sold" onclick="switchTab(this)">已售<span class="badge" id="badgeSold">0</span></div>
        <div class="tab" data-status="cancelled" onclick="switchTab(this)">已取消<span class="badge" id="badgeCancelled">0</span></div>
    </div>
    
    <div class="container">
        <div class="loading" id="loadingState"><div class="spinner"></div>加载中...</div>
        <div id="listContainer" style="display:none"></div>
        <div class="empty-state" id="emptyState" style="display:none">
            <div class="icon">📭</div>
            <div class="text" id="emptyText">暂无挂单</div>
            <button class="action-btn" onclick="location.href='sell.html'">去上架一张</button>
        </div>
    </div>
    
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="shop.html" class="nav-item"><span class="nav-icon">🛍</span>商城</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🛒</span>市场</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let currentUser = null;
        let allListings = [];
        let currentTab = 'active';
        
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
        
        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s || '';
            return d.innerHTML;
        }
        
        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                showToast('请先登录');
                setTimeout(() => location.href = 'index.html', 1500);
                return;
            }
            currentUser = session.user;
            await loadData();
        }
        
        async function loadData() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('listContainer').style.display = 'none';
            
            const { data, error } = await db.from('consignments')
                .select('*')
                .eq('seller_id', currentUser.id)
                .order('created_at', { ascending: false });
            
            document.getElementById('loadingState').style.display = 'none';
            
            if (error) {
                showToast('加载失败: ' + error.message);
                return;
            }
            
            allListings = data || [];
            updateStats();
            renderList();
        }
        
        function updateStats() {
            const active = allListings.filter(c => c.status === 'active').length;
            const sold = allListings.filter(c => c.status === 'sold').length;
            const totalEarnings = allListings
                .filter(c => c.status === 'sold')
                .reduce((sum, c) => sum + (c.seller_earnings || 0), 0);
            
            document.getElementById('statActive').textContent = active;
            document.getElementById('statSold').textContent = sold;
            document.getElementById('statEarnings').textContent = `¥${totalEarnings.toFixed(0)}`;
            
            document.getElementById('badgeActive').textContent = active;
            document.getElementById('badgeSold').textContent = sold;
            document.getElementById('badgeCancelled').textContent = 
                allListings.filter(c => c.status === 'cancelled').length;
        }
        
        function switchTab(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            currentTab = el.dataset.status;
            renderList();
        }
        
        function renderList() {
            const container = document.getElementById('listContainer');
            const empty = document.getElementById('emptyState');
            const filtered = allListings.filter(c => c.status === currentTab);
            
            if (filtered.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'block';
                document.getElementById('emptyText').textContent = {
                    active: '暂无在售挂单',
                    sold: '暂无已售记录',
                    cancelled: '暂无已取消记录'
                }[currentTab] || '暂无记录';
                return;
            }
            
            empty.style.display = 'none';
            container.style.display = 'block';
            container.innerHTML = filtered.map(c => {
                const statusMap = { active: '在售', sold: '已售', cancelled: '已取消' };
                const statusClassMap = { active: 'status-active', sold: 'status-sold', cancelled: 'status-cancelled' };
                
                let actions = '';
                if (c.status === 'active') {
                    actions = `
                        <div class="list-actions">
                            <button class="action-btn btn-cancel" onclick="cancelListing('${c.id}')">取消挂单</button>
                            <button class="action-btn btn-view" onclick="location.href='marketplace.html'">查看市场</button>
                        </div>`;
                } else if (c.status === 'sold') {
                    actions = `
                        <div class="list-actions">
                            <span style="font-size:12px;color:#666">售出时间: ${new Date(c.sold_at).toLocaleString('zh-CN')}</span>
                        </div>`;
                }
                
                return `
                <div class="list-item">
                    <img class="list-img" src="${c.card_image || 'https://via.placeholder.com/300x400?text=No+Image'}" alt="${esc(c.card_name)}">
                    <div class="list-info">
                        <div class="list-name">${esc(c.card_name)}</div>
                        <div class="list-meta">
                            <span class="tag rarity">${esc(c.rarity || 'N')}</span>
                            <span class="tag">${esc(c.condition || 'NM')}</span>
                            <span class="tag">${esc(c.series || '-')}</span>
                        </div>
                        <span class="status-badge ${statusClassMap[c.status]}">${statusMap[c.status]}</span>
                        <div class="list-price-row">
                            <div class="list-price"><span class="unit">¥</span>${(c.asking_price || 0).toFixed(2)}</div>
                            ${c.status === 'sold' ? `<div class="list-earnings">到手 ¥${(c.seller_earnings || 0).toFixed(2)}</div>` : ''}
                        </div>
                        ${actions}
                    </div>
                </div>`;
            }).join('');
        }
        
        async function cancelListing(consignmentId) {
            if (!confirm('确定要取消这个挂单吗？库存将自动恢复。')) return;
            
            showToast('取消中...');
            
            const { data, error } = await db.rpc('cancel_consignment', {
                p_user_id: currentUser.id,
                p_consignment_id: consignmentId
            });
            
            if (error) {
                showToast('取消失败: ' + error.message);
                return;
            }
            
            if (!data.success) {
                showToast(data.error);
                return;
            }
            
            showToast('✅ 已取消');
            loadData();
        }
        
        init();
    </script>
</body>
</html>
