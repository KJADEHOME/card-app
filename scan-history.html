<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI璇嗗崱璁板綍 - 鍗″煙 Card Realm</title>
    <meta name="description" content="鏌ョ湅浣犵殑AI璇嗗崱鍘嗗彶璁板綍">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent; color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--white); padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
        }
        .header-back {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: var(--bg); border: none; border-radius: 8px;
            font-size: 18px; cursor: pointer; text-decoration: none; color: var(--text);
        }
        .header-title { font-size: 17px; font-weight: 700; flex: 1; }
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;
        }
        .stat-card {
            background: var(--white); border-radius: var(--radius); padding: 14px;
            box-shadow: var(--shadow); text-align: center;
        }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .scan-card {
            background: var(--white); border-radius: var(--radius); padding: 14px;
            box-shadow: var(--shadow); margin-bottom: 10px; display: flex; gap: 12px;
        }
        .scan-img {
            width: 80px; height: 110px; border-radius: 8px; background: #f0f0f3;
            flex-shrink: 0; object-fit: cover;
        }
        .scan-info { flex: 1; min-width: 0; }
        .scan-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .scan-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .scan-price { font-size: 16px; font-weight: 700; color: var(--primary); }
        .scan-time { font-size: 11px; color: #bbb; margin-top: 6px; }
        .scan-confidence {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600; margin-top: 6px;
        }
        .conf-high { background: #e8f5e9; color: #27ae60; }
        .conf-mid { background: #fff3e0; color: #f57c00; }
        .conf-low { background: #ffebee; color: #e74c3c; }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
        .empty-btn {
            display: inline-block; padding: 12px 32px;
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%);
            color: white; border-radius: 24px; text-decoration: none;
            font-size: 14px; font-weight: 600;
        }

        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <a href="profile.html" class="header-back">鈫?/a>
        <div class="header-title">馃摲 AI璇嗗崱璁板綍</div>
    </div>

    <div class="content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-val" id="totalScans">0</div>
                <div class="stat-label">鎬昏瘑鍒?/div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="totalCards">0</div>
                <div class="stat-label">璇嗗埆鍗＄墝</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="todayScans">0</div>
                <div class="stat-label">浠婃棩璇嗗埆</div>
            </div>
        </div>

        <div id="scanList"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">馃摲</div>
            <div class="empty-title">杩樻病鏈夎瘑鍗¤褰?/div>
            <div class="empty-desc">
                鐢ˋI鎵弿浣犵殑绗竴寮犲崱鐗?br>
                璁板綍浼氳嚜鍔ㄤ繚瀛樺湪杩欓噷
            </div>
            <a href="index.html" class="empty-btn">鍘昏瘑鍗?/a>
        </div>
    </div>

    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">馃攳</span>鎺㈢储</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">馃洅</span>甯傚満</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">馃搳</span>鐪嬫澘</a>
        <a href="profile.html" class="nav-item"><span class="nav-icon">馃懁</span>鎴戠殑</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                document.getElementById('scanList').innerHTML = '<div class="empty-state"><div class="empty-title">璇峰厛鐧诲綍</div></div>';
                return;
            }
            loadScans(session.user.id);
        }

        async function loadScans(userId) {
            try {
                const { data, error } = await db
                    .from('scan_history')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                document.getElementById('totalScans').textContent = data.length;
                const uniqueCards = new Set(data.map(s => s.card_name)).size;
                document.getElementById('totalCards').textContent = uniqueCards;

                const today = new Date().toISOString().split('T')[0];
                const todayCount = data.filter(s => s.created_at && s.created_at.startsWith(today)).length;
                document.getElementById('todayScans').textContent = todayCount;

                const list = document.getElementById('scanList');
                list.innerHTML = data.map(scan => {
                    const conf = scan.ai_confidence || 0.8;
                    const confClass = conf >= 0.9 ? 'conf-high' : conf >= 0.7 ? 'conf-mid' : 'conf-low';
                    const confText = conf >= 0.9 ? '楂樼疆淇″害' : conf >= 0.7 ? '涓疆淇″害' : '浣庣疆淇″害';
                    return `
                        <div class="scan-card">
                            ${scan.card_image ? `<img class="scan-img" src="${scan.card_image}" alt="">` : `<div class="scan-img" style="display:flex;align-items:center;justify-content:center;font-size:32px;">馃儚</div>`}
                            <div class="scan-info">
                                <div class="scan-name">${scan.card_name || '鏈煡鍗＄墝'}</div>
                                <div class="scan-meta">${scan.series || ''} 路 ${scan.rarity || ''}</div>
                                <div class="scan-price">浼颁环 楼${(scan.estimated_price || 0).toLocaleString()}</div>
                                <span class="scan-confidence ${confClass}">${confText}</span>
                                <div class="scan-time">${formatTime(scan.created_at)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load scans error:', e);
                document.getElementById('scanList').innerHTML = '<div class="empty-state"><div class="empty-title">鍔犺浇澶辫触</div></div>';
            }
        }

        function formatTime(ts) {
            if (!ts) return '鍒氬垰';
            const d = new Date(ts);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return '鍒氬垰';
            if (diff < 3600) return Math.floor(diff / 60) + '鍒嗛挓鍓?;
            if (diff < 86400) return Math.floor(diff / 3600) + '灏忔椂鍓?;
            if (diff < 604800) return Math.floor(diff / 86400) + '澶╁墠';
            return (d.getMonth() + 1) + '鏈? + d.getDate() + '鏃?;
        }

        init();
    </script>
</body>
</html>
