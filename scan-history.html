<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AI识卡记录 - 卡域 Card Realm</title>
    <meta name="description" content="查看你的AI识卡历史记录">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg); padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent; color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--white); padding: 12px 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            position: sticky; top: 0; z-index: 50;
            display: flex; align-items: center; gap: 12px;
        }
        .header-back {
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: var(--bg); border: none; border-radius: 8px;
            font-size: 18px; cursor: pointer; text-decoration: none; color: var(--text);
        }
        .header-title { font-size: 17px; font-weight: 700; flex: 1; }
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px;
        }
        .stat-card {
            background: var(--white); border-radius: var(--radius); padding: 14px;
            box-shadow: var(--shadow); text-align: center;
        }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }

        .scan-card {
            background: var(--white); border-radius: var(--radius); padding: 14px;
            box-shadow: var(--shadow); margin-bottom: 10px; display: flex; gap: 12px;
        }
        .scan-img {
            width: 80px; height: 110px; border-radius: 8px; background: #f0f0f3;
            flex-shrink: 0; object-fit: cover;
        }
        .scan-info { flex: 1; min-width: 0; }
        .scan-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .scan-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .scan-price { font-size: 16px; font-weight: 700; color: var(--primary); }
        .scan-time { font-size: 11px; color: #bbb; margin-top: 6px; }
        .scan-confidence {
            display: inline-block; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: 600; margin-top: 6px;
        }
        .conf-high { background: #e8f5e9; color: #27ae60; }
        .conf-mid { background: #fff3e0; color: #f57c00; }
        .conf-low { background: #ffebee; color: #e74c3c; }

        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
        .empty-btn {
            display: inline-block; padding: 12px 32px;
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%);
            color: white; border-radius: 24px; text-decoration: none;
            font-size: 14px; font-weight: 600;
        }

        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="header">
        <a href="collection.html" class="header-back">←</a>
        <div class="header-title">📷 AI识卡记录</div>
    </div>

    <div class="content">
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-val" id="totalScans">0</div>
                <div class="stat-label">总识别</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="totalCards">0</div>
                <div class="stat-label">识别卡牌</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="todayScans">0</div>
                <div class="stat-label">今日识别</div>
            </div>
        </div>

        <div id="scanList"></div>

        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">📷</div>
            <div class="empty-title">还没有识卡记录</div>
            <div class="empty-desc">
                用AI扫描你的第一张卡牌<br>
                记录会自动保存在这里
            </div>
            <a href="index.html" class="empty-btn">去识卡</a>
        </div>
    </div>

    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="market.html" class="nav-item"><span class="nav-icon">🛒</span>交易</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="collection.html" class="nav-item"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                document.getElementById('scanList').innerHTML = '<div class="empty-state"><div class="empty-title">请先登录</div></div>';
                return;
            }
            loadScans(session.user.id);
        }

        async function loadScans(userId) {
            try {
                const { data, error } = await db
                    .from('scan_history')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(50);

                if (error) throw error;

                if (!data || data.length === 0) {
                    document.getElementById('emptyState').style.display = 'block';
                    return;
                }

                document.getElementById('totalScans').textContent = data.length;
                const uniqueCards = new Set(data.map(s => s.card_name)).size;
                document.getElementById('totalCards').textContent = uniqueCards;

                const today = new Date().toISOString().split('T')[0];
                const todayCount = data.filter(s => s.created_at && s.created_at.startsWith(today)).length;
                document.getElementById('todayScans').textContent = todayCount;

                const list = document.getElementById('scanList');
                list.innerHTML = data.map(scan => {
                    const conf = scan.ai_confidence || 0.8;
                    const confClass = conf >= 0.9 ? 'conf-high' : conf >= 0.7 ? 'conf-mid' : 'conf-low';
                    const confText = conf >= 0.9 ? '高置信度' : conf >= 0.7 ? '中置信度' : '低置信度';
                    return `
                        <div class="scan-card">
                            ${scan.card_image ? `<img class="scan-img" src="${scan.card_image}" alt="">` : `<div class="scan-img" style="display:flex;align-items:center;justify-content:center;font-size:32px;">🃏</div>`}
                            <div class="scan-info">
                                <div class="scan-name">${scan.card_name || '未知卡牌'}</div>
                                <div class="scan-meta">${scan.series || ''} · ${scan.rarity || ''}</div>
                                <div class="scan-price">估价 ¥${(scan.estimated_price || 0).toLocaleString()}</div>
                                <span class="scan-confidence ${confClass}">${confText}</span>
                                <div class="scan-time">${formatTime(scan.created_at)}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Load scans error:', e);
                document.getElementById('scanList').innerHTML = '<div class="empty-state"><div class="empty-title">加载失败</div></div>';
            }
        }

        function formatTime(ts) {
            if (!ts) return '刚刚';
            const d = new Date(ts);
            const now = new Date();
            const diff = (now - d) / 1000;
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
            if (diff < 604800) return Math.floor(diff / 86400) + '天前';
            return (d.getMonth() + 1) + '月' + d.getDate() + '日';
        }

        init();
    </script>
</body>
</html>
