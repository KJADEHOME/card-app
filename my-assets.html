<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>我的资产 - 卡域 Card Realm</title>
    <meta name="description" content="追踪你的卡牌收藏资产，查看升值情况和资产曲线">
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #5B4AE0;
            --primary-light: #F0EDFF;
            --primary-dark: #4438B0;
            --bg: #f5f5f5;
            --white: #fff;
            --text: #1a1a1a;
            --text-secondary: #888;
            --border: #eee;
            --rise: #e74c3c;
            --fall: #27ae60;
            --success: #27ae60;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            padding-bottom: 80px;
            -webkit-tap-highlight-color: transparent;
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 50%, #9B8FF0 100%);
            padding: 16px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .header-back {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }
        .header-title { font-size: 17px; font-weight: 700; }
        .header-actions { margin-left: auto; display: flex; gap: 8px; }
        .header-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
        }

        /* Portfolio Summary */
        .portfolio-value {
            text-align: center;
            margin-bottom: 16px;
        }
        .portfolio-label { font-size: 13px; opacity: 0.8; margin-bottom: 4px; }
        .portfolio-num { font-size: 36px; font-weight: 800; letter-spacing: -0.5px; }
        .portfolio-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            margin-top: 6px;
        }

        /* Stat Grid */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .stat-item {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        .stat-label { font-size: 11px; opacity: 0.75; margin-bottom: 4px; }
        .stat-value { font-size: 15px; font-weight: 700; }

        /* Content */
        .content { max-width: 560px; margin: 0 auto; padding: 12px 16px; }

        /* Chart Card */
        .chart-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 14px;
            box-shadow: var(--shadow);
            margin-bottom: 12px;
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .chart-title { font-size: 14px; font-weight: 700; }
        .chart-tabs { display: flex; gap: 4px; }
        .chart-tab {
            padding: 4px 10px;
            border: none;
            background: var(--bg);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
        }
        .chart-tab.active { background: var(--primary); color: white; }
        .chart-canvas {
            height: 180px;
            position: relative;
        }
        .chart-svg { width: 100%; height: 100%; }
        .chart-tooltip {
            position: absolute;
            background: var(--text);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        /* Section Title */
        .section-title {
            font-size: 15px;
            font-weight: 700;
            margin: 16px 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-count {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Collection List */
        .collection-list { display: flex; flex-direction: column; gap: 10px; }
        .collection-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 12px;
            box-shadow: var(--shadow);
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .collection-img {
            width: 70px;
            height: 98px;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .collection-img img { width: 100%; height: 100%; object-fit: cover; }
        .collection-info { flex: 1; min-width: 0; }
        .collection-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .collection-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .collection-prices {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .price-block { text-align: left; }
        .price-label { font-size: 10px; color: var(--text-secondary); }
        .price-value { font-size: 14px; font-weight: 700; }
        .price-value.current { color: var(--primary); }
        .price-change {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .price-change.rise { color: var(--rise); background: rgba(231,76,60,0.08); }
        .price-change.fall { color: var(--fall); background: rgba(39,174,96,0.08); }

        /* Refresh button */
        .refresh-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            margin-bottom: 12px;
        }
        .refresh-btn {
            padding: 8px 20px;
            border: 1px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .refresh-btn:active { background: var(--primary-light); }
        .refresh-time { font-size: 11px; color: var(--text-secondary); margin-left: 12px; }

        /* Today change row in portfolio */
        .today-change-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 8px;
            font-size: 12px;
        }
        .today-change-item { display: flex; align-items: center; gap: 4px; }
        .today-change-val { font-weight: 700; }
        .today-change-val.rise { color: var(--rise); }
        .today-change-val.fall { color: var(--fall); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
        }
        .empty-icon { font-size: 64px; margin-bottom: 12px; }
        .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .empty-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 20px; }
        .empty-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #5B4AE0 0%, #7B6CF0 100%);
            color: white;
            border-radius: 24px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 16px rgba(91,74,224,0.3);
        }

        /* Bottom Nav */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); display: flex;
            justify-content: space-around; align-items: center;
            padding: 8px 0 env(safe-area-inset-bottom, 8px) 0;
            box-shadow: 0 -1px 0 rgba(0,0,0,0.06); z-index: 50;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; gap: 2px;
            text-decoration: none; color: var(--text-secondary); font-size: 11px;
            padding: 4px 12px; border-radius: 12px; transition: all 0.2s;
        }
        .nav-icon { font-size: 22px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }

        /* Toast */
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: white; padding: 10px 20px;
            border-radius: 24px; font-size: 13px; font-weight: 600;
            z-index: 999; display: none;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>

    <!-- Header -->
    <div class="header">
        <div class="header-top">
            <a href="collection.html" class="header-back">←</a>
            <div class="header-title">💼 我的资产</div>
            <div class="header-actions">
                <a href="index.html" class="header-btn">+ 添加卡牌</a>
            </div>
        </div>
        <div class="portfolio-value">
            <div class="portfolio-label">总市值</div>
            <div class="portfolio-num" id="totalValue">¥0</div>
            <div class="portfolio-change" id="totalChange">
                <span id="profitIcon">--</span> <span id="profitAmount">--</span> (<span id="profitPct">--</span>)
            </div>
            <div class="today-change-row" id="todayChangeRow" style="display:none;">
                <div class="today-change-item">
                    📈 今日涨跌 <span class="today-change-val" id="todayChangeVal">--</span>
                </div>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">总投入</div>
                <div class="stat-value" id="totalCost">¥0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">持有卡牌</div>
                <div class="stat-value" id="cardCount">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">浮盈卡牌</div>
                <div class="stat-value" id="risingCount">0</div>
            </div>
        </div>
    </div>

    <div class="content">
        <!-- Refresh Bar -->
        <div class="refresh-bar">
            <button class="refresh-btn" onclick="refreshPrices()" id="refreshBtn">
                🔄 刷新市价
            </button>
            <span class="refresh-time" id="refreshTime"></span>
        </div>

        <!-- Asset Curve -->
        <div class="chart-card">
            <div class="chart-header">
                <div class="chart-title">📈 资产曲线</div>
                <div class="chart-tabs">
                    <button class="chart-tab" data-days="7">7天</button>
                    <button class="chart-tab active" data-days="30">30天</button>
                    <button class="chart-tab" data-days="90">90天</button>
                </div>
            </div>
            <div class="chart-canvas" id="chartCanvas">
                <svg class="chart-svg" id="chartSvg" viewBox="0 0 340 180"></svg>
                <div class="chart-tooltip" id="chartTooltip"></div>
            </div>
        </div>

        <!-- Collection List -->
        <div class="section-title">
            <span>🎴 我的收藏</span>
            <span class="section-count" id="collectionCount">共 0 张</span>
        </div>
        <div class="collection-list" id="collectionList"></div>

        <!-- Empty State -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">🃏</div>
            <div class="empty-title">还没有收藏卡牌</div>
            <div class="empty-desc">
                使用 AI 扫描识别你的卡牌<br>
                添加到收藏夹后即可追踪资产变化
            </div>
            <a href="index.html" class="empty-btn">🎯 去扫描卡牌</a>
        </div>

        <div style="height:20px;"></div>
    </div>

    <!-- Bottom Nav -->
    <div class="nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🔍</span>探索</a>
        <a href="marketplace.html" class="nav-item"><span class="nav-icon">🛒</span>市场</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span>看板</a>
        <a href="collection.html" class="nav-item active"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const SUPABASE_URL = 'https://xybpcsmjjcnkjwfsuder.supabase.co';
        const db = window.supabase.createClient(SUPABASE_URL, 'sb_publishable_DqgJ_yvf_q8IpAJ8xlMbYQ_a0sotaD7');

        let currentUser = null;
        let currentCollections = null;

        async function init() {
            const { data: { session } } = await db.auth.getSession();
            if (!session) {
                showEmptyState('请先登录查看资产');
                return;
            }
            currentUser = session.user;
            await loadRealData();
        }

        function showEmptyState(msg) {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('collectionList').style.display = 'none';
            const title = document.querySelector('#emptyState .empty-title');
            const desc = document.querySelector('#emptyState .empty-desc');
            if (title) title.textContent = msg || '还没有收藏卡牌';
            if (desc) desc.innerHTML = '使用 AI 扫描识别你的卡牌<br>添加到收藏夹后即可追踪资产变化';
        }

        async function loadRealData() {
            try {
                const { data: collections, error } = await db
                    .from('user_collections')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!collections || collections.length === 0) {
                    showEmptyState();
                    return;
                }

                currentCollections = collections;

                // Try to sync with card_prices for latest market prices
                await syncWithMarketPrices(collections);

                // Render everything
                renderPortfolio(currentCollections);
                renderCollectionList(currentCollections);
                updateRefreshTime();

                // Load snapshots for chart
                const { data: snapshots } = await db
                    .from('collection_price_snapshots')
                    .select('*')
                    .eq('user_id', currentUser.id)
                    .order('date', { ascending: true })
                    .limit(30);

                if (snapshots && snapshots.length >= 3) {
                    renderChart(snapshots.map(s => ({ date: s.date.slice(5), value: s.total_value })));
                } else {
                    const noDataSvg = document.getElementById('chartSvg');
                    if (noDataSvg) noDataSvg.innerHTML = '<text x="170" y="90" text-anchor="middle" fill="#999" font-size="14">暂无数据（明日自动生成快照）</text>';
                }
            } catch (e) {
                console.error('Load error:', e);
                showEmptyState('加载失败，请刷新重试');
            }
        }

        // Sync user collections with card_prices market data
        async function syncWithMarketPrices(collections) {
            if (!collections || collections.length === 0) return;
            
            try {
                // Get all card prices that match user's collection
                const names = [...new Set(collections.map(c => c.card_name))];
                const { data: prices } = await db
                    .from('card_prices')
                    .select('card_name, series, rarity, current_price, change_percent, change_amount, updated_at')
                    .eq('market', 'CN')
                    .in('card_name', names);

                if (!prices || prices.length === 0) return;

                // Build lookup map
                const priceMap = {};
                prices.forEach(p => {
                    const key = `${p.card_name}|${p.series || ''}|${p.rarity || 'N'}`;
                    priceMap[key] = p;
                });

                // Enrich collections with market prices
                let hasChanges = false;
                collections.forEach(c => {
                    const key = `${c.card_name}|${c.series || ''}|${c.rarity || 'N'}`;
                    const p = priceMap[key];
                    if (p && p.current_price > 0) {
                        c.market_price = p.current_price;
                        c.change_percent = p.change_percent || c.change_percent || 0;
                        c.change_amount = p.change_amount || 0;
                        c.price_updated_at = p.updated_at;
                        hasChanges = true;
                    }
                });

                // Update last refresh time
                if (hasChanges && prices.length > 0) {
                    const latest = prices.reduce((a, b) => 
                        new Date(a.updated_at) > new Date(b.updated_at) ? a : b
                    );
                    localStorage.setItem('last_price_refresh', latest.updated_at);
                }
            } catch (e) {
                console.warn('Market price sync skipped:', e.message);
            }
        }

        // Manual refresh prices
        async function refreshPrices() {
            if (!currentCollections || currentCollections.length === 0) return;
            
            const btn = document.getElementById('refreshBtn');
            btn.textContent = '⏳ 刷新中...';
            btn.disabled = true;

            try {
                // Call price-updater to sync prices for this user
                const { error } = await db.rpc('sync_user_collections_prices', { p_user_id: currentUser.id });
                if (error) console.warn('Sync RPC warning:', error.message);

                // Reload data
                await loadRealData();
                showToast('✅ 价格已刷新');
            } catch (e) {
                console.warn('Refresh error:', e.message);
            } finally {
                btn.textContent = '🔄 刷新市价';
                btn.disabled = false;
            }
        }

        function updateRefreshTime() {
            const lastRefresh = localStorage.getItem('last_price_refresh');
            const el = document.getElementById('refreshTime');
            if (lastRefresh) {
                el.textContent = '更新于 ' + new Date(lastRefresh).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                el.textContent = '点击刷新获取最新市价';
            }
        }

        function renderPortfolio(collections) {
            const totalCost = collections.reduce((sum, c) => sum + (c.purchase_price || 0) * (c.quantity || 1), 0);
            const totalValue = collections.reduce((sum, c) => {
                const price = c.market_price || c.current_price || c.purchase_price || 0;
                return sum + price * (c.quantity || 1);
            }, 0);
            const profit = totalValue - totalCost;
            const profitPct = totalCost > 0 ? ((profit / totalCost) * 100).toFixed(1) : 0;
            const rising = collections.filter(c => ((c.market_price || c.current_price || c.purchase_price) || 0) > (c.purchase_price || 0)).length;

            document.getElementById('totalValue').textContent = '¥' + totalValue.toLocaleString();
            document.getElementById('totalCost').textContent = '¥' + totalCost.toLocaleString();
            document.getElementById('cardCount').textContent = collections.reduce((sum, c) => sum + (c.quantity || 1), 0);
            document.getElementById('risingCount').textContent = rising;
            document.getElementById('collectionCount').textContent = '共 ' + collections.length + ' 种';

            const profitEl = document.getElementById('profitAmount');
            const pctEl = document.getElementById('profitPct');
            const iconEl = document.getElementById('profitIcon');

            if (profit >= 0) {
                profitEl.textContent = '+¥' + profit.toLocaleString();
                pctEl.textContent = '+' + profitPct + '%';
                iconEl.textContent = '📈';
                document.querySelector('.portfolio-change').style.background = 'rgba(39,174,96,0.3)';
            } else {
                profitEl.textContent = '-¥' + Math.abs(profit).toLocaleString();
                pctEl.textContent = profitPct + '%';
                iconEl.textContent = '📉';
                document.querySelector('.portfolio-change').style.background = 'rgba(231,76,60,0.3)';
            }

            // Show today's change based on card_prices data
            const todayRow = document.getElementById('todayChangeRow');
            const todayVal = document.getElementById('todayChangeVal');
            const todayChanges = collections.filter(c => c.change_percent != null && c.change_percent !== 0);
            if (todayChanges.length > 0) {
                todayRow.style.display = 'flex';
                const avgChange = todayChanges.reduce((s, c) => s + (c.change_percent || 0), 0) / todayChanges.length;
                const isRise = avgChange > 0;
                todayVal.textContent = (isRise ? '+' : '') + avgChange.toFixed(2) + '%';
                todayVal.className = 'today-change-val ' + (isRise ? 'rise' : 'fall');
            } else {
                todayRow.style.display = 'none';
            }
        }

        function renderCollectionList(collections) {
            const container = document.getElementById('collectionList');
            container.innerHTML = collections.map(c => {
                const marketPrice = c.market_price || c.current_price || c.purchase_price || 0;
                const profit = (marketPrice - (c.purchase_price || 0)) * (c.quantity || 1);
                const profitPct = c.purchase_price > 0 ? ((profit / ((c.purchase_price || 1) * (c.quantity || 1))) * 100).toFixed(1) : 0;
                const isRise = profit >= 0;
                const todayChange = c.change_percent || 0;
                const isTodayUp = todayChange > 0;
                const isTodayDown = todayChange < 0;
                const condLabels = { 'M': '完美', 'NM': '近新', 'LP': '轻损', 'MP': '中损', 'HP': '重损', 'D': '损坏' };

                return `
                    <div class="collection-card">
                        <div class="collection-img">
                            ${c.card_image ? `<img src="${c.card_image}" alt="">` : '🃏'}
                        </div>
                        <div class="collection-info">
                            <div class="collection-name">${c.card_name}</div>
                            <div class="collection-meta">${c.series || ''} · ${c.rarity || ''} · ${condLabels[c.condition] || c.condition || ''} · x${c.quantity || 1}${c.source ? ' · ' + c.source : ''}</div>
                            <div class="collection-prices">
                                <div class="price-block">
                                    <div class="price-label">入手</div>
                                    <div class="price-value">¥${(c.purchase_price || 0).toLocaleString()}</div>
                                </div>
                                <div class="price-block">
                                    <div class="price-label">市价</div>
                                    <div class="price-value current">¥${marketPrice.toLocaleString()}</div>
                                </div>
                                <div class="price-change ${isRise ? 'rise' : 'fall'}">
                                    ${isRise ? '+' : ''}${profitPct}%
                                </div>
                                ${todayChange !== 0 ? `<div class="price-change ${isTodayUp ? 'rise' : 'fall'}" style="min-width:56px;text-align:center;">
                                    ${isTodayUp ? '📈 ' : '📉 '}${isTodayUp ? '+' : ''}${todayChange.toFixed(1)}%
                                </div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderChart(data) {
            const svg = document.getElementById('chartSvg');
            if (!data || data.length < 2) {
                svg.innerHTML = '<text x="170" y="90" text-anchor="middle" fill="#999" font-size="14">暂无数据</text>';
                return;
            }

            const values = data.map(d => d.value);
            const min = Math.min(...values);
            const max = Math.max(...values);
            const range = max - min || 1;
            const padding = { top: 20, right: 10, bottom: 30, left: 10 };
            const w = 340 - padding.left - padding.right;
            const h = 180 - padding.top - padding.bottom;

            const points = data.map((d, i) => {
                const x = padding.left + (i / (data.length - 1)) * w;
                const y = padding.top + h - ((d.value - min) / range) * h;
                return `${x},${y}`;
            }).join(' ');

            // Area path (closed)
            const areaPath = `${points} ${padding.left + w},${padding.top + h} ${padding.left},${padding.top + h}`;

            // Grid lines
            const gridLines = [0.25, 0.5, 0.75].map(p => {
                const y = padding.top + h * p;
                return `<line x1="${padding.left}" y1="${y}" x2="${padding.left + w}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
            }).join('');

            // X axis labels (show first, middle, last)
            const labelIndices = [0, Math.floor(data.length / 2), data.length - 1];
            const labels = labelIndices.map(i => {
                const x = padding.left + (i / (data.length - 1)) * w;
                return `<text x="${x}" y="${padding.top + h + 16}" text-anchor="middle" fill="#999" font-size="10">${data[i].date}</text>`;
            }).join('');

            svg.innerHTML = `
                <defs>
                    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#5B4AE0" stop-opacity="0.3"/>
                        <stop offset="100%" stop-color="#5B4AE0" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                ${gridLines}
                <polygon points="${areaPath}" fill="url(#areaGrad)"/>
                <polyline points="${points}" fill="none" stroke="#5B4AE0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                ${data.map((d, i) => {
                    const x = padding.left + (i / (data.length - 1)) * w;
                    const y = padding.top + h - ((d.value - min) / range) * h;
                    return `<circle cx="${x}" cy="${y}" r="3" fill="#5B4AE0" stroke="white" stroke-width="1.5" class="chart-point" data-value="${d.value}" data-date="${d.date}"/>`;
                }).join('')}
                ${labels}
            `;

            // Tooltip
            const tooltip = document.getElementById('chartTooltip');
            svg.querySelectorAll('.chart-point').forEach(pt => {
                pt.addEventListener('mouseenter', (e) => {
                    tooltip.textContent = `${e.target.dataset.date}: ¥${parseInt(e.target.dataset.value).toLocaleString()}`;
                    tooltip.style.opacity = '1';
                    tooltip.style.left = (e.target.cx.baseVal.value - 30) + 'px';
                    tooltip.style.top = (e.target.cy.baseVal.value - 30) + 'px';
                });
                pt.addEventListener('mouseleave', () => {
                    tooltip.style.opacity = '0';
                });
            });
        }

        // Chart tabs — reload from Supabase
        document.querySelectorAll('.chart-tab').forEach(tab => {
            tab.addEventListener('click', async function() {
                document.querySelectorAll('.chart-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                const days = parseInt(this.dataset.days);
                if (!currentUser) return;
                
                try {
                    const { data: snapshots } = await db
                        .from('collection_price_snapshots')
                        .select('*')
                        .eq('user_id', currentUser.id)
                        .order('date', { ascending: true })
                        .limit(days);
                    
                    if (snapshots && snapshots.length >= 3) {
                        renderChart(snapshots.map(s => ({ date: s.date.slice(5), value: s.total_value })));
                    } else {
                        const chartSvg = document.getElementById('chartSvg');
                        if (chartSvg) chartSvg.innerHTML = '<text x="170" y="90" text-anchor="middle" fill="#999" font-size="14">暂无数据</text>';
                    }
                } catch (e) {
                    console.error('Chart load error:', e);
                }
            });
        });

        // Init
        init();

        // Toast helper
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }
    </script>
</body>
</html>
